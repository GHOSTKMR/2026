<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon" href="https://mgx-backend-cdn.metadl.com/generate/images/701809/2026-02-17/ccda845a-d9f3-4c25-b110-99647e3f934a.png" type="image/png">
    <title>SADWAP · ghost access</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --accent: #00ff88;
            --accent-purple: #7c3aed;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --border-color: #30363d;
            --danger: #f85149;
            --font-heading: 'Orbitron', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        body {
            font-family: var(--font-body);
            background: #000000;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            position: relative;
        }

        /* iPhone frame */
        .iphone-frame {
            width: 100%;
            max-width: 390px;
            background: #0b0f15;
            border-radius: 52px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9), 0 0 0 6px #28303f, 0 0 0 12px #0f1219;
            overflow: hidden;
            position: relative;
            backdrop-filter: blur(2px);
            aspect-ratio: 9 / 19;
            display: flex;
            flex-direction: column;
        }

        .phone-wallpaper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0.3;
            pointer-events: none;
        }

        .phone-screen {
            position: relative;
            z-index: 2;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 12px 16px 8px 16px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            overflow-y: auto;
            scrollbar-width: thin;
        }

        /* status bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 6px 16px 6px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #ffffff;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }
        .time-status {
            background: rgba(30, 40, 60, 0.5);
            padding: 6px 16px;
            border-radius: 40px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            font-variant-numeric: tabular-nums;
        }
        .right-status {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(30, 40, 60, 0.4);
            padding: 6px 14px;
            border-radius: 40px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .signal-bars {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 16px;
        }
        .bar {
            width: 4px;
            background: white;
            border-radius: 2px;
            transition: 0.2s;
        }
        .bar1 { height: 8px; }
        .bar2 { height: 11px; }
        .bar3 { height: 14px; }
        .bar4 { height: 16px; }
        .bar.active { background: #00ffaa; box-shadow: 0 0 8px #00ffaa; }
        .battery-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* logo area */
        .logo-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .logo-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .login-logo {
            width: 52px;
            height: 52px;
            border-radius: 18px;
            border: 2px solid var(--accent);
            object-fit: cover;
            box-shadow: 0 0 20px #00ff8844;
        }
        .app-title {
            font-family: var(--font-heading);
            font-size: 1.7rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(130deg, #00ffaa, #a27cff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        /* Developer avatar now acts as a hyperlink */
        .dev-avatar-small {
            width: 46px;
            height: 46px;
            border-radius: 23px;
            border: 2px solid var(--accent);
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 0 15px #00ff8866;
            display: block;
            text-decoration: none;
        }
        .dev-avatar-small img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* login card */
        .login-card {
            border-radius: 32px;
            background: rgba(22, 27, 34, 0.6);
            backdrop-filter: blur(20px);
            padding: 28px 20px 24px 20px;
            border: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 22px;
        }
        .login-heading {
            font-family: var(--font-heading);
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 28px;
        }
        .custom-input {
            background: rgba(13, 17, 23, 0.8) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 30px !important;
            color: white !important;
            padding: 18px 20px !important;
            height: 64px;
            font-size: 1rem;
            text-align: center;
            letter-spacing: 4px;
        }
        .form-floating > label {
            color: #aaa !important;
            left: 20px;
        }
        .toggle-password {
            position: absolute;
            right: 20px;
            top: 20px;
            background: transparent;
            border: none;
            color: #aaa;
            z-index: 5;
        }
        .btn-login {
            background: linear-gradient(135deg, var(--accent), #00b8a9);
            border: none;
            border-radius: 40px;
            padding: 16px;
            font-weight: 700;
            letter-spacing: 2px;
            font-family: var(--font-heading);
            margin-top: 16px;
        }

        /* ===== CAMPAIGN VIDEO (autoplay with sound, full frame) ===== */
        .campaign-section {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 36px;
            padding: 16px 12px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 10px;
        }
        .campaign-header {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-bottom: 12px;
        }
        .campaign-header i { color: #ff5e7c; }
        .campaign-header span {
            font-weight: 600;
            background: linear-gradient(145deg,#ff8a5c,#ff3b5c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .campaign-video {
            border-radius: 24px;
            overflow: hidden;
            aspect-ratio: 16/9;
            border: 1px solid #ffffff26;
            background: #000;
        }
        /* video fills the container completely */
        .campaign-video video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .home-bar {
            display: flex;
            justify-content: center;
            padding: 12px 0 4px;
        }
        .home-indicator {
            width: 130px;
            height: 5px;
            background: #e0e7ff;
            border-radius: 30px;
            opacity: 0.5;
        }

        /* access denied toast */
        .security-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(248,81,73,0.2);
            border: 1px solid #f85149aa;
            color: #faa;
            padding: 10px 24px;
            border-radius: 60px;
            backdrop-filter: blur(16px);
            z-index: 9999;
            opacity: 0;
            transition: 0.4s;
            white-space: nowrap;
        }
        .security-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        
        /* all modals removed */
    </style>
</head>

<body>
    <!-- wallpaper layers -->
    <div class="bg-overlay" style="background: url('https://mgx-backend-cdn.metadl.com/generate/images/701809/2026-02-17/c4b92c1a-6407-44af-8a12-abe877bd321c.png') center/cover no-repeat; opacity: 0.15;"></div>
    <div class="particle-container" id="particles"></div>

    <div class="iphone-frame">
        <img src="https://ghostkmr.github.io/2026/sadwapbg.jpeg" class="phone-wallpaper" alt="wall">

        <div class="phone-screen">
            <!-- status bar with real time -->
            <div class="status-bar">
                <div class="time-status" id="liveTime">9:41 AM</div>
                <div class="right-status">
                    <div class="signal-bars" id="signalBars">
                        <div class="bar bar1 active"></div>
                        <div class="bar bar2 active"></div>
                        <div class="bar bar3 active"></div>
                        <div class="bar bar4 active"></div>
                    </div>
                    <i class="bi bi-wifi" style="font-size:1rem;"></i>
                    <div class="battery-indicator" id="batteryInfo">
                        <span class="battery-level" id="batteryPercent">86%</span>
                        <i class="bi bi-battery-full" id="batteryIcon"></i>
                    </div>
                </div>
            </div>

            <!-- logo + developer avatar as direct link (new window) -->
            <div class="logo-area">
                <div class="logo-wrap">
                    <img src="https://mgx-backend-cdn.metadl.com/generate/images/701809/2026-02-17/ccda845a-d9f3-4c25-b110-99647e3f934a.png" class="login-logo">
                    <span class="app-title">SADWAP</span>
                </div>
                <!-- Developer avatar opens aboutdeveloper.html in a new window -->
                <a href="https://ghostkmr.github.io/2026/aboutdeveloper.html" target="_blank" class="dev-avatar-small" id="devVideoLink" title="About Developer (opens new window)">
                    <img src="https://mgx-backend-cdn.metadl.com/generate/images/701809/2026-02-17/11d1825d-d949-422d-9acc-76af8cd17e9a.png" alt="Developer">
                </a>
            </div>

            <!-- LOGIN CARD - only password field -->
            <div class="login-card">
                <h2 class="login-heading text-center"><i class="bi bi-shield-lock-fill me-2"></i>ENTER PIN</h2>
                <form id="loginForm">
                    <div class="form-floating mb-3 position-relative">
                        <input type="password" class="form-control custom-input" id="password" placeholder="PIN" required autocomplete="off" inputmode="numeric">
                        <label><i class="bi bi-key-fill me-2"></i>PIN / Password</label>
                        <button type="button" class="btn toggle-password" id="togglePassword" tabindex="-1">
                            <i class="bi bi-eye-fill"></i>
                        </button>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe" style="background-color:#333; border-color:#555;">
                            <label class="form-check-label" style="color:#aaa; font-size:0.75rem;">Remember this device</label>
                        </div>
                        <a href="#" class="forgot-link" style="color:#00ffaa; font-size:0.7rem;">Forgot PIN?</a>
                    </div>
                    <button type="submit" class="btn btn-login w-100" id="loginBtn">
                        <span class="btn-text"><i class="bi bi-box-arrow-in-right me-2"></i>UNLOCK</span>
                        <span class="btn-loader d-none"><span class="spinner-border spinner-border-sm me-2"></span>verifying...</span>
                    </button>
                </form>
            </div>

            <!-- ===== ONGOING PROMO VIDEO (autoplay with sound, fills frame) ===== -->
            <div class="campaign-section">
                <div class="campaign-header">
                    <i class="bi bi-camera-reels-fill"></i>
                    <span>🔥 ONGOING CAMPAIGN</span>
                </div>
                <div class="campaign-video">
                    <!-- Video element: autoplay, with sound enabled -->
                    <video id="promoVideo" autoplay loop playsinline>
                        <!-- REPLACE THIS SOURCE WITH YOUR ACTUAL VIDEO FILE -->
                        <source src="https://ghostkmr.github.io/2026/ramadaanoffer.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
            </div>

            <!-- home bar -->
            <div class="home-bar">
                <div class="home-indicator"></div>
            </div>
        </div>
    </div>

    <!-- NO MODALS - all removed -->

    <div class="security-toast" id="securityToast"><i class="bi bi-shield-exclamation me-2"></i>Access Denied</div>

    <script>
        (function() {
            // ========== REAL TIME CLOCK & BATTERY ==========
            function updateTime() {
                const now = new Date();
                let hours = now.getHours();
                const minutes = now.getMinutes().toString().padStart(2, '0');
                const ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12 || 12;
                document.getElementById('liveTime').textContent = `${hours}:${minutes} ${ampm}`;
            }
            updateTime();
            setInterval(updateTime, 1000);

            // Battery simulation
            function updateBatteryUI(battery) {
                const percent = Math.round(battery.level * 100);
                document.getElementById('batteryPercent').textContent = percent + '%';
                const icon = document.getElementById('batteryIcon');
                if (battery.charging) icon.className = 'bi bi-battery-charging';
                else if (percent >= 90) icon.className = 'bi bi-battery-full';
                else if (percent >= 60) icon.className = 'bi bi-battery-three-quarters';
                else if (percent >= 40) icon.className = 'bi bi-battery-half';
                else if (percent >= 15) icon.className = 'bi bi-battery-low';
                else icon.className = 'bi bi-battery';
            }
            if ('getBattery' in navigator) {
                navigator.getBattery().then(battery => {
                    updateBatteryUI(battery);
                    battery.addEventListener('levelchange', () => updateBatteryUI(battery));
                    battery.addEventListener('chargingchange', () => updateBatteryUI(battery));
                });
            } else {
                setInterval(() => {
                    let r = Math.floor(Math.random()*25)+65;
                    document.getElementById('batteryPercent').textContent = r+'%';
                }, 30000);
            }

            // signal fluctuation
            setInterval(() => {
                let bars = document.querySelectorAll('.bar');
                let active = Math.random() > 0.2 ? 4 : 3;
                bars.forEach((b,i) => i<active ? b.classList.add('active') : b.classList.remove('active'));
            }, 8000);

            // ========== PROMO VIDEO: AUTO PLAY WITH SOUND ==========
            const video = document.getElementById('promoVideo');
            if (video) {
                // Try to play with sound
                video.muted = false;
                video.play().catch(e => {
                    console.log('Autoplay with sound blocked, will try on interaction');
                    // If blocked, try again on first user interaction
                    const enableAudio = () => {
                        video.muted = false;
                        video.play();
                        document.removeEventListener('touchstart', enableAudio);
                        document.removeEventListener('click', enableAudio);
                    };
                    document.addEventListener('touchstart', enableAudio);
                    document.addEventListener('click', enableAudio);
                });
            }

            // ========== SECURITY & PARTICLES ==========
            function initParticles() {
                let c = document.getElementById('particles');
                if (!c) return;
                for (let i=0; i<20; i++) {
                    let p = document.createElement('div');
                    p.className = 'particle';
                    p.style.left = Math.random()*100+'%';
                    p.style.animationDelay = Math.random()*8+'s';
                    p.style.animationDuration = (6+Math.random()*6)+'s';
                    p.style.background = Math.random()>0.5?'#00ff88':'#7c3aed';
                    c.appendChild(p);
                }
            }
            initParticles();

            function showSecurityToast(msg = 'Access Denied') {
                let t = document.getElementById('securityToast');
                t.innerHTML = '<i class="bi bi-shield-exclamation me-2"></i>' + msg;
                t.classList.add('show');
                setTimeout(()=>t.classList.remove('show'),2000);
            }
            document.addEventListener('contextmenu', e => { e.preventDefault(); showSecurityToast(); });
            document.addEventListener('keydown', e => {
                if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key==='I') || (e.ctrlKey && e.key==='U')) {
                    e.preventDefault(); showSecurityToast();
                }
            });

            // ========== LOGIN FORM with PASSWORD = "ghost123" ==========
            const CORRECT_PASSWORD = "ghost123";  // <-- YOUR CUSTOM PASSWORD

            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                let pwd = document.getElementById('password').value.trim();
                
                if (!pwd) {
                    this.style.animation = 'shake 0.5s';
                    setTimeout(()=>this.style.animation='',500);
                    return;
                }
                
                if (pwd !== CORRECT_PASSWORD) {
                    showSecurityToast('Access Denied: Invalid PIN');
                    this.style.animation = 'shake 0.5s';
                    setTimeout(()=>this.style.animation='',500);
                    document.getElementById('password').style.borderColor = '#f85149';
                    setTimeout(() => document.getElementById('password').style.borderColor = '', 500);
                    return;
                }
                
                // Correct password
                let btn = document.getElementById('loginBtn');
                btn.querySelector('.btn-text').classList.add('d-none');
                btn.querySelector('.btn-loader').classList.remove('d-none');
                btn.disabled = true;
                
                setTimeout(() => {
                    btn.querySelector('.btn-text').classList.remove('d-none');
                    btn.querySelector('.btn-loader').classList.add('d-none');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-check-circle-fill me-2"></i>ACCESS GRANTED';
                    btn.style.background = 'linear-gradient(135deg, #00ff88, #00cc6a)';
                    
                    setTimeout(() => { 
                        window.location.href = 'welcome.html'; 
                    }, 1200);
                }, 1500);
            });

            // toggle password visibility
            document.getElementById('togglePassword').addEventListener('click', function() {
                let pwd = document.getElementById('password');
                let icon = this.querySelector('i');
                if (pwd.type === 'password') {
                    pwd.type = 'text';
                    icon.classList.replace('bi-eye-fill','bi-eye-slash-fill');
                } else {
                    pwd.type = 'password';
                    icon.classList.replace('bi-eye-slash-fill','bi-eye-fill');
                }
            });

            // No modal code needed - developer link is a direct hyperlink
        })();
    </script>
    <style>
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
        .particle { position:absolute; width:3px; height:3px; border-radius:50%; opacity:0; animation:floatParticle 8s infinite; }
        @keyframes floatParticle { 0%{opacity:0; transform:translateY(100vh) scale(0);} 20%{opacity:0.8;} 100%{opacity:0; transform:translateY(-20vh) scale(1.5);} }
    </style>
</body>

</html>

            "kudulicious chicken": "🐔 **KUDULICIOUS CHICKEN** (PRM|SOP# 958)\n\n**Launch Date:** 14th Jan 2023\n**Category:** Khafyef\n**Station:** Steak Station\n**Calories:** 236 kcal\n\n**INGREDIENTS:**\n• 1 KUDU Chicken (55g)\n• 7g Diced Onion (1 tablespoon)\n• 1 Dash KUDU Seasoning\n• 3.5g Diced Green Pepper (1 teaspoon)\n• ⅛ oz Soy Sauce\n• 1 Kidi Bread\n• 28g Garlic Parmesan Sauce\n• 10g Lettuce\n• 2 Half-moon Tomato (¼\")\n\n**GARLIC PARMESAN SAUCE:**\n• Receiving & storage: Chilled\n• Primary shelf life: 3 months\n• Secondary: 7 Days after open at Chiller\n• At garnish station: 24 hours in yellow squeezer\n\n**PREPARATION PROCEDURES:**\n1. Flat grill @300°F-350°F, spray oil once\n2. Place chicken on greased grill, cook, change gloves (max 20 orders)\n3. Use yellow squeezer to dispense Garlic Parmesan\n4. Garnish kidi bread: remove inner part of crown\n5. Squeeze 14g Garlic Parmesan oval on crown, 14g on heel\n6. Place lettuce and tomato evenly inside bread\n7. Place garnished bread on flat grill @200°F-250°F (crown up, cut side to garnish) for 90 sec total\n8. Add diced onion (7g) to chicken, toss & mix\n9. Sprinkle dash seasoning, toss & mix\n10. Turn bread, heat other side\n11. Add diced green pepper (3.5g), toss & mix\n12. When meat almost ready, add ⅛ oz soy sauce, toss & mix\n13. After 3-4 minutes, line meat 4\" long on grill\n14. Scoop chicken onto heel side\n15. Place on small wrapper, wrap with LTO icon visible\n16. Add yellow round sticker to identify\n\n**SERVING:**\n• Dine-in: basket with 1 ketchup, 1 napkin\n• Take-out: Paper bag #10\n• Meal: 2 ketchup, 2 napkins, regular fries, regular soft drink",
            
            "lafino philly steak": "🥩 **LAFINO PHILLY STEAK** (STK|SOP# 956)\n\n**Launch Date:** April 2022\n**Last Modified:** 7th November 2023\n**Station:** Burger Station\n**Calories:** 528 kcal\n\n**INGREDIENTS:**\n• 1 Order Philly Beef Meat\n• 2 Dashes KUDU Seasoning (1+1)\n• 28g Sliced Onion (⅛\")\n• 1 Piece 12\" Tortilla Bread\n• 36g Mayonnaise\n• 21g Cheese Sauce (3 lines of 7g)\n• 2 Halves Yellow Cheese\n• 2 Halves White Cheese\n\n**SLICED ONION PREPARATION (per batch):**\n1. Flat grill @350°F (steak station)\n2. Pour 7g melted butter on flat grill\n3. Use 250 ml cup twice (110g each) for 220g ⅛\" onions on butter\n4. Cook 3 minutes until limp\n5. Add dash seasoning, toss & mix\n6. Transfer to covered pan, cool 15 min at room temp\n7. Refrigerate, label (24 hours shelf life)\n\n**PREPARATION PROCEDURES:**\n1. Flat grill @250°F, spray oil once\n2. Place one order Philly Beef on greased grill, discard gloves\n3. After 30 sec, separate pieces (max 10 orders per batch)\n4. After 1 min, add 28g buttered sliced onions (¼ cup or 2 oz cup)\n5. Toss & mix 1 minute\n6. Add 1 dash KUDU seasoning, cook 1 minute\n7. On tortilla, squeeze 36g Mayonnaise in 3½ spirals outside to inside\n8. From middle, squeeze 21g cheese sauce across mayo (3 lines of 7g)\n9. After max 3 minutes, line meat 8\" long, place over mayo and cheese\n10. Add 4 halves cheese (2 white, 2 yellow)\n11. Fold both ends 1\" each side, roll very tight\n12. Roll with one-fold over ingredients to prevent spillage\n13. Toast in panini 30 sec (max 4, 1cm apart, staggered)\n14. Transfer to garnish using turner\n15. Wrap with big waxed wrap, place in sleeve\n16. Mark with Red Sticker\n\n**SERVING:**\n• Dine-in: tray with 1 ketchup, 1 napkin\n• Take-out: Paper bag #20\n• Meal: 2 ketchup, 2 napkins, fries, drink, straw",
            
            "large kudu nachos platter": "🇲🇽 **LARGE KUDU NACHOS PLATTER** (PRM|SOP# 994)\n\n**Launch Date:** January 2026\n**Category:** Promo\n**Station:** Burger Station\n\n**INGREDIENTS:**\n• 80g Guacamole\n• 7 Jalapeno Pieces (14g)\n• 7g Diced Tomato\n• 4g Onion Chives\n• 45g Cheddar Cheese Sauce\n• 1 Dash KUDU Seasoning\n• 1 KUDU Beef Patty (#120409)\n• 45g Burrito Sauce\n• 120g Doritos Sweet Chili Pepper (#120437)\n\n**KUDU BEEF PATTY (#120409):**\n• Receiving & storage: Frozen 0°F to -10°F\n• Packaging: 1 Box/10 Packs/16 Pieces/100 Grams\n• Primary shelf life: 9 months frozen\n• Cooking time: 3:00 Minutes\n• Secondary shelf life (chiller): 72 hours\n• Thaw: 24 hours / Use: 48 hours\n\n**THAWING PROCEDURE:**\n• Use ½ size pan, max 8 pieces in 2 rows overlapping\n• Dessert liner under each patty\n• Store covered in burger station drawer chiller\n• PD label 24 hours + current PTD when opened\n\n**DORITOS SWEET CHILI PEPPER (#120437):**\n• Receiving & storage: Room temperature\n• Packaging: 1 Pack / 120 grams\n• Primary shelf life: 12 months\n\n**FRESH COURT GUACAMOLE (#120528):**\n• Receiving & storage: Frozen 0°F to -10°F\n• Packaging: 1 Box / 10kg /1kg\n• Primary shelf life: 24 months\n• Secondary shelf life (chiller):\n  - Thawing: 36 hours\n  - Sealed/unopened tub after thawing: 5½ days\n  - Open tub: 24 hours\n  - Broasted cup: 8 hours (Take-Away & HD)\n\n**PREPARATION PROCEDURES:**\n1. Flat grill @250°F with divider properly installed\n2. Place 1 piece thawed beef patty on right side of divider\n3. Cook 2 minutes, turn with scrapper, sprinkle KUDU seasoning, cook 1 minute\n4. While cooking, dispense 120g Doritos into Sugarcane Salad Bowl\n5. Squeeze 45g Burrito Sauce over Doritos in 9 zigzag lines\n6. After 3 minutes, chop patty into small pieces using scraper\n7. Transfer chopped patty evenly on top of nachos\n8. Squeeze 45g Cheddar Cheese Sauce over meat in 9 zigzag lines\n9. Spread 7g diced tomato, 4g onion chives evenly\n10. Add 7 jalapeno slices evenly\n11. For dine-in: add 80g guacamole (4 x 20g scoops with wooden spoon) on top\n12. Cover with lid (no sleeve needed)\n13. For take-out/HD: guacamole in 2 soufflé cups (40g each), 8 hours @chilled\n\n**SERVING:**\n• Dine-in: tray with 2 plastic forks, 3 napkins\n• Take-out: bag #20 with 2 portions guacamole (40g each)",
            
            "og burger e gamers bundle": "🎮 **OG BURGER E-GAMERS BUNDLE** (PRM|SOP# 997)\n\n**Launch Date:** February 2026\n**Category:** Promo\n**Station:** Burger Station\n\n**INGREDIENTS:**\n• 1 Big Bun\n• 1 Chicken Burger\n• 1 Slice Yellow Cheese\n• 20g Mayonnaise\n• 20g Shredded Lettuce\n• 20g Khafeef Sauce\n• 1 Portion Medium Fries\n• 1 Portion Chicken Nuggets (4 pieces)\n\n**PHU INFO:**\n• Chicken Nuggets: max 16 per basket/pan, cook 3:30 min, hold 30 min, code NUGG\n• Chicken Burger: max 5 per basket/pan, cook 3:30 min, hold 30 min, code CHBU\n\n**PACKAGING & CONDIMENTS:**\n• 1 KUDU Big Wrapper\n• 1 Figurine\n• 1 KUDU Dressing Dip Pot\n• 2 Ketchup Sachets\n• 2 Napkins\n• 1 Straw\n\n**PREPARATION PROCEDURES:**\n1. Ensure cooked nuggets and chicken burger ready\n2. Get big KUDU wrapper, use grease pencil to label \"OG\" in empty round icon on top of LTO sign\n3. Drop big bun in toaster\n4. Place toasted bun on wrapper (printed side down) with heel center, crown upper\n5. Squeeze 20g Mayonnaise spiral on crown side\n6. Squeeze 20g Khafeef Sauce spiral on heel side\n7. Add 20g shredded lettuce on crown over mayo\n8. Place yellow cheese on lettuce\n9. Place cooked chicken burger patty on cheese\n10. Close by gently gripping crown and patty, placing over heel\n11. Wrap burger\n12. Portion 4 nuggets into kiddie fries bag\n\n**SERVING:**\n• Dine-in: tray with medium drink, medium fries, nuggets\n• Take-out/HD: paper bag #10\n• Condiments: 2 ketchup, KUDU dressing dip pot, 2 napkins, straw (cup drinks)\n• Canned drinks for HD",
            
            "smokey": "🔥 **SMOKEY** (PRM|SOP# 973)\n\n**Launch Date:** April 25, 2024\n**Station:** Burger Station\n**Calories:** 959 kcal\n\n**INGREDIENTS:**\n• 1 Order Philly Beef Meat\n• 40g Mozzarella Cheese\n• 1 Dash KUDU Seasoning\n• 60g Caramelized Green Pepper Onion\n• 1 Potato Steak Bread (#110146)\n• 56g Smokey Sauce (#120372)\n• 2 Slices White Cheese\n\n**NEW SKU - SMOKEY SAUCE (#120372):**\n• Receiving & storage: Chilled 34°F-40°F\n• Packaging: 1 Pack = 1kg\n• Primary shelf life: 6 months\n• Secondary: 7 days after open @chilled\n• Squeeze bottle: 24 hours @chilled\n• For Serving: 48 hours in broasted cup (56g) @chilled\n\n**NEW SKU - POTATO STEAK BREAD (#110146):**\n• Receiving & storage: Room Temperature\n• Packaging: 1 Pack = 4 Pieces\n• Primary shelf life: 5 Days\n• Secondary: 3 days\n\n**PREMIUM SANDWICH BOX (#130169):**\n• Packaging: 1 Case = 300 boxes\n\n**CARAMELIZED GREEN PEPPER ONION PREPARATION (per batch):**\n1. 110g julienne onion strips ⅛\" (using 250 ML cup)\n2. 110g julienne green pepper ⅛\"\n3. Dispense 7g melted butter on steak station grill @350°F\n4. Place onion on butter, immediately add green pepper\n5. Toss and mix\n6. After 3 minutes, add dash KUDU seasoning, toss & mix, cook 30 seconds\n7. Transfer to covered pan, cool 15 min at room temp\n8. Refrigerate, label (24 hours shelf life)\n\n**PREPARATION PROCEDURES:**\n1. Flat grill @250°F (Burger Station), spray oil once\n2. Place one portion Philly Beef on greased grill\n3. Add 60g caramelized mix (1½ cups ¼ measure) above beef\n4. Separate pieces with scraper and spatula\n5. When half cooked, sprinkle KUDU seasoning, mix\n6. Mix caramelized with meat, cook 1 minute\n7. Arrange mix 8\" long\n8. Add 1 scoop mozzarella (40g using ⅓ cup) on top, spread evenly\n9. Add 2 full slices white cheese diagonally (corners touching)\n10. Pull out potato steak bread, open wide on board\n11. Squeeze 56g Smokey sauce oval/straight on crown and heel (28g each)\n12. Heat garnished bread on flat grill             "sweet potato": "🍠 **SWEET POTATO** (PRM|SOP# 990)\n\n**Launch Date:** 2nd November 2025\n**Category:** LTO\n**Station:** Fryer\n\n**CALORIES:**\n• Regular: 220 kcal\n• Medium: 272 kcal\n• Large: 319 kcal\n\n**SWEET POTATO (Item Code: 121171):**\n• Packaging: 1 box = 5 Inners (1 Inner = 2.5 Kg)\n• Receiving & storage: @ Freezer\n• Primary shelf life: 16 months\n• Holding time in fry dump: 3 Mins\n• Cooking time: 2:00 Minutes (Fries vat)\n• No allergen content\n\n**SERVING SIZES:**\n• Combo meal replacement: 89g (Reg), 108g (Med), 129g (Large)\n\n**CHIPOTLE SAUCE (#121317):**\n• 45g portion\n• Secondary shelf life: 7 days @chilled\n• 48 Hours holding in soufflé cup @chilled\n\n**FRY DUMP SETUP:**\n• Built-in fry dump: place 1/3 pan horizontally in upper section for sweet potato\n• Separate from regular fries (left side for fries, right side for sweet potato)\n• DO NOT add salt\n\n**PREPARATION PROCEDURES:**\n1. Take bag of Sweet Potato from station freezer\n2. Hold bag horizontally, shake right to left to mix long and short fries\n3. Fill fry basket ½ max on stainless tray\n4. Shake off excess crumbs over tray before dropping into fryer\n5. Ensure fry vat @350°F\n6. Program 1 fryer button as LTO with 2 min cook, 3 min hold\n7. Gently lower basket, press timer (2 min)\n8. Don't drop 2nd basket in same vat before 30 sec (allow recovery)\n9. After 30 sec, lift basket completely, shake to prevent sticking, return\n10. After 2 min, lift basket, drain 10 sec at 45° angle\n11. Gently shake to remove excess oil\n12. Immediately take to fry dump (right side)\n13. Using black tongs, portion into fries cup\n14. Serve immediately with Chipotle sauce\n\n**SERVING:**\n• Solo orders: Medium or Large only\n• Dine-in: tray with 1 napkin, Chipotle sauce portion\n• Take-out/HD: paper bag #10 with same condiments\n• Combo replacement: +2 napkins, 2 ketchup, Chipotle sauce",

            "cheese fries": "🧀 **CHEESE FRIES** (SID|SOP# 612)\n\n**Launch Date:** April 2015\n**Station:** Fryer\n**Calories:** 350 kcal\n**Note:** Refer to SOP#230 for Tiffani Cheese Sauce Preparation\n\n**INGREDIENTS:**\n• 89g Regular French Fries (cooked)\n• 56g Tiffany Cheese Sauce\n• 3g Onion Chives\n\n**FRENCH FRIES STORAGE:**\n• Receiving & storage: Frozen 0°F\n• Packaging: 1 Case = 10 KG (4 inners @ 2.5 KG)\n• Primary shelf life: 12 months frozen\n• Cooking time: 2:30 Minutes\n• Holding Time: 7 Minutes\n\n**PREPARATION PROCEDURES:**\n1. Ensure fryer @350°F\n2. Cook one order regular fries per KUDU standard (or use from dump within holding time)\n3. Sprinkle dash salt if freshly cooked\n4. Bag regular size fries, dispense into designated cup\n5. Squeeze 56g Tiffani Cheese Sauce in 3 spirals on top from outside to inside\n6. Garnish with 3g onion chives\n7. Cover new side items cup\n8. Serve immediately\n\n**SERVING:**\n• Serve in designated side-item cup for dine-in or take-out\n• Condiments: 1 napkin, 1 plastic fork",
            
            "cheese nachos": "🧀 **CHEESE NACHOS** (SID|SOP# 619)\n\n**Launch Date:** April 1988\n**Station:** Fryer\n**Calories:** 294 kcal\n**Note:** Serve with 1 Tortilla sauce\n\n**INGREDIENTS:**\n• 3 Pieces Cheese Nachos\n• 1 Portion Tortilla Sauce\n\n**CHEESE NACHOS STORAGE:**\n• Receiving & storage: Frozen 0°F\n• Packaging: 1 Case = 36 Orders (2 inners @ 18 Orders)\n• Primary shelf life: 9 months frozen\n• Cooking time: 2:30 Minutes\n• PHU shelf life: 30 Minutes, code NACH\n• Max per PHU pan: 12 pieces\n\n**PREPARATION PROCEDURES:**\n1. Ensure fryer @350°F\n2. Pull Cheese Nachos from freezer, place in fryer basket\n3. Place basket in fryer, cook 2:30 minutes\n4. After 30 seconds, gently remove basket, shake to prevent sticking, return\n5. Remove basket, place to drain 10 seconds\n6. Place cooked Cheese Nachos in designated box\n7. Press Cheese Nacho icon on box\n\n**SERVING:**\n• Serve in small nugget box\n• Take-out: Paper bag #10\n• Condiments: 1 tortilla sauce, 1 napkin",
            
            "chicken nuggets": "🍗 **CHICKEN NUGGETS** (SID|SOP# 620)\n\n**Launch Date:** April 1988\n**Station:** Fryer\n**Calories:** 294 kcal\n**Note:** Serve with 1 Tortilla sauce\n\n**INGREDIENTS:**\n• 6 Pieces Chicken Nuggets\n• 1 Portion Tortilla Sauce\n\n**CHICKEN NUGGETS STORAGE:**\n• Receiving & storage: Frozen 0°F\n• Packaging: 1 Case = 500 Pcs (10 Inners @8.33 Order)\n• Primary shelf life: 12 months frozen\n• Cooking time: 3:30 Minutes\n• PHU shelf life: 30 Minutes, code NUGG\n\n**PREPARATION PROCEDURES:**\n1. Ensure fryer @350°F\n2. Pull chicken nuggets from freezer, place in fryer basket\n3. Place basket in fryer, cook 3:30 minutes until golden brown\n4. After 30 seconds, gently remove basket, shake to prevent sticking, return\n5. Remove basket, drain 10 seconds\n6. Place cooked nuggets in designated box\n\n**SERVING:**\n• Serve in small nugget box\n• Take-out: Paper bag #10\n• Condiments: 1 tortilla sauce, 1 napkin\n• Meal: with regular fries and small soft drink",
            
            "chicken strips side": "🐔 **CHICKEN STRIPS** (SID|SOP# 697)\n\n**Launch Date:** October 2022\n**Last Modified:** 9th Jan 2025 (Pepper Mayo replaced Burrito sauce)\n**Station:** Fryer\n**Calories:** 92 kcal (2 pieces)\n\n**INGREDIENTS:**\n• 2 Pieces Chicken Strips\n• 45g Pepper Mayo Sauce in soufflé cup #2\n\n**CHICKEN STRIPS STORAGE:**\n• Receiving & storage: Frozen 0°F\n• Packaging: 1 case = 10 Inners X 1 kg (1 inner 18 pcs)\n• Primary shelf life: 12 months frozen\n• Cooking time: 5:00 Minutes @350°F\n• PHU holding: 30 Minutes, code STR\n• Maximum per PHU pan: 10 pieces\n\n**PREPARATION PROCEDURES:**\n1. Ensure fryer @350°F\n2. Pull required number of strips (max 10 per basket)\n3. Shake off excess crumbs/ice over tray before dropping into fryer\n4. Place basket in fryer, cook 5:00 minutes\n5. After 30 seconds, gently remove basket, shake to prevent sticking, return\n6. When cooked, remove basket, place on hanger 10 seconds to drain\n7. Transfer to PHU pan (30 min hold)\n8. Using tong, remove strips, put in Kids Fry Bag\n\n**SERVING:**\n• Serve in kids fry bag for dine-in or take-out\n• Take-out/HD: bag #10\n• Condiments: 1 napkin, 45g Pepper Mayo in soufflé cup #2",
            
            "criss cut potato": "🥔 **CRISS CUT POTATO** (SID|SOP# 617)\n\n**Launch Date:** April 1988\n**Station:** Fryer\n**Last Modified:** Added Medium and Large sizes\n\n**SIZES:**\n• Regular: 6 pieces (3 small, 3 large)\n• Medium: 8 pieces (4 small, 4 large)\n• Large: 10 pieces (5 small, 5 large)\n\n**CRISS CUT POTATO STORAGE:**\n• Receiving & storage: Frozen 0°F\n• Packaging: 1 Case = 120 Orders (6 inners @20 order)\n• Primary shelf life: 12 months frozen\n• Cooking time: 3:00 Minutes @350°F\n\n**PREPARATION PROCEDURES:**\n1. Ensure fryer @350°F\n2. Pull criss cut potatoes from freezer\n3. Count pieces per size: Reg:6, Med:8, Lg:10\n4. Place in fryer basket\n5. Lower basket, cook 3:00 minutes\n6. After 30 seconds, gently remove basket, shake to prevent sticking, return\n7. When cooked, remove basket, tilt to drain excess oil\n\n**SERVING:**\n• Serve with Grilled Chicken Meal (6 pieces)\n• As side items with 2 ketchup packets",
            
            "french fries cooking": "🍟 **FRENCH FRIES COOKING & HOLDING** (SID|SOP# 611)\n\n**Launch Date:** April 1988\n**Station:** Fryer\n\n**FRENCH FRIES STORAGE:**\n• Keep inners in original box at all times to avoid breaking/defrost\n\n**COOKING PROCEDURES:**\n1. Take packet from reach-in freezer\n2. Shake bag to allow long and short fry distribution\n3. Fill basket ½ max\n4. Shake off excess crumbs/ice over tray before dropping\n5. Ensure fry vat @350°F\n6. Gently lower basket, press timer (2:30 min)\n7. Don't drop 2nd basket in same vat before 30 sec (allow recovery)\n8. After 30 sec, lift basket completely, shake to prevent sticking, return\n9. After 2:30 min, remove basket, drain 10 sec at 45° angle\n10. Gently shake to remove excess oil\n11. Immediately take to fry dump\n\n**HOLDING PROCEDURES:**\n1. Check holding time, rotate previously cooked product forward\n2. Place freshly cooked product behind rotated products\n3. Spread fries - don't clump\n4. Never mix old fries with new\n5. Maximum holding time: 7 minutes\n6. Using saltshaker, sprinkle salt evenly, toss with scooper\n7. If no program, use board marker to write expiry time on label\n8. Example: cooked 12:23, record as 12:30\n9. Follow FIFO, write time per standard\n10. Discard any exceeding holding time\n\n**FRENCH FRIES WEIGHTS:**\n• Raw: Kiddie 97g, Reg 118g, Med 144g, Lg 172g\n• Cooked: Kiddie 73g, Reg 89g, Med 108g, Lg 129g\n\n**FRENCH FRIES YIELDS (per bag):**\n• Kiddie: 20.5 orders\n• Regular: 17.75 orders\n• Medium: 13.75 orders\n• Large: 11.00 orders",
            
            "hash brown": "🥔 **HASH BROWN** (SID|SOP# 618)\n\n**Launch Date:** April 1988\n**Station:** Fryer\n\n**INGREDIENTS:**\n• 1 Portion Hash Brown (as side or in breakfast meals)\n\n**HASH BROWN STORAGE:**\n• Receiving & storage: Frozen 0°F\n• Packaging: 1 Case = 116 Pcs (2 Inners @58)\n• Primary shelf life: 18 months frozen\n• Cooking time: 3:00 Minutes @350°F\n• PHU shelf life: 30 Minutes, code HASH\n• Maximum per PHU pan: 12 pieces\n\n**PREPARATION PROCEDURES:**\n1. Ensure fryer @350°F\n2. Pull hash brown from freezer, place in fryer basket\n3. Place basket in fryer, cook 3:00 minutes until golden brown\n4. After 30 seconds, gently remove basket, shake to prevent sticking, return\n5. Remove basket, drain 10 seconds\n\n**SERVING:**\n• As side item: in kids fry bag\n• Breakfast: 1 portion with Steak & Eggs; 2 portions with KUDU Breakfast & Club Breakfast\n• Condiments: 1 napkin, 1 ketchup packet on request",
            
            "kudu chicken bites": "🐔 **KUDU CHICKEN BITES** (SID|SOP# 692)\n\n**Launch Date:** 4th May 2020\n**Station:** Fryer\n**Calories:** 256 kcal (6 pieces)\n**Note:** Served with guest choice of sauce (1000 Islands/BBQ/KUDU Dressing)\n\n**INGREDIENTS:**\n• 6 Pieces KUDU Chicken Bites\n• Sauce choice: 56g 1000 Islands, BBQ, or KUDU Dressing\n\n**KUDU CHICKEN BITES STORAGE:**\n• Receiving & storage: Frozen 0°F\n• Packaging: 1 Case = 10 Inners (1 inner @ 42 pieces)\n• Primary shelf life: 12 months frozen\n• Cooking time: 4:15 Minutes @350°F\n• PHU shelf life: 30 Minutes, code BITE\n• Maximum per PHU pan: 36 Pieces\n\n**SAUCES STORAGE:**\n• Receiving & storage: Chilled 34°F-40°F\n• Shelf life after opening:\n  - BBQ & 1000 Island: 10 days\n  - KUDU Dressing: 2 days\n• Portioned: 56g in soufflé cups, 48 hours @chilled\n\n**PREPARATION PROCEDURES:**\n1. Ensure fryer @350°F\n2. Pull required amount from freezer, place in basket\n3. Cook 4:15 minutes\n4. After 30 seconds, gently remove basket, shake to prevent sticking, return\n5. When cooked, remove basket, place on hanger, tilt 10 seconds to drain\n6. Transfer to PHU pan (30 min hold, max 36)\n7. On order, remove 6 pieces, place in designated cup\n\n**SERVING:**\n• Dine-in: cup with sauce, 1 napkin, 1 fork\n• Take-out/HD: bag #10 with same condiments",
            
            "kudu salad": "🥗 **KUDU SALAD / CHICKEN SALAD** (SID|SOP# 691)\n\n**Launch Date:** 20th Feb 2019\n**Last Modified:** August 2023 (Green Salad 125g instead of 150g)\n**Station:** Burger\n\n**CALORIES:**\n• KUDU Salad: 196 kcal\n• Chicken Salad: 368 kcal\n\n**KUDU SALAD INGREDIENTS:**\n• 125g Green Salad (#120389)\n• 4 Cherry Tomatoes\n• 4 Cucumber Slices (¼\")\n• 28g Italian Dressing\n• 20g Green Pepper (Julienne)\n• 35g Sweet Corn (#120488)\n• 1 Portion Croutons Bread\n• 1 Portion KUDU Dressing\n\n**CHICKEN SALAD:** Add 1 Cooked Grilled Chicken Small\n\n**GREEN SALAD STORAGE:**\n• Receiving & storage: Chilled @34°F-40°F\n• Primary shelf life: 4 days @ Chilled\n• Secondary: Once opened 18 hours in food container @chilled\n• Packaging: 1 KG\n\n**SWEET CORN STORAGE:**\n• Receiving & storage: Room Temperature\n• Primary shelf life: 18 Months @ Room Temperature\n• Secondary: Once opened 48 hours in pan @chilled (drain brine first)\n• Packaging: Can (410 Grams)\n\n**GREEN PEPPER JULIENNE PREPARATION:**\n• Wash & sanitize green pepper\n• Cut into Julienne strips (1/8\"), cut in two halves\n• Length: 4-6 CM\n• Place in pan @34°-40°F for 18 hours\n• Use 2 oz broasted cup to scoop\n\n**KUDU SALAD PREPARATION:**\n1. Place 125g Green Salad in salad container\n2. Add 4 Cherry tomatoes\n3. Add 4 cucumber slices\n4. Evenly spread 35g Sweet corn (2 oz cup)\n5. Evenly spread 20g Green Pepper Julienne\n6. Cover with lid\n\n**CHICKEN SALAD PREPARATION:**\n1. Pull 1 order Grill Chicken small (110g), place on char grill (knob #5)\n2. Drizzle with ½ oz Italian dressing covering entire surface\n3. Cook 2 minutes\n4. Turn, drizzle another ½ oz Italian dressing, cook 2 minutes\n5. Place cooked chicken on clean flat grill, cut into ¼\" julienne strips\n6. Place chicken strips on top of salad\n7. Cover, serve immediately\n\n**SERVING:**\n• Dine-in: with dressing (KUDU or Italian), plastic knife/fork, salt & pepper sachets, croutons packet\n• Take-out: bag #25 with all condiments",
            
            "spicy chicken bites": "🔥 **SPICY CHICKEN BITES** (SID|SOP# 693)\n\n**Launch Date:** 15th Dec 2020\n**Station:** Fryer\n**Calories:** 247 kcal (6 pieces)\n**Note:** Served with 1000 Island sauce\n\n**INGREDIENTS:**\n• 6 Pieces Spicy Chicken Bites\n• 56g 1000 Island Sauce\n\n**SPICY CHICKEN BITES STORAGE:**\n• Receiving & storage: Frozen 0°F\n• Packaging: 1 Case = 10 Inners (1 inner @ 42 pieces)\n• Primary shelf life: 12 months frozen\n• Cooking time: 4:00 Minutes @350°F\n• PHU shelf life: 30 Minutes, code BITE\n• Maximum per PHU pan: 36 Pieces\n\n**1000 ISLAND SAUCE STORAGE:**\n• Receiving & storage: Chilled 34°F-40°F\n• Shelf life after opening: 10 days\n• Portioned: 56g in soufflé cups, 48 hours @chilled\n\n**PREPARATION PROCEDURES:**\n1. Ensure fryer @350°F\n2. Pull required amount from freezer, place in basket\n3. Cook 4:00 minutes\n4. After 30 seconds, gently remove basket, shake to prevent sticking, return\n5. When cooked, remove basket, place on hanger, tilt 10 seconds to drain\n6. Transfer to PHU pan (30 min hold, max 36)\n7. On order, remove 6 pieces, place in designated cup\n\n**SERVING:**\n• Dine-in: cup with 1000 Island sauce, 1 napkin, 1 fork\n• Take-out/HD: bag #10 with same condiments",

            "kudu chicken steak": "🐔 **KUDU CHICKEN** (STK|SOP# 511)\n\n**Launch Date:** April 1988\n**Station:** Steak Station\n**Calories:** 609 kcal\n\n**INGREDIENTS:**\n• 1 KUDU Chicken (110g)\n• 14g Diced Onion (1 tablespoon)\n• 1 Dash KUDU Seasoning\n• 7g Diced Green Pepper (1 teaspoon)\n• 7g Soy Sauce\n• 1 Steak Bread (10\")\n• 28g Mayonnaise\n• 35g Lettuce\n• 2 Half-moon Tomato (¼\")\n\n**CHICKEN STEAKS STORAGE:**\n• Receiving & storage: Frozen 0°F / Thawed 34°F-40°F\n• Packaging: 1 Case = 50 Pcs\n• Primary shelf life: 6 months frozen\n• Secondary shelf life (chiller): 72 hours\n• Thaw: 24 hours / Use: 48 Hours\n• Cooking time: 3-4 Minutes\n\n**PHU PROCEDURE:**\n• Holding time: 30 minutes in PHU with cover (code KDCH)\n• Cook 3:00 minutes before transferring to PHU\n• Use ½ cup (125 ml) for one order\n• When cooking from PHU, add all ingredients, cook 1:30 minute\n\n**CONFORMANCE CHECK (daily by MIC/above):**\n• Weight with box: 340g (±5g)\n• Temperature: ≥140°F (check protein inside)\n• Quality: bread golden brown, evenly seeded, cut into 2 even halves, not crumbled\n• Chicken golden brown, distributed evenly between heel & tomatoes\n• Onion & green pepper mixed properly\n• Lettuce fresh & green, tomato red & firm, mayonnaise edge to edge\n\n**PREPARATION PROCEDURES:**\n1. Flat grill @300°F-350°F, spray oil once\n2. Place chicken on greased grill, cook, discard gloves (max 10 orders)\n3. Separate using metal spatula and scrapper\n4. Garnish steak bread: remove 8g inner part from crown\n5. Squeeze 28g mayonnaise oval on crown, place lettuce and tomato evenly\n6. Place bread on flat grill @200°F-250°F (crown up, cut side to garnish) for 45 sec\n7. Add diced onion (14g) to chicken, toss & mix\n8. Sprinkle KUDU seasoning, toss & mix\n9. Turn bread, heat other side 45 sec\n10. Add diced green pepper (7g), toss & mix\n11. When meat almost ready, add soy sauce, toss & mix\n12. After 3-4 min, line meat 8\" long on grill\n13. Scoop chicken onto heel side\n14. Transfer to garnish, cut in half\n15. Place in sandwich box, press KUDU Chicken button\n\n**SERVING:**\n• Sandwich only: 1 ketchup, 1 napkin\n• Meal: 2 ketchup, 2 napkins, regular fries, regular soft drink\n• Take-out: Paper bag #20",
            
            "kudu beef steak": "🥩 **KUDU BEEF** (STK|SOP# 512)\n\n**Launch Date:** April 1988\n**Station:** Steak Station\n**Calories:** 715 kcal\n\n**INGREDIENTS:**\n• 1 KUDU Beef (110g)\n• 14g Diced Onion (1 tablespoon)\n• 1 Dash KUDU Seasoning\n• 7g Diced Green Pepper (1 teaspoon)\n• ¼ oz Soy Sauce\n• 1 Steak Bread (10\")\n• 28g Mayonnaise\n• 35g Lettuce\n• 2 Half-moon Tomato (¼\")\n• 1 Slice Yellow Cheese (rectangular, cut in half)\n\n**BEEF STEAKS STORAGE:**\n• Receiving & storage: Frozen 0°F / Thawed 34°F-40°F\n• Packaging: 1 Case = 50 Pcs\n• Primary shelf life: 6 months frozen\n• Secondary shelf life (chiller): 72 hours\n• Thaw: 24 hours / Use: 48 Hours\n• Cooking time: 4-5 Minutes\n\n**PHU PROCEDURE:**\n• Holding time: 30 minutes in PHU with cover (code KDBF)\n• Cook 4:00 minutes before transferring to PHU\n• Use ½ cup (125 ml) for one order\n• When cooking from PHU, add all ingredients together, cook 1:30 minute\n\n**PREPARATION PROCEDURES:**\n1. Flat grill @300°F-350°F, spray oil once\n2. Place beef on greased grill, cook, discard gloves (max 10 orders)\n3. Garnish steak bread: remove 8g inner part from crown\n4. Squeeze 28g mayonnaise oval on crown, place lettuce and tomato evenly\n5. Place bread on flat grill @200°F-250°F (crown up, cut side to garnish)\n6. Add diced onion (14g) to beef, toss & mix\n7. Sprinkle KUDU seasoning, toss & mix\n8. Turn bread, heat other side\n9. Add diced green pepper (7g), toss & mix\n10. When meat almost ready, add soy sauce, toss & mix\n11. After 4-5 min, line meat 8\" long on grill\n12. Add 2 halves yellow cheese evenly on top of meat\n13. Scoop beef onto heel side (ensure cheese toward heel)\n14. Transfer to garnish, cut in half\n15. Place in sandwich box, press KUDU Beef button\n\n**SERVING:**\n• Sandwich only: 1 ketchup, 1 napkin\n• Meal: 2 ketchup, 2 napkins, regular fries, regular soft drink\n• Take-out: Paper bag #20",
            
            "lafino kudu chicken": "🌯 **LAFINO KUDU CHICKEN** (STK|SOP# 517)\n\n**Launch Date:** April 2009\n**Station:** Steak Station\n**Calories:** 575 kcal\n\n**INGREDIENTS:**\n• 1 KUDU Chicken (110g)\n• 14g Diced Onion (1 tablespoon)\n• 1 Dash KUDU Seasoning\n• 7g Diced Green Pepper (1 teaspoon)\n• 7g Soy Sauce\n• 1 Tortilla Bread (12\")\n• 28g Burrito Sauce\n• 35g Lettuce\n• 2 Half-moon Tomato (¼\")\n• 1 Slice Yellow Cheese (rectangular, cut in half)\n\n**CHICKEN STEAKS STORAGE:**\n• Receiving & storage: Frozen 0°F / Thawed 34°F-40°F\n• Packaging: 1 Case = 50 Pcs\n• Primary shelf life: 6 months frozen\n• Secondary shelf life (chiller): 72 hours\n• Thaw: 24 hours / Use: 48 Hours\n• Cooking time: 3-4 Minutes\n\n**PREPARATION PROCEDURES:**\n1. Flat grill @300°F-350°F, spray oil once\n2. Place chicken on greased grill, cook, discard gloves (max 10 orders)\n3. Add ingredients in sequence: diced onion, KUDU seasoning, green pepper - toss each time\n4. When meat almost cooked, add soy sauce, toss\n5. Garnish tortilla bread (light side) in middle with lettuce and 2 tomato slices\n6. After 3-4 min, line chicken 8\" long on grill\n7. Scoop chicken onto garnish\n8. Squeeze 28g burrito sauce zigzag on chicken\n9. Add 2 halves yellow cheese\n10. Fold both ends 1\" each side, roll tight\n11. Toast in panini 30 sec (max 4, 1cm apart)\n12. Transfer with turner\n13. Wrap with big waxed wrap, place in designated box\n\n**SERVING:**\n• Dine-in: original box on tray\n• Take-out: Paper bag #20\n• Sandwich only: 1 ketchup, 1 napkin\n• Meal: 2 ketchup, 2 napkins, regular fries, regular soft drink",
            
            "spicy kudu chicken": "🔥 **SPICY KUDU CHICKEN** (STK|SOP# 515)\n\n**Launch Date:** April 2017\n**Station:** Steak Station\n**Calories:** 690 kcal\n\n**INGREDIENTS:**\n• 1 Spicy Chicken Steak\n• 14g Diced Onion (1 tablespoon)\n• 7g Diced Green Pepper (1 teaspoon)\n• 1 Slice White Cheese\n• 1 Steak Bread (10\")\n• 28g Harissa Mayo\n• 35g Shredded Lettuce\n• 2 Half-moon Tomato (¼\")\n\n**SPICY CHICKEN STORAGE:**\n• Receiving & storage: Frozen 0°F / Thawed 34°F-40°F\n• Packaging: 1 Case = 50 Pcs\n• Primary shelf life: 9 months frozen\n• Secondary shelf life (chiller): 72 hours\n• Thaw: 24 hours / Use: 48 Hours\n• Cooking time: 3-4 Minutes\n\n**PHU PROCEDURE:**\n• Holding time: 30 minutes in PHU with cover (code SPCH)\n• Cook 3:00 minutes before transferring to PHU\n• Use ½ cup (125 ml) for one order\n• When cooking from PHU, add onion and green pepper together, cook 1:30 minute\n\n**PREPARATION PROCEDURES:**\n1. Flat grill @300°F-350°F, spray oil once\n2. Place spicy chicken on right side of 36\" grill, cook, discard gloves (max 10 orders)\n3. Garnish steak bread: remove 8g inner part from crown\n4. Squeeze 28g harissa mayo oval inside bread (crown)\n5. Place lettuce and tomato evenly inside bread\n6. Place bread on flat grill @250°F (crown up, cut side to garnish)\n7. Add diced onion to chicken, toss & mix\n8. Turn bread, heat other side\n9. Add diced green pepper, toss & mix\n10. After 3-4 min, line meat 8\" long on grill\n11. Add 1 slice white cheese (cut in 2 halves) until soft (not melted)\n12. Scoop chicken into bread\n13. Transfer to garnish, cut in half\n14. Place in sandwich box, press spicy chicken button\n\n**SERVING:**\n• Sandwich only: 1 ketchup, 1 napkin\n• Meal: 2 ketchup, 2 napkins, regular fries, regular soft drink\n• Take-out: Paper bag #20",

            // ----- JOB PROFILES (DETAILED) -----
            "service crew": "👨‍🍳 **SERVICE CREW - Entry Level**\n\nThe Service Crew should prepare the food, serve guests and carry out tasks necessary for efficient running of the restaurants including the maintenance of our ambitious standards of cleanliness. They are responsible for generating sales and deliver guest service at its best. Service crew should be able to work solely on all 9 stations existing in our operations.\n\n**KEY RESPONSIBILITIES:**\n• Following KUDU's operation procedures on terms of appearance and personal hygiene\n• Following Quality, Service, Cleanliness & Hospitality procedures\n• Arriving on time and staying until shift completion\n• Receiving and storing supplies properly\n• Cooperating with management in learning new skills\n• Knowing assigned workstations procedures\n• Using equipment and tools safely\n• Greeting guests promptly and asking for feedback\n• Delivering consistent outstanding service\n• Maintaining speed of service targets\n• Recommending meals and deals to guests\n• Responding to guest complaints\n• Following preparation standards\n• Rotating stored food items\n• Assembling and packing orders correctly\n• Assisting colleagues when not busy\n• Participating in store meetings\n\n**9 STATIONS:**\n1. Receiving & Storage\n2. Preparation\n3. Breakfast\n4. Burger Station\n5. Steak Station\n6. Side Items\n7. Dessert\n8. Equipment's\n9. Guest Service",
            
            "crew leader": "👥 **CREW LEADER - Training Support**\n\nThe Crew Leader assists management to execute training plans for service crew and supports the Manager On Duty with delegated operational tasks. They are potential candidates for Shift Manager positions due to their excellent expertise in KUDU Systems.\n\n**POSITION PURPOSE:** Assist management to execute training plans for service new and support Manager On Duty as he could delegate few operations tasks to Crew Leader.\n\n**KEY RESPONSIBILITIES:**\n\n**TRAINING SUPPORT:**\n• Supporting service crew training by assisting restaurant management for setting proper training plans\n• Conducting proper in-store induction for new employees\n• Ensuring training materials are updated and available\n• Helping Manager On Duty execute training plans\n• Leading by example through personal hygiene and uniform standards\n• Training staff on equipment handling and chemical usage\n• Reinforcing hand washing procedures\n• Helping service crew execute new operations platforms\n• Reflecting KUDU Values in all actions\n\n**GREAT SERVICE:**\n• Working hand-to-hand with service crew to prepare orders\n• Responding quickly to guest complaints\n• Asking for guest feedback\n• Communicating Mystery Shopper results\n• Briefing staff on promotions\n• Ensuring workstations are stocked for rush times\n\n**OPERATIONS:**\n• Receiving delegated operational tasks\n• Ensuring staff follow preparation guides\n• Monitoring and discarding expired products\n• Following up food preparation procedures\n• Helping with daily cleaning tasks\n• Keeping back door locked\n• Being aware of security issues\n• Ensuring PPE availability\n• Maintaining first aid kit\n• Knowing health and safety responsibilities\n• Reporting hazardous situations immediately",
            
            "shift manager": "⏱️ **SHIFT MANAGER - Operations Leader**\n\nThe Shift Manager leads assigned shifts with smooth and profitable operations, providing great guest experience for KUDU guests consistently through coordination and controlling People, Products, Equipment and other restaurant resources within KUDU standards.\n\n**POSITION PURPOSE:** Lead assigned shifts with a smooth and profitable operations and provide great guest experience for KUDU Guests consistently through coordination and controlling People, Products, Equipment and other restaurant resources to within KUDU standards.\n\n**KEY RESPONSIBILITIES:**\n\n**PEOPLE MANAGEMENT:**\n• Providing supportive environment for new employees\n• Using KUDU training materials for crew and crew leaders\n• Creating motivational climate\n• Assigning cleaning tasks\n• Conducting staff briefings\n• Ensuring HR policies and safety procedures compliance\n\n**GUEST FOCUS:**\n• Putting guests first in all decisions\n• Demonstrating guest-first service through interaction and feedback\n• Ensuring effective staff positioning for projected sales\n• Completing KUDU Routine tasks within timeframes\n• Monitoring SOS and providing feedback\n• Resolving guest complaints\n\n**SALES BUILDING:**\n• Motivating team to achieve sales targets\n• Ensuring security measures for cash management and assets\n• Training team for promotions and LSM initiatives\n\n**BUSINESS RESULTS:**\n• Controlling P&L line items\n• Reporting hazardous situations\n• Ensuring hygiene and safety procedures\n• Maintaining equipment operation and maintenance\n• Taking inventory for ordering and quality control",
            
            "assistant restaurant manager": "📋 **ASSISTANT RESTAURANT MANAGER**\n\nThe Assistant Restaurant Manager assists the restaurant manager to carry out all daily operational functions and duties within KUDU Restaurant. In some cases, they might replace the restaurant manager in their absence to ensure Great Guest Experience is delivered consistently and maximize sales and profits through excellent operations and well-trained restaurant team.\n\n**POSITION PURPOSE:** Assist the restaurant manager to carry out all daily operational functions and duties within KUDU Restaurant and in some cases, he might replace the restaurant manager in his absence to ensure Great Guest Experience is delivered consistently and maximize sales and profits through excellent operations and well-trained restaurant team.\n\n**KEY RESPONSIBILITIES:**\n\n**PEOPLE MANAGEMENT:**\n• Using KUDU training materials to provide training for crew, crew leaders, and manager trainees\n• Creating motivational climate\n• Supervising staff in cleaning and maintenance\n• Assisting with staff appraisals and development plans\n• Conducting staff briefings\n• Delegating tasks to maximize potential\n• Ensuring HR policies and safety procedures\n\n**GUEST FOCUS:**\n• Putting guests first in all decisions\n• Demonstrating guest-first service\n• Ensuring team readiness for best guest experience\n• Monitoring SOS and providing feedback\n• Resolving guest complaints\n\n**SALES BUILDING:**\n• Monitoring daily sales parameters and comparing with targets\n• Collaborating on sales opportunities through KRBP\n• Ensuring security measures for cash and assets\n• Ensuring proper promotion execution and LSM initiatives\n\n**BUSINESS RESULTS:**\n• Assisting restaurant manager to control P&L line items\n• Making operational decisions within policy\n• Ensuring hygiene and safety procedures\n• Maintaining equipment operation and maintenance\n• Taking inventory\n• Assisting with audits and action plans",
            
            "restaurant manager": "🏢 **RESTAURANT MANAGER**\n\nThe Restaurant Manager leads a KUDU Restaurant to ensure Great Guest Experience is delivered consistently and maximize sales and profits through excellent operations and well-trained restaurant team. They consistently demonstrate KUDU's values and leadership behaviours to build positive business relationships.\n\n**POSITION PURPOSE:** Lead a KUDU Restaurant to ensure Great Guest Experience is delivered consistently and maximize sales and profits through excellent operations and well-trained restaurant team.\n\n**KEY RESPONSIBILITIES:**\n\n**PEOPLE MANAGEMENT:**\n• Leading subordinates by setting clear expectations and providing coaching\n• Ensuring all staff are trained to KUDU standards\n• Providing training and development plans\n• Creating motivational climate to reduce turnover\n• Conducting appraisals and development plans\n• Conducting regular meetings\n• Delegating key tasks\n• Educating on HR policies and ensuring compliance\n\n**GUEST FOCUS:**\n• Putting guests first in all decisions\n• Representing KUDU brand excellently through well-maintained restaurant and high QSC standards\n• Demonstrating guest-first service through observation and corrective actions\n• Ensuring restaurant readiness through KUDU Routine execution\n• Monitoring SOS and enhancing service time\n• Ensuring new promotions/LTOs are served properly\n• Solving guest complaints quickly and effectively\n\n**SALES BUILDING:**\n• Making accurate sales projections and communicating targets\n• Monitoring daily sales parameters\n• Collaborating on sales opportunities through KRBP\n• Ensuring security measures\n• Being aware of competition and local market\n• Executing LSM and national promotions\n\n**BUSINESS RESULTS:**\n• Monitoring monthly P&L reports and developing action plans\n• Assigning P&L responsibilities to management team\n• Creating positive work environment\n• Ensuring proper hygiene and safety levels\n• Completing audits and action plans",
            
            "area supervisor": "📊 **AREA SUPERVISOR**\n\nThe Area Supervisor provides leadership, coaching, and direction to a batch of restaurants through people development and improved restaurant operations, to maximize the long-term sales and profit of each restaurant. They lead batch of 3 Restaurant Managers to drive priority business opportunities.\n\n**POSITION PURPOSE:** To provide leadership, coaching, and direction to his batch of restaurants through people development and improved restaurant operations, to maximize the long-term sales and profit of each restaurant.\n\n**KEY RESPONSIBILITIES:**\n\n**PEOPLE MANAGEMENT:**\n• Championing KUDU People Promise through respect, recognition, resources, values, and learning opportunities\n• Ensuring adequate staffing through proper allocations and retention\n• Collaborating on performance targets and reviews\n• Educating on HR policies and ensuring compliance\n• Partnering with Training Department\n• Identifying operational opportunities through data analysis\n\n**GUEST FOCUS:**\n• Putting guests first in all decisions\n• Collaborating to provide input on guest experience drawbacks\n• Protecting KUDU brand by ensuring QSC standards\n• Demonstrating guest-first service through observation and corrective actions\n\n**SALES BUILDING:**\n• Teaching and coaching restaurant managers to execute high QSC initiatives\n• Partnering with experts to complete assessments and develop action plans\n• Ensuring execution of action plans for improved results\n• Ensuring proper execution of LSM and promotions\n\n**BUSINESS RESULTS:**\n• Collaborating on annual business plans\n• Using information resources to identify opportunities and threats\n• Creating positive work environment while achieving business results\n• Completing various audits to ensure standard practices",
            
            // ----- OPERATIONAL KNOWLEDGE -----
            "kudu academy": "📚 **KUDU ACADEMY**\n\nKUDU Academy is the company's training platform that provides educational modules for all positions. It includes technical training, operational procedures, and certification processes. Service crew must complete all KUDU Academy modules, and managers are responsible for certifying completion through selfie videos.\n\n**MODULES COVER:**\n• Receiving & Storage\n• Preparation Procedures\n• Breakfast Station\n• Burger Station\n• Steak Station\n• Side Items\n• Dessert Station\n• Equipment Operation\n• Guest Service\n• Food Safety\n• Hygiene Standards\n• Chemical Usage\n• Personal Protective Equipment (PPE)\n\n**CERTIFICATION:**\n• Only managers can certify service crew selfie videos on KUDU Academy",
            
            "kudu routine": "✅ **KUDU ROUTINE**\n\nKUDU Routine is a comprehensive operational checklist and procedure system that ensures consistent high standards of Quality, Service, and Cleanliness (QSC) across all restaurants. It includes tasks for food preparation, equipment maintenance, cleaning procedures, inventory management, and guest service standards that must be completed within proper timeframes.",
            
            "qsc standards": "⭐ **QSC STANDARDS**\n\nQuality, Service, and Cleanliness (QSC) are KUDU's fundamental operational standards:\n\n**QUALITY:**\n• Fresh, high-quality food preparation\n• Proper ingredient storage\n• Temperature control\n• FIFO rotation\n\n**SERVICE:**\n• Excellent guest experience\n• Speed of Service (SOS) targets\n• Guest feedback management\n• Promotion knowledge\n\n**CLEANLINESS:**\n• Hygiene standards\n• Safety procedures\n• Restaurant appearance\n• Equipment sanitation",
            
            "mystery shopper": "🕵️ **MYSTERY SHOPPER**\n\nKUDU's quality assessment program where anonymous evaluators visit restaurants to assess service quality, food standards, and overall guest experience. Results are communicated to staff to enhance performance and encourage consistent great results.",
            
            "sos": "⏱️ **SPEED OF SERVICE (SOS)**\n\nSpeed of Service is a key performance metric measuring how quickly orders are prepared and served to guests. Teams are expected to maintain SOS targets and receive regular feedback on results to enhance service time.",
            
            "kudu ppe": "🛡️ **PERSONAL PROTECTIVE EQUIPMENT (PPE)**\n\nAt KUDU, PPE includes:\n• Appropriate uniforms\n• Gloves for food handling\n• Hairnets/hats\n• Slip-resistant footwear\n• Additional protective gear for specific tasks\n\nManagement must ensure PPE availability for all staff.",
            
            "kudu food safety": "🧼 **FOOD SAFETY PROCEDURES**\n\n• Receiving/storage temperatures: Chilled 34°F-40°F, Frozen 0°F to -10°F\n• FIFO rotation\n• Monitor expiration dates\n• Proper hand washing systems\n• Sanitization procedures\n• Temperature checks: eggs @250°F, steak/fryer @350°F\n\n**PHU HOLDING TIMES:**\n• Chicken strips: 30 min max, 10 pcs per pan (STR)\n• Hot dogs: 300 min (5 hours), 10 pcs per pan (HDOG)\n• Hash browns: 30 min, 12 pcs per pan (HASH)\n• Spicy Chicken Fillet: 30 min, 4 pcs per pan (QTR)\n• Regular Quatro Fillet: 30 min, 4 pcs per pan (QTRR)\n• Grilled Chicken: 30 min with cover (GRLB)\n• Philly Beef: 30 min with cover (PHBF)\n• Omelet: 30 min with cover (EGG)\n• Junior Chicken: 30 min, 8 pcs per pan (JCB)\n• Chicken Nuggets: 30 min, 16 pcs per pan (NUGG)\n• Chicken Burger: 30 min, 5 pcs per pan (CHBU)\n• Spicy Chicken Burger: 30 min, 8 pcs per pan (SCB)\n• Crispy Bits: 30 min with cover, 4 packs per pan (BITS)\n• KUDU Chicken Bites: 30 min, 36 pcs per pan (BITE)\n• Cheese Nachos: 30 min, 12 pcs per pan (NACH)\n• KUDU Chicken (cooked): 30 min with cover (KDCH)\n• KUDU Beef (cooked): 30 min with cover (KDBF)\n• Spicy Chicken (cooked): 30 min with cover (SPCH)\n\n**FRENCH FRIES HOLDING:** 7 minutes in fry dump only (not PHU)",
            
            "kudu holding times": "⏲️ **PHU HOLDING TIMES**\n\n• Chicken Strips: 30 minutes, 10 pcs (STR)\n• Hot Dogs: 300 minutes (5 hours), 10 pcs (HDOG)\n• Hash Browns: 30 minutes, 12 pcs (HASH)\n• Spicy Chicken Fillet: 30 minutes, 4 pcs (QTR)\n• Regular Quatro Fillet: 30 minutes, 4 pcs (QTRR)\n• Grilled Chicken: 30 minutes with cover (GRLB)\n• Philly Beef: 30 minutes with cover (PHBF)\n• Omelet: 30 minutes with cover (EGG)\n• Junior Chicken: 30 minutes, 8 pcs (JCB)\n• Chicken Nuggets: 30 minutes, 16 pcs (NUGG)\n• Chicken Burger: 30 minutes, 5 pcs (CHBU)\n• Spicy Chicken Burger: 30 minutes, 8 pcs (SCB)\n• Crispy Bits: 30 minutes, 4 packs (BITS)\n• KUDU Chicken Bites: 30 minutes, 36 pcs (BITE)\n• Cheese Nachos: 30 minutes, 12 pcs (NACH)\n• KUDU Chicken (cooked): 30 minutes with cover (KDCH)\n• KUDU Beef (cooked): 30 minutes with cover (KDBF)\n• Spicy Chicken (cooked): 30 minutes with cover (SPCH)\n\n**FRENCH FRIES:** 7 minutes in fry dump only (not PHU)\n\nAlways check product names in PHU and never exceed holding times.",
            
            "workstations": "🔧 **KUDU WORKSTATIONS (9)**\n\n1. Receiving & Storage\n2. Preparation\n3. Breakfast\n4. Burger Station\n5. Steak Station\n6. Side Items\n7. Dessert\n8. Equipment's\n9. Guest Service\n\nService crew must master all stations.",
            
            "career progression": "📈 **CAREER PROGRESSION AT KUDU**\n\nService Crew → Crew Leader → Shift Manager → Assistant Restaurant Manager → Restaurant Manager → Area Supervisor\n\nEach advancement requires:\n• Mastering KUDU systems\n• Demonstrating leadership capabilities\n• Maintaining high operational standards\n• Completing required training through KUDU Academy\n\nCrew Leaders are specifically identified as excellent candidates for Shift Manager positions due to their expertise in KUDU Systems.",
            
            "training": "🎓 **TRAINING AT KUDU**\n\nKUDU provides comprehensive training through:\n• KUDU Academy modules\n• In-store induction programs\n• Technical training\n• Ongoing development plans\n\n**COVERS:**\n• Operational procedures\n• Equipment handling\n• Food safety\n• Customer service\n• Leadership development\n• KUDU core values\n\nOnly managers can certify service crew selfie videos on KUDU Academy. Training includes proper hygiene standards, chemical usage, personal protective equipment, hand washing systems, and new operations platforms.",
            
            "job profile": "👔 **KUDU JOB PROFILES**\n\nKUDU has several key positions with clear career progression:\n\n1. **SERVICE CREW** - Entry level, food preparation, guest service across 9 stations\n2. **CREW LEADER** - Training support, operational assistance\n3. **SHIFT MANAGER** - Shift leadership, operations management\n4. **ASSISTANT RESTAURANT MANAGER** - Daily operations, management support\n5. **RESTAURANT MANAGER** - Overall restaurant leadership, P&L responsibility\n6. **AREA SUPERVISOR** - Multi-restaurant oversight (3 restaurants)\n\nEach role has specific responsibilities for maintaining KUDU's standards of Quality, Service, and Cleanliness while delivering great guest experiences.",

        // search index
        const searchIndex = {};
        for (let key in knowledgeBase) {
            if (key !== 'default') {
                searchIndex[key.toLowerCase()] = key;
            }
        }

        // ----- mobile state -----
        let currentTheme = localStorage.getItem('kudu_theme_mobile') || 'dark';
        let chats = JSON.parse(localStorage.getItem('kudu_chats_mobile')) || {};
        let currentChatId = null;
        let isTyping = false;

        // DOM elements
        const messagesDiv = document.getElementById('chatMessagesMobile');
        const welcomeDiv = document.getElementById('welcomeMobile');
        const input = document.getElementById('chatInputMobile');
        const sendBtn = document.getElementById('sendBtnMobile');
        const voiceBtn = document.getElementById('voiceBtnMobile');
        const menuToggle = document.getElementById('menuToggleMobile');
        const overlay = document.getElementById('sidebarOverlay');
        const panel = document.getElementById('sidebarPanel');
        const newChatBtn = document.getElementById('newChatMobile');
        const themeToggle = document.getElementById('themeToggleMobile');
        const clearMobile = document.getElementById('clearMobile');
        const exportMobile = document.getElementById('exportMobile');
        const clearModal = document.getElementById('clearModalMobile');
        const cancelClear = document.getElementById('cancelClearMobile');
        const confirmClear = document.getElementById('confirmClearMobile');
        const chatHistoryDiv = document.getElementById('chatHistoryMobile');
        const totalChatsSpan = document.getElementById('totalChatsMobile');
        const totalMessagesSpan = document.getElementById('totalMessagesMobile');
        const popularSpan = document.getElementById('popularTopicMobile');
        const suggestedDiv = document.getElementById('suggestedMobile');
        const quickRepliesDiv = document.getElementById('quickRepliesMobile');
        const langIndicator = document.getElementById('languageIndicatorMobile');

        // speech recognition
        let recognition = null;
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';
            recognition.onstart = () => { voiceBtn.innerHTML = '<i class="fas fa-microphone-alt"></i>'; };
            recognition.onend = () => { voiceBtn.innerHTML = '<i class="fas fa-microphone"></i>'; };
            recognition.onresult = (e) => {
                input.value = e.results[0][0].transcript;
                autoResize();
                sendMessage();
            };
        }

        // init
        function initMobile() {
            document.body.setAttribute('data-theme', currentTheme);
            updateThemeIcon();
            renderChatHistory();
            updateStats();
            renderSuggested();
            loadLastChat();

            // listeners
            sendBtn.addEventListener('click', sendMessage);
            input.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
            input.addEventListener('input', autoResize);
            menuToggle.addEventListener('click', () => {
                panel.classList.add('active');
                overlay.classList.add('active');
            });
            overlay.addEventListener('click', closeSidebar);
            newChatBtn.addEventListener('click', startNewChat);
            themeToggle.addEventListener('click', toggleTheme);
            clearMobile.addEventListener('click', () => clearModal.style.display = 'flex');
            cancelClear.addEventListener('click', () => clearModal.style.display = 'none');
            confirmClear.addEventListener('click', clearAllHistory);
            exportMobile.addEventListener('click', exportChats);
            voiceBtn.addEventListener('click', () => { if (recognition) recognition.start(); else alert('Voice not supported'); });
        }

        function closeSidebar() {
            panel.classList.remove('active');
            overlay.classList.remove('active');
        }

        function autoResize() {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 100) + 'px';
        }

        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', currentTheme);
            localStorage.setItem('kudu_theme_mobile', currentTheme);
            updateThemeIcon();
        }
        function updateThemeIcon() {
            const icon = themeToggle.querySelector('i');
            icon.className = currentTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        }

        function startNewChat() {
            currentChatId = 'chat_' + Date.now();
            chats[currentChatId] = { id: currentChatId, title: 'New Chat', messages: [], createdAt: new Date().toISOString() };
            saveChats();
            renderChatHistory();
            updateStats();
            showWelcome();
            input.focus();
            closeSidebar();
        }

        function saveChats() {
            localStorage.setItem('kudu_chats_mobile', JSON.stringify(chats));
            if (currentChatId) localStorage.setItem('kudu_last_chat_mobile', currentChatId);
        }

        function loadLastChat() {
            const last = localStorage.getItem('kudu_last_chat_mobile');
            if (last && chats[last]) loadChat(last);
            else showWelcome();
        }

        function loadChat(chatId) {
            currentChatId = chatId;
            const chat = chats[chatId];
            messagesDiv.innerHTML = '';
            welcomeDiv.style.display = 'none';
            chat.messages.forEach(msg => addMessage(msg.text, msg.sender, msg.timestamp, false));
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            renderChatHistory();
        }

        function addMessage(text, sender, timestamp = null, scroll = true) {
            welcomeDiv.style.display = 'none';
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}-message`;
            const time = timestamp ? new Date(timestamp).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }) : new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
            msgDiv.innerHTML = `
                <div class="message-avatar">${sender === 'user' ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>'}</div>
                <div class="message-bubble">
                    <div class="message-text">${text.replace(/\n/g,'<br>')}</div>
                    <div class="message-time">${time}</div>
                    <div class="reactions">
                        <span class="reaction-btn">👍</span><span class="reaction-btn">❤️</span>
                    </div>
                </div>
            `;
            messagesDiv.appendChild(msgDiv);
            if (scroll) messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function showWelcome() {
            messagesDiv.innerHTML = '';
            messagesDiv.appendChild(welcomeDiv);
            welcomeDiv.style.display = 'block';
        }

        function sendMessage() {
            const text = input.value.trim();
            if (!text || isTyping) return;

            const hasArabic = /[\u0600-\u06FF]/.test(text);
            langIndicator.innerHTML = hasArabic ? '🇸🇦 AR' : '🇺🇸 EN';

            input.value = ''; autoResize();
            if (!currentChatId) startNewChat();

            addMessage(text, 'user');
            chats[currentChatId].messages.push({ text, sender:'user', timestamp: new Date().toISOString() });
            if (chats[currentChatId].messages.length === 1) {
                chats[currentChatId].title = text.length > 30 ? text.slice(0,30)+'…' : text;
            }
            saveChats();
            updateStats();
            renderChatHistory();

            isTyping = true;
            sendBtn.disabled = true;

            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot-message';
            typingDiv.id = 'typing-indicator';
            typingDiv.innerHTML = `<div class="message-avatar"><i class="fas fa-robot"></i></div><div class="message-bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            setTimeout(() => {
                document.getElementById('typing-indicator')?.remove();
                const reply = generateReply(text);
                addMessage(reply, 'bot');
                chats[currentChatId].messages.push({ text: reply, sender:'bot', timestamp: new Date().toISOString() });
                saveChats();
                updateStats();
                isTyping = false;
                sendBtn.disabled = false;
                showContextQuickReplies(text);
            }, 1200);
        }

        function generateReply(query) {
            const lower = query.toLowerCase();
            const sopMatch = lower.match(/sop[#\s]*(\d+)/);
            if (sopMatch && knowledgeBase[`sop ${sopMatch[1]}`]) return knowledgeBase[`sop ${sopMatch[1]}`];

            for (let key in knowledgeBase) {
                if (key !== 'default' && lower.includes(key)) return knowledgeBase[key];
            }
            return "Ask about breakfast, burgers, sides, jobs, promotions, desserts, or an SOP number (e.g., 394).";
        }

        function showContextQuickReplies(msg) {
            const lower = msg.toLowerCase();
            let chips = [];
            if (lower.includes('breakfast') || lower.includes('egg')) chips = ['🍳 Egg & Chicken', '🥚 Egg Wrap', '🥞 Pancake'];
            else if (lower.includes('burger')) chips = ['🍔 Chicken Burger', '🍗 Quattro', '🥩 Philly'];
            else if (lower.includes('side') || lower.includes('fries')) chips = ['🍟 Cheese Fries', '🍗 Nuggets', '🥔 Criss Cut'];
            else chips = ['🍳 Breakfast', '🍔 Burgers', '🍟 Sides', '👔 Jobs'];
            quickRepliesDiv.innerHTML = chips.map(c => `<button class="chip" onclick="quickChip('${c}')">${c}</button>`).join('');
        }

        window.quickChip = function(txt) {
            input.value = txt.replace(/[🍳🥚🥞🍔🍗🥩🍟👔]/g,'').trim();
            sendMessage();
        };

        function renderSuggested() {
            suggestedDiv.innerHTML = '';
            ['🍳 Egg & Chicken', '🍔 Chicken Burger', '🍟 Cheese Fries', '👔 Service Crew'].forEach(s => {
                const btn = document.createElement('div');
                btn.className = 'suggested-chip';
                btn.innerText = s;
                btn.onclick = () => { input.value = s.replace(/[🍳🍔🍟👔]/g,'').trim(); sendMessage(); };
                suggestedDiv.appendChild(btn);
            });
        }

        function renderChatHistory() {
            chatHistoryDiv.innerHTML = '';
            const ids = Object.keys(chats).sort((a,b) => new Date(chats[b].createdAt) - new Date(chats[a].createdAt));
            ids.forEach(id => {
                const chat = chats[id];
                const div = document.createElement('div');
                div.className = 'chat-history-item';
                div.innerHTML = `<i class="far fa-message" style="color:var(--primary);"></i> ${chat.title}`;
                div.onclick = () => { loadChat(id); closeSidebar(); };
                chatHistoryDiv.appendChild(div);
            });
        }

        function updateStats() {
            const chatCount = Object.keys(chats).length;
            const msgCount = Object.values(chats).reduce((acc, c) => acc + c.messages.length, 0);
            totalChatsSpan.innerText = chatCount;
            totalMessagesSpan.innerText = msgCount;
            popularSpan.innerText = msgCount > 0 ? '🍔' : '-';
        }

        function clearAllHistory() {
            chats = {};
            currentChatId = null;
            localStorage.removeItem('kudu_chats_mobile');
            localStorage.removeItem('kudu_last_chat_mobile');
            renderChatHistory();
            updateStats();
            showWelcome();
            clearModal.style.display = 'none';
        }

        function exportChats() {
            const data = JSON.stringify(chats);
            const blob = new Blob([data], {type:'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'kudu_backup.json';
            a.click();
        }

        initMobile();
    </script>

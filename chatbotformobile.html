<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>KUDU · full knowledge mobile</title>
    <!-- Bootstrap 5 minimal -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --primary: #10a37f;
            --primary-dark: #0d8c6d;
            --sidebar-bg: #1a1b26;
            --chat-bg: #24283b;
            --user-msg: #343541;
            --bot-msg: #414868;
            --text: #c0caf5;
            --text-muted: #9aa5ce;
            --border: #414868;
            --accent: #7aa2f7;
            --danger: #f7768e;
            --warning: #e0af68;
            --success: #9ece6a;
        }

        [data-theme="light"] {
            --primary: #10a37f;
            --sidebar-bg: #f8fafc;
            --chat-bg: #ffffff;
            --user-msg: #f1f5f9;
            --bot-msg: #e2e8f0;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --accent: #3b82f6;
        }

        body {
            background: var(--sidebar-bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            padding: 0;
            margin: 0;
        }

        /* mobile first container */
        .mobile-chat {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 450px;
            margin: 0 auto;
            background: var(--chat-bg);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            position: relative;
        }

        /* header */
        .chat-header-mobile {
            background: var(--sidebar-bg);
            padding: 12px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-btn {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 1.3rem;
            width: 40px;
            height: 40px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-btn:active {
            background: rgba(255,255,255,0.1);
        }

        .app-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--primary);
        }

        .app-badge {
            font-size: 0.65rem;
            background: var(--primary);
            color: white;
            padding: 2px 8px;
            border-radius: 30px;
            margin-left: 6px;
        }

        .header-right {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.1rem;
            width: 40px;
            height: 40px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:active {
            background: rgba(255,255,255,0.1);
            color: var(--text);
        }

        /* main messages */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 100%;
        }

        .message-avatar {
            width: 34px;
            height: 34px;
            border-radius: 12px;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: white;
            flex-shrink: 0;
        }

        .user-message .message-avatar {
            background: var(--accent);
        }

        .message-bubble {
            background: var(--bot-msg);
            border-radius: 18px 18px 18px 4px;
            padding: 12px 16px;
            border: 1px solid var(--border);
            max-width: 85%;
            word-break: break-word;
        }

        .user-message .message-bubble {
            background: var(--user-msg);
            border-radius: 18px 18px 4px 18px;
            margin-left: auto;
        }

        .message-text {
            font-size: 0.9rem;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        .message-time {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 6px;
            text-align: right;
        }

        .reactions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            justify-content: flex-end;
        }

        .reaction-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 4px 10px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* typing */
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 12px 16px;
        }
        .typing-dot {
            width: 8px; height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 1.4s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%,60%,100%{ opacity:0.4; transform:scale(0.8); } 30%{ opacity:1; transform:scale(1); } }

        /* quick replies */
        .quick-replies {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            padding: 12px 12px 4px;
            background: var(--sidebar-bg);
            border-top: 1px solid var(--border);
        }

        .chip {
            background: var(--bot-msg);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 0.8rem;
            white-space: nowrap;
            color: var(--text);
        }

        .chip:active {
            background: var(--primary);
            color: white;
        }

        /* input area */
        .input-area {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 12px 16px;
            background: var(--sidebar-bg);
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            flex: 1;
            background: var(--chat-bg);
            border-radius: 30px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 8px 0 16px;
        }

        .input-wrapper textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 0.95rem;
            padding: 12px 0;
            max-height: 100px;
            resize: none;
            outline: none;
        }

        .input-wrapper button {
            background: transparent;
            border: none;
            color: var(--primary);
            font-size: 1.2rem;
            width: 44px;
            height: 44px;
            border-radius: 30px;
        }

        .input-wrapper button:active {
            background: rgba(255,255,255,0.1);
        }

        /* sidebar overlay (mobile) */
        .sidebar-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(3px);
            z-index: 1000;
            display: none;
        }
        .sidebar-overlay.active {
            display: block;
        }

        .sidebar-panel {
            position: fixed;
            top: 0; left: -300px;
            width: 280px;
            height: 100%;
            background: var(--sidebar-bg);
            z-index: 1001;
            transition: left 0.25s ease;
            padding: 20px 12px;
            border-right: 1px solid var(--border);
            overflow-y: auto;
        }
        .sidebar-panel.active {
            left: 0;
        }

        .sidebar-panel .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 8px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .avatar {
            width: 48px; height: 48px;
            background: var(--primary);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        .chat-history-item {
            padding: 14px 12px;
            border-radius: 14px;
            margin-bottom: 6px;
            background: rgba(255,255,255,0.02);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
        }
        .chat-history-item:active {
            background: rgba(255,255,255,0.1);
        }

        /* welcome */
        .welcome-screen {
            text-align: center;
            padding: 30px 16px;
        }
        .welcome-icon {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 16px;
        }

        .suggested-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 24px;
        }
        .suggested-chip {
            background: var(--bot-msg);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 12px 8px;
            font-size: 0.8rem;
            text-align: center;
        }

        /* stats */
        .stats-row {
            display: flex;
            justify-content: space-around;
            padding: 16px 0;
            border-top: 1px solid var(--border);
            margin-top: 20px;
        }
        .stat {
            text-align: center;
        }
        .stat-number {
            font-weight: 700;
            color: var(--primary);
        }

        /* responsive fine-tuning */
        @media (max-width: 400px) {
            .chip { padding: 6px 12px; font-size: 0.7rem; }
            .message-bubble { max-width: 90%; }
        }
    </style>
</head>
<body data-theme="dark">
    <!-- mobile chat frame -->

        <!-- header -->
        <div class="chat-header-mobile">
            <div class="header-left">
                <button class="menu-btn" id="menuToggleMobile"><i class="fas fa-bars"></i></button>

    <!-- sidebar overlay + panel -->

        </div>
        <div style="font-size:0.8rem; color:var(--text-muted); margin-bottom:8px;">Chat history</div>

        <div class="stats-row">
            <div class="stat"><span class="stat-number" id="totalChatsMobile">0</span><div style="font-size:0.7rem;">chats</div></div>
            <div class="stat"><span class="stat-number" id="totalMessagesMobile">0</span><div style="font-size:0.7rem;">msgs</div></div>
            <div class="stat"><span class="stat-number" id="popularTopicMobile">-</span><div style="font-size:0.7rem;">trend</div></div>
        </div>
    </div>

    <!-- clear modal (minimal) -->
    <div style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; display:none; align-items:center; justify-content:center;" id="clearModalMobile">
        <div style="background:var(--sidebar-bg); border-radius:32px; padding:24px; max-width:300px; text-align:center; border:1px solid var(--border);">
            <i class="fas fa-exclamation-triangle" style="font-size:2.5rem; color:var(--warning); margin-bottom:16px;"></i>
            <h6 style="margin-bottom:12px;">Clear all history?</h6>
            <div style="display:flex; gap:10px;">
                <button class="chip" style="flex:1;" id="cancelClearMobile">Cancel</button>
                <button class="chip" style="flex:1; background:var(--danger); color:white;" id="confirmClearMobile">Delete</button>
            </div>
        </div>
    </div>

            // ----- BREAKFAST MENU (DETAILED SOPs) -----
            "egg and chicken wrap": "🍳 **EGG & CHICKEN WRAP** (BKF|SOP# 394)\n\n**Launch Date:** February 2026\n**Station:** Burger Station\n\n**INGREDIENTS:**\n• 1 Egg\n• 1 Dash KUDU Seasoning\n• 1 Piece 8\" Tortilla Bread\n• 1 Piece Chicken Strip\n• 20g Cheese Sauce\n• 1 Slice Yellow Cheese\n\n**PHU INFO (Chicken Strips):**\n• Cooking time: 5 Minutes\n• PHU holding time: 30 Minutes\n• Maximum per PHU pan: 10 pieces\n• Product name in PHU: STR\n\n**PREPARATION PROCEDURES:**\n1. Ensure cooked Chicken Strips ready in PHU (see SOP#496)\n2. Spray oil once on heated left side of flat grill @250°F\n3. Crack 1 egg in bowl, add dash of KUDU Seasoning\n4. Mix well using whisk\n5. Scramble egg using scraper for 2 minutes\n6. Place tortilla bread on cutting board\n7. Transfer scrambled egg, align vertically in middle, leaving 2\" space from bottom edge\n8. Squeeze 20g Cheddar Cheese Sauce over egg in 8 zigzag lines\n9. Place 1 cooked Chicken Strip on top of cheese sauce & egg\n10. Place 1 slice Yellow Cheese diagonally on top of chicken strip\n11. Fold 2\" from lower side of tortilla\n12. Fold right side of tortilla\n13. Fold left side of tortilla\n14. Toast in panini toaster for 30 seconds\n15. Place toasted wrap on wrapper (wrapper facing down, LTO on top)\n16. Wrap by folding right side 2\" over sandwich, fold lower side, roll until fully wrapped\n17. Twist left edge of wrapper, ensure LTO sign visible\n\n**SERVING PROCEDURES:**\n• Dine-in (sandwich only): Serve with napkin & ketchup packet\n• Dine-in (meal with coffee): 2 napkins, 1 ketchup, 3 sugar packets, stirrer, hashbrown in kiddie fries bag, 8-oz coffee\n• Dine-in (meal with juice): 2 napkins, 1 ketchup, straw, hashbrown in kiddie fries bag, 8-oz orange/apple juice\n• Take-out/home delivery: Paper bag #10 for sandwich or meal",
            
            "chicken and eggs": "🐔 **CHICKEN & EGGS** (BKF|SOP# 315)\n\n**Launch Date:** 7th September 2023\n**Station:** Burger Station\n**Calories:** 754 kcal\n\n**INGREDIENTS:**\n• 2 Eggs\n• 1 Dash Salt\n• 1 Order Chicken Steak\n• 1 Piece Hash Brown\n• 2 Slices Multigrain Toast\n• 3 Cherry Tomatoes\n• 3 Cucumber Slices\n• 1 Cup Coffee or Tea\n• 1 Cup Orange or Apple Juice\n\n**CONDIMENTS:**\n• 1 Salt Sachet\n• 1 Pepper Sachet\n• 1 Plastic fork, knife, teaspoon each\n• 3 Sugar Packets\n• 1 Butter Blade\n• 1 Hero Jam (Apricot or Strawberry)\n\n**PREPARATION PROCEDURES:**\n1. Place 1 order KUDU Chicken steak on flat grill (Steak station @350°F)\n2. Cook chicken for 4 minutes, add dash of KUDU seasoning only\n3. Ensure fryer @350°F; take 1 hash brown from freezer, cook 3 minutes\n4. Flat grill @250°F for eggs (burger station)\n5. Spray oil once on heated flat grill\n6. Place 2 eggs on flat grill, cook sunny side up (or per guest request), add dash of salt\n7. Toast 2 slices Multigrain bread in conveyer toaster\n8. Place sunny-side-up eggs in middle of Shakshuka plate\n9. Place 1 portion KUDU chicken & 1 hash brown on right-hand side of plate\n10. Cut toasted bread into 4 triangles, place on left-hand side of plate\n11. Add 3 cherry tomatoes and 3 cucumbers in a row between toast\n12. Serve with proper condiments and drinks",

            "egg wrap": "🥚 **EGG WRAP** (BKF|SOP# 393)\n\n**Launch Date:** 9th October 2025\n**Station:** Burger Station\n**Calories:** 335 kcal\n**Note:** LTO - served with Hollandaise sauce\n\n**INGREDIENTS:**\n• 1 Egg\n• 1 Dash KUDU Seasoning\n• 1 Piece 8\" Tortilla Bread\n• 1 Piece Hash Brown (2 pieces for meal)\n• 1 Slice Yellow Cheese\n• 1 Portion KUDU Hollandaise Sauce (40-45g in soufflé cup)\n• 8 oz Juice or Coffee (for meal)\n\n**KUDU HOLLANDAISE SAUCE (#121187):**\n• Receiving & storage: @ chilled 34°F-40°F\n• Packaging: 1 Pack = 1kg\n• Primary shelf life: 6 months\n• Secondary shelf life: 7 days after open @ chilled\n• Squeeze bottle: 4 hours @ chilled\n• Soufflé cup: 48 hours @ chilled\n\n**HASH BROWN PHU INFO:**\n• Maximum 12 pieces in PHU pan\n• 30-minute holding time\n• Cooking time: 3 minutes @350°F\n\n**PREPARATION PROCEDURES:**\n1. Ensure hash browns ready in PHU\n2. Spray oil once on heated flat grill @250°F\n3. Crack 1 egg in bowl, add dash of KUDU Seasoning\n4. Mix well using whisk\n5. Pour egg onto greased grill, immediately start scrambling\n6. Scramble using scraper for 2 minutes\n7. Place small wrapper on cutting board facing down (LTO on top)\n8. Place 8\" tortilla bread in middle of wrapper\n9. Transfer scrambled egg, align horizontally in middle, leaving 1.5\" space from right edge\n10. Place yellow cheese diagonally on top of egg\n11. Take cooked hashbrown, crush and spread evenly on top of cheese\n12. Fold right edge\n13. Fold lower edge to enclose fillings\n14. Fold upper edge to fully wrap, applying gentle pressure\n15. Wrap sandwich: fold right side of wrapper 2\" over sandwich, fold lower side, roll until fully wrapped\n16. Twist left edge of wrapper, ensure LTO sign visible\n\n**SERVING PROCEDURES:**\n• Dine-in (sandwich only): Hollandaise sauce, 1 napkin, 1 ketchup packet\n• Dine-in (meal with coffee): Hollandaise, 2 napkins, 1 ketchup, 3 sugar packets, stirrer, hashbrown in kiddie fries bag, 8-oz coffee\n• Dine-in (meal with juice): Hollandaise, 2 napkins, 1 ketchup, straw, hashbrown in kiddie fries bag, 8-oz orange/apple juice\n• Take-out/home delivery: Paper bag #10",
            
            "hot dog wrap": "🌭 **EGG & HOT DOG WRAP** (BKF|SOP# 322)\n\n**Calories:** 579 kcal\n\n**INGREDIENTS:**\n• 1 Egg\n• 1 Dash KUDU Seasoning\n• 1 Piece 8\" Tortilla Bread\n• 1 Piece Hot Dog\n• 20g Cheese Sauce\n• 1 Slice Yellow Cheese\n\n**PHU INFO (Hot Dogs):**\n• Cooking time in Panini toaster: 3:30 Minutes\n• PHU holding time: 300 Minutes (5 hours)\n• Maximum per PHU pan: 10 pieces\n• Product name in PHU: HDOG\n\n**PREPARATION PROCEDURES:**\n1. Ensure cooked hot dogs ready in PHU\n2. Spray oil once on heated left side of flat grill @250°F\n3. Crack 1 egg in bowl, add dash of KUDU Seasoning\n4. Mix well using whisk\n5. Scramble egg using scraper for 2 minutes\n6. Place tortilla bread on cutting board\n7. Transfer scrambled egg, align vertically in middle, leaving 2\" space from bottom edge\n8. Squeeze 20g Cheddar Cheese Sauce over egg in 8 zigzag lines\n9. Place 1 cooked Hot Dog on top of cheese sauce & egg\n10. Place 1 slice Yellow Cheese diagonally on top of hot dog\n11. Fold 2\" from lower side of tortilla\n12. Fold right side\n13. Fold left side\n14. Toast in panini toaster for 30 seconds\n15. Place toasted wrap on wrapper (wrapper facing down, LTO on top)\n16. Wrap by folding right side 2\" over sandwich, fold lower side, roll until fully wrapped\n17. Twist left edge of wrapper, ensure LTO sign visible",
            
            "kudu breakfast": "🍽️ **KUDU BREAKFAST** (BKF|SOP# 311)\n\n**Launch Date:** 10th January 2021\n**Station:** Burger Station\n**Calories:** 753 kcal (Reg bread) / 765 kcal (Multigrain)\n\n**INGREDIENTS:**\n• 2 Eggs\n• 1 Dash Salt\n• 1 Slice Yellow Cheese\n• 2 Pieces Hash Brown\n• 1 Piece Hot Dog\n• 2 Slices Multigrain Toast\n• 3 Cherry Tomatoes\n• 3 Cucumber Slices\n\n**BEVERAGES:**\n• 1 Cup Coffee or Tea\n• 1 Cup Orange or Apple Juice\n\n**CONDIMENTS:**\n• 1 Salt Packet\n• 1 Pepper Packet\n• Plastic fork, knife, teaspoon each\n• 3 Sugar Packets\n• 1 Butter Blade\n• 1 Hero Jam\n\n**PREPARATION PROCEDURES:**\n1. Ensure fryer @350°F; cook 2 hash browns for 3 minutes\n2. Crack 2 eggs in mixing bowl\n3. Add dash of salt, whip with egg fork\n4. Spray oil once on heated flat grill @250°F\n5. Pour eggs onto greased grill in upward motion spreading flat\n6. Cut 1 slice yellow cheese in half, add to eggs, keep 1cm gap between cheese\n7. Flip sides of eggs to fold from 4 sides, covering cheese\n8. Turn eggs over\n9. Toast 2 slices multigrain bread\n10. Place omelet in middle of Shakshuka plate\n11. Place 1 Hotdog and 2 hash browns aside the omelet\n12. Cut toasted bread into 4 triangles, place at end of plate\n13. Add 3 cherry tomatoes and 3 cucumbers to left corner row\n14. Serve with proper condiments and drinks",
            
            "kudu pancake": "🥞 **KUDU PANCAKE** (BKF|SOP# 390)\n\n**Launch Date:** 10th January 2021\n**Station:** Steak Station\n**Calories:** 646 kcal\n\n**INGREDIENTS (per order):**\n• 165ml Milk\n• 1 Egg\n• 5g Oil\n• 150g Pancake Powder (use 250ml cup)\n• 1 Butter Blade\n• 2 oz Pancake Syrup (Maple or Strawberry)\n\n**PANCAKE POWDER STORAGE:**\n• Receiving & storage: 70°F (Room temperature)\n• Packaging: 1 Kg inner / 20 inner sacks (133 orders/sack)\n• Primary shelf life: 12 months\n• Secondary shelf life (after open): 21 Days\n\n**PANCAKE SYRUP STORAGE:**\n• Receiving & storage: 70°F (Room temperature)\n• Packaging: 1 Case = 20 KG\n• Primary shelf life: 18 months\n• Secondary shelf life (after opening): 7 days @ Room temperature\n• Portioned syrup shelf life: 2 days at Room temperature\n\n**PREPARATION PROCEDURES:**\n1. Set Flat Grill @350°F (steak station)\n2. In stainless-steel mixing bowl, add pancake powder, oil, egg, and milk\n3. Mix all ingredients using whisk until smooth\n4. Spray oil once on heated flat grill\n5. Use 4 oz ladle, scoop 3 ladles, pour onto oiled part of grill\n6. Cook until bubbles break on surface and edges begin to dry (2 minutes) [Size: 6\" diameter]\n7. Turn pancake, cook other side about 1 minute until golden brown\n8. Place 3 pieces on top of each other in 8\" plate for dine-in\n\n**SERVING:**\n• Dine-in: Use ceramic plates\n• HD/Take-out/malls: Serve pancakes in food-grade paper box\n• Take-out service: Use paper bag #25",
            
            "kudu waffle": "🧇 **KUDU WAFFLE** (BKF|SOP# 391)\n\n**Launch Date:** 10th January 2021\n**Station:** Steak Station\n**Calories:** 269 kcal per waffle\n\n**INGREDIENTS (per batch - makes 3 waffles):**\n• 165ml Milk\n• 1 Egg\n• 5g Oil\n• 150g Pancake Powder (use 250ml cup)\n• 1 Butter Blade\n• 2 oz Pancake Syrup (Maple or Strawberry) - 56g\n\n**PANCAKE POWDER STORAGE:**\n• Receiving & storage: 70°F (Room temperature)\n• Packaging: 1 kg inner / 20 inner sacks (390 Orders/sack for waffles)\n• Primary shelf life: 12 months\n• Secondary shelf life (after opening): 21 Days\n\n**SYRUP STORAGE:**\n• Receiving & storage: 70°F (Room temperature)\n• Packaging: 1 Case = 20 KG\n• Primary shelf life: 18 months\n• Secondary shelf life (after opening): 7 days @ Room temperature\n• Portioned syrup shelf life: 2 days at Room temperature\n\n**PREPARATION PROCEDURES:**\n1. In stainless-steel mixing bowl, add pancake mix, oil, egg, and milk\n2. Mix all ingredients with whisk until smooth\n3. Spray waffle iron with oil (if new nonstick machine, DO NOT use oil)\n4. Ensure machine temperature is correct\n5. Cook for 3:00 minutes\n\n**SAUCE OPTIONS (Last Modified):**\n• Maple Syrup\n• Strawberry Sauce\n• Nutella",
            
            "omelet sandwich": "🥪 **OMELET SANDWICH** (BKF|SOP# 314)\n\n**Launch Date:** 10th January 2021\n**Station:** Burger Station\n**Calories:** 762 kcal (Reg bread) / 756 kcal (Multigrain)\n**Note:** Serve with 1 Juice and hash brown if combo\n\n**INGREDIENTS:**\n• 1 Steak Bread (Brown or White, guest choice)\n• 2 Eggs\n• 1 Dash Salt\n• 1 oz (28g) Mayonnaise\n• 35g Shredded Lettuce\n• 2 Half-moon Tomato slices\n• 1 Slice Yellow Cheese (triangular)\n• ½ Slice White Cheese (triangular)\n\n**PREPARATION PROCEDURES:**\n1. Place bread on flat grill with inner part removed (turn bread every minute)\n2. Cook 2 eggs (whisk with dash of salt) on flat grill @250°F\n3. After spreading eggs on grill, fold from all 4 sides (top, bottom, then sides) to size 2\" x 8\"\n4. Add 2 pcs (triangle shape) yellow cheese and 1 pc white cheese (white between yellow)\n5. Transfer cooked omelet onto heel of bread\n6. Garnish crown side of bread in sequence: mayonnaise, lettuce, tomato\n7. Slice sandwich in half, place in big sandwich box\n8. Press omelet button on box\n9. Serve according to guest needs (take-out/delivery use basket for dine-in)\n10. Dine-in: serve in original sandwich box\n11. Take-out: Use paper bag #20",
            
            "steak and eggs": "🥩 **STEAK & EGGS** (BKF|SOP# 313)\n\n**Launch Date:** 10th January 2021\n**Station:** Burger Station\n**Calories:** 620 kcal (Reg bread) / 632 kcal (Multigrain)\n\n**INGREDIENTS:**\n• 2 Eggs\n• 1 Dash Salt\n• 1 Order Beef Steak\n• 1 Piece Hash Brown\n• 2 Slices Multigrain Toast\n• 3 Cherry Tomatoes\n• 3 Cucumber Slices\n\n**BEVERAGES:**\n• 1 Cup Coffee or Tea\n• 1 Cup Orange or Apple Juice\n\n**CONDIMENTS:**\n• 1 Salt Packet\n• 1 Pepper Packet\n• Plastic fork, knife, teaspoon each\n• 3 Sugar Packets\n• 1 Butter Blade\n• 1 Hero Jam\n\n**PREPARATION PROCEDURES:**\n1. Place 1 order KUDU beef steak on flat grill (Steak station @350°F)\n2. Cook beef for 4 minutes, add dash of KUDU seasoning only\n3. Ensure fryer @350°F; cook 1 hash brown for 3 minutes\n4. Flat grill @250°F for eggs (burger station)\n5. Spray oil once on heated flat grill\n6. Place 2 eggs on flat grill, cook sunny side up (or per guest request), add dash of salt\n7. Toast 2 slices multigrain bread\n8. Place sunny-side-up eggs in middle of Shakshuka plate\n9. Place 1 portion KUDU beef & 1 hash brown at end of plate\n10. Cut toasted bread into 4 triangles, place at other end of plate\n11. Add 3 cherry tomatoes and 3 cucumbers in left row between toast\n12. Serve with proper condiments and drinks",

            "chicken burger": "🍔 **CHICKEN BURGER** (BUS|SOP# 419)\n\n**Launch Date:** April 1988\n**Station:** Burger Station\n**Calories:** 978 kcal\n\n**INGREDIENTS:**\n• 1 Chicken Burger Patty (90g)\n• 28g Mayonnaise (14g each side)\n• 20g Shredded Lettuce\n• 1 Big Bun\n\n**CHICKEN BURGER PATTIES STORAGE:**\n• Receiving & storage: Frozen 0°F to -10°F\n• Packaging: 1 Case = 100 Pcs (90 grams)\n• Primary shelf life: 12 months frozen\n• Cooking time: 3:30 Minutes @350°F\n\n**PREPARATION PROCEDURES:**\n1. Ensure multi fryer vat @350°F\n2. Pull required amount of chicken burger from freezer\n3. Place chicken burger in fryer basket (use basket divider if more than one)\n4. Cook for 3:30 minutes\n5. When meat is half cooked, place one big bun in conveyor toaster (cut side up)\n6. Squeeze 14g mayonnaise spiral on each crown and heel side of bun\n7. Add 20g lettuce on top of mayonnaise on crown side\n8. Place chicken burger patty on lettuce\n9. Use thumbs to flip crown with patty onto heel side\n10. Wrap burger using KUDU small wrapper with CHICKEN BURGER icon facing up\n\n**SERVING:**\n• Burger only: 1 ketchup sachet, 1 napkin\n• Combo meal: 2 ketchup sachets, 2 napkins, regular fries, regular soft drink\n• Take-out: Paper bag #10",
            
            "diet grilled chicken meal": "🥗 **DIET GRILLED CHICKEN MEAL** (BUS|SOP# 690)\n\n**Launch Date:** April 1988\n**Last Modified:** July 2023 (New Green Salad, Green Pepper, Sweet Corn)\n**Calories:** 450 kcal\n\n**INGREDIENTS:**\n• 1 Grilled Chicken Big\n• 28g Italian Dressing\n• 56g Mushroom & Onion Mix\n• 100g Green Salad\n• 20g Sweet Corn\n• 10g Green Pepper (Julienne)\n• 4 Cherry Tomatoes\n• 3 Cucumber Slices (¼\" thick)\n• ¼ Slice Brown Bread\n• 7g Shredded Yellow Cheese\n• 7g Diced Tomatoes\n• 3g Onion Chives\n• 1 Portion KUDU Dressing\n\n**KUDU GREEN SALAD (Item Code: 120389):**\n• Receiving & storage: Chilled @34°F-40°F\n• Primary shelf life: 4 days @ Chilled\n• Secondary shelf life: Once opened 18 hours in food container @ Chilled\n• Packaging: 1 KG\n\n**DEL MONTE SWEET CORN (Item Code: 120488):**\n• Receiving & storage: Room Temperature\n• Primary shelf life: 18 Months @ Room Temperature\n• Secondary shelf life: Once opened 48 hours in pan @ Chilled (drain brine first)\n• Packaging: Can (410 Grams)\n\n**GREEN PEPPER JULIENNE PREPARATION:**\n• Wash & sanitize green pepper\n• Cut into Julienne strips (1/8\"), cut in two halves\n• Maximum Length: 6 CM (for large peppers)\n• Minimum Length: 4 CM (for small peppers)\n• Place in pan @34°-40°F for 18 hours\n• Use 2 oz broasted cup to scoop\n\n**PREPARATION PROCEDURES:**\n1. Pull thawed grilled chicken from chiller, place on char-grill (knob #5)\n2. Drizzle with ½ oz Italian dressing covering entire surface\n3. Cook 6 minutes (3 minutes each side) - ensure crisscross grill marks\n4. When turning, drizzle other side with ½ oz Italian dressing\n5. PHU holding (GRLB): 30 minutes with cover\n6. Heat mushroom & onion mix on flat grill\n7. Cut brown bread ¼ slice diagonally, toast (DO NOT APPLY BUTTER)\n8. FOR DINE-IN: Prepare 100g Green Salad, 20g Sweet corn, 10g Green pepper, 4 Cherry tomatoes, 3 Cucumber on left side of ceramic plate\n9. Place grilled chicken topped with 56g mushroom onion mix, 7g shredded yellow cheese, 3g onion chives, 7g diced tomatoes on top right side above breads\n10. FOR TAKE-AWAY/DELIVERY: Same arrangement in sugarcane lunch platter\n\n**SERVING:**\n• Dine-in or Takeaway using bag #25\n• Condiments: Disposable fork, knife, salt & pepper sachets, tissue, 1 KUDU dressing",
            
            "extra spicy quattro": "🔥 **EXTRA SPICY QUATTRO CHICKEN** (BUS|SOP# 498)\n\n**Launch Date:** December 2025\n**Station:** Burger Station\n**Calories:** 720 kcal\n\n**INGREDIENTS:**\n• 1 Spicy Chicken Fillet Patty (SKU 120832)\n• 40g Chipotle Sauce\n• 20g Shredded Lettuce\n• 4 Jalapeños\n• 1 Big Bun\n\n**SPICY CHICKEN FILLETS STORAGE:**\n• Receiving & storage: Frozen 0°F to -10°F\n• Packaging: 1 Box / 10 Packs / 1 Kg\n• Primary shelf life: 12 months frozen\n• Cooking time: 6:00 Minutes\n\n**PHU INFO:**\n• Maximum 4 patties per PHU pan\n• Cooking time: 6:00 mins\n• PHU holding time: 30 mins\n• PHU Abbreviation: QTR\n\n**NEW SKU - KUDU BURGER BOX (#130311):**\n• Packaging: 1 Box = 300 Pieces\n\n**PREPARATION PROCEDURES:**\n1. Ensure cooked Spicy Chicken Fillet ready in PHU\n2. On order, toast big bun\n3. Place toasted bun on big wrapper (printed side down) with heel center, crown upper\n4. Squeeze 20g Chipotle sauce spiral on crown side\n5. Evenly distribute 20g lettuce on top of chipotle sauce on crown\n6. Squeeze 20g Chipotle sauce on top of lettuce in spiral\n7. Add 4 jalapeños on top of sauce & lettuce\n8. Place cooked Spicy Chicken Fillet on top of lettuce\n9. Close burger using thumbs to hold patty, flip crown onto heel side\n10. Wrap carefully ensuring Quatro icon visible\n\n**SERVING:**\n• Burger only: tray with ketchup packet, napkin (dine-in) / paper bag #10 (take-out)\n• Combo meal: tray with 2 ketchup packets, 2 napkins, straw (dine-in) / paper bag #20 (take-out)",
            
            "grilled chicken meal": "🍗 **GRILLED CHICKEN MEAL** (BUS|SOP# 426)\n\n**Launch Date:** April 1988\n**Last Modified:** July 2023 (New Green Salad, Green Pepper, Sweet Corn)\n**Calories:** 790 kcal\n\n**INGREDIENTS:**\n• 1 Grilled Chicken Big\n• 28g Italian Dressing\n• 56g Mushroom & Onion Mix\n• 70g Green Salad\n• 20g Sweet Corn\n• 10g Green Pepper (Julienne)\n• 4 Cherry Tomatoes\n• 3 Cucumber Slices (¼\" thick)\n• ½ Kiddie Bread\n• 6 Criss Cut Potatoes\n• 7g Shredded Yellow Cheese\n• 7g Diced Tomatoes\n• 3g Onion Chives\n• 1 Portion KUDU Dressing\n\n**KUDU GREEN SALAD (Item Code: 120389):**\n• Receiving & storage: Chilled @34°F-40°F\n• Primary shelf life: 4 days @ Chilled\n• Secondary shelf life: Once opened 18 hours in food container @ Chilled\n• Packaging: 1 KG\n\n**SWEET CORN (Item Code: 120488):**\n• Receiving & storage: Room Temperature\n• Primary shelf life: 18 Months @ Room Temperature\n• Secondary shelf life: Once opened 48 hours in pan @ Chilled (drain brine first)\n• Packaging: Can (410 Grams)\n\n**GREEN PEPPER JULIENNE PREPARATION:**\n• Wash & sanitize green pepper\n• Cut into Julienne strips (1/8\"), cut in two halves\n• Maximum Length: 6 CM (large), Minimum: 4 CM (small)\n• Store in pan @34°-40°F for 18 hours\n• Use 2 oz broasted cup to scoop\n\n**PREPARATION PROCEDURES:**\n1. Pull thawed grilled chicken from chiller, place on char-grill (knob #5)\n2. Drizzle with ½ oz Italian dressing covering entire surface\n3. Cook 6 minutes (3 minutes each side) - ensure crisscross grill marks\n4. When turning, drizzle other side with ½ oz Italian dressing\n5. PHU holding (GRLB): 30 minutes with cover\n6. Upon order, cook criss cut potatoes per SOP#617\n7. Heat mushroom & onion mix on flat grill\n8. Cut Kiddie bread diagonally, toast in conveyor toaster, brush with melted liquid butter\n9. FOR DINE-IN: Prepare 70g Green Salad, 20g Sweet corn, 10g Green pepper, 4 Cherry tomatoes, 3 Cucumber on left side of ceramic plate\n10. Place grilled chicken topped with 56g mushroom onion mix, 7g shredded yellow cheese, 3g onion chives, 7g diced tomatoes on top right side above bread and criss cut potatoes\n11. FOR TAKE-AWAY/DELIVERY: Same arrangement in sugarcane lunch platter\n\n**SERVING:**\n• Dine-in or Takeaway using bag #25\n• Condiments: Disposable fork, knife, salt & pepper sachets, tissue",
            
            "hot dog cooking": "🌭 **HOT DOG COOKING PROCEDURE** (BUS|SOP# 424)\n\n**Launch Date:** April 1989\n**Station:** Burger Station\n**Note:** Used for KUDU Breakfast\n**Last Modified:** Cooked on Panini Toaster\n\n**PREPARATION PROCEDURES:**\n1. Pull needed quantity of hot dogs from freezer based on daily consumption\n2. Thaw in chiller @34°F-40°F in closed covered pan for 24 hours before use\n3. Switch on panini toaster, set knob to 280°C (between 260°C-300°C)\n4. Start placing hot dogs from upper right section of panini toaster (max 10 pcs)\n5. Ensure hot dogs are 1 CM apart from each other\n6. Cook for 3:30 minutes (Press \"+\" button to start count)\n7. Cooked hot dogs must reach >150°F\n8. Remove carefully using proper tongs\n9. Place in PHU pan with cover\n10. Holding time in PHU: 5 Hours (code: HDOG)",
            
            "kiddie chicken burger": "👶 **KIDDIE CHICKEN BURGER** (BUS|SOP# 492)\n\n**Launch Date:** April 1988\n**Category:** Kid's Meals\n**Calories:** 666 kcal\n\n**INGREDIENTS:**\n• 1 Junior Burger Patty (50g)\n• 14g Mayonnaise (7g each side)\n• 10g Shredded Lettuce\n• 1 Small Bun\n\n**CHICKEN BURGER PATTIES STORAGE:**\n• Receiving & storage: Frozen 0°F to -10°F\n• Packaging: 1 Case = 400 Pcs (50 Grams)\n• Primary shelf life: 12 months frozen\n• Cooking time: 3:00 Minutes @350°F\n\n**MEAL INCLUDES:**\n• 1 Toy\n• Choice of Kiddie Fries\n• Kiddie Drink (juice, flavored milk, or soft drink)\n\n**PREPARATION PROCEDURES:**\n1. Set fryer to 350°F\n2. Pull one junior burger patty from freezer (use basket with divider for multiple)\n3. Place in fryer basket, cook for 3:00 minutes\n4. After 2 minutes, pull out small bun, separate crown and heel with bread knife, place in conveyor toaster (cut side up)\n5. Squeeze 7g mayonnaise spiral on each crown and heel side\n6. Add 10g lettuce on top of mayonnaise on crown side\n7. Place cooked junior chicken burger on lettuce\n8. Use thumbs to hold patty, flip crown onto heel side\n9. Wrap using KUDU small wrapper\n\n**SERVING:**\n• Serve according to guest request for dine-in or take-out",
            
            "kiddie chicken nuggets": "👶 **KIDDIE CHICKEN NUGGETS** (BUS|SOP# 493)\n\n**Launch Date:** April 1988\n**Category:** Kid's Meals\n**Station:** Fryer Station\n**Calories:** 414 kcal\n\n**INGREDIENTS:**\n• 4 Chicken Nuggets\n\n**CHICKEN NUGGETS STORAGE:**\n• Receiving & storage: Frozen 0°F to -10°F\n• Packaging: 1 Case = 100 Pcs\n• Primary shelf life: 12 months frozen\n• Cooking time: 3:30 Minutes @350°F\n\n**MEAL INCLUDES:**\n• 1 Toy\n• Choice of Kiddie Fries or Carrot Sticks\n• Kiddie Drink (juice, flavored milk, or soft drink)\n\n**PREPARATION PROCEDURES:**\n1. Set fryer to 350°F\n2. Pull required number of nuggets from freezer, place in fryer basket\n3. Place basket in fryer, cook for 3:30 minutes\n4. After 30 seconds, remove basket, gently shake to prevent sticking\n5. When golden brown, remove basket, drain 10 seconds\n6. Place cooked nuggets in Small French Fries Bag\n7. Place into kiddie meal box\n8. Serve with choice of kiddie fries, kiddie drink\n\n**SERVING:**\n• According to guest request for dine-in or take-out",
            
            "kiddie chicken strips": "👶 **KIDS CHICKEN STRIPS** (BUS|SOP# 496)\n\n**Category:** Kid's Meals\n**Station:** Burger Station\n\n**INGREDIENTS:**\n• 3 Chicken Strips\n• 97g French Fries\n• 12 oz Soft Drink OR Apple/Orange Juice OR Chocolate/Strawberry Milk (140 mL)\n\n**CHICKEN STRIPS (Item Code 120895):**\n• Receiving & storage: Frozen 0°F\n• Packaging: 1 case = 10 Inners (1 inner 22 pcs)\n• Primary shelf life: 12 months frozen\n• Cooking time: 5:00 Minutes @350°F\n• PHU holding time: 30 Minutes\n• Maximum per pan: 10 pieces\n• PHU code: STR\n\n**MEAL INCLUDES:**\n• 1 Kids meal box\n• 1 Toy\n• Kiddie fries\n• Kiddie drink\n\n**PREPARATION PROCEDURES:**\n1. Set fryer to 350°F\n2. Pull 1 batch of Chicken Strips (max 10 per PHU pan)\n3. Shake off excess crumbs over tray before dropping into fryer\n4. Place basket in fryer, cook 5 minutes\n5. After 30 seconds, lift basket, gently shake to prevent sticking, return\n6. When cooked, remove basket, drain 10 seconds\n7. Transfer to PHU pan (30 min hold)\n8. Using tong, take 3 strips, put into kiddie fries bag\n9. Place strips and kiddie fries inside kiddie box\n10. Close box, serve with kiddie drink, 1 napkin, 1 ketchup sachet, 1 straw, 1 kiddie toy\n\n**SERVING:**\n• Dine-in: in tray\n• Take-out: in paper bag #10",
            
            "kudu club sandwich": "🥪 **KUDU CLUB SANDWICH** (BUS|SOP# 417)\n\n**Launch Date:** January 10, 2021\n**Category:** Burgers\n**Calories:** 885 kcal\n**Note:** Serve with 4 pieces pickles in soufflé cup #2\n**Last Modified:** July 2024: PHU procedures added\n\n**INGREDIENTS:**\n• 1 Slice Beef Club Meat\n• 1 Slice Chicken Club Meat\n• 1 Slice Turkey Club Meat\n• 1 Egg\n• 1 Slice White Cheese\n• 1 Slice Yellow Cheese\n• 4 Slices Multigrain Toast (or White Bread)\n• 28g Mayonnaise\n• 20g Shredded Lettuce\n• 1 Slice Tomato Wheel (¼\")\n• 4 Pickle Slices (soufflé cup #2)\n\n**CLUB MEAT STORAGE:**\n• Receiving & storage: Frozen 0°F / Thawed 34°F-40°F\n• Packaging: 1 Case = 9Kg\n• Primary shelf life: 6 months frozen\n• Secondary shelf life (chiller): 96 hours\n• Thaw: 12 hours / Use: 84 hours\n• Sandwich prep/cooking time: 2-3 Minutes\n\n**PHU PROCEDURE:**\n• Prepare 4 omelets per batch\n• Arrange evenly in PHU pan, overlapping\n• Place in PHU with cover (code EGG)\n• Hold 30 minutes\n\n**BUILD UP (4 layers):**\nLayer 1 (bottom): Multigrain Toast + 7g Mayo + Turkey\nLayer 2: Multigrain Toast + 7g Mayo + Omelet + Yellow Cheese\nLayer 3: Multigrain Toast + 7g Mayo + Chicken + White Cheese + Lettuce\nLayer 4 (top): Multigrain Toast + 7g Mayo + Beef + Tomato Wheel\n\n**PREPARATION PROCEDURES:**\n1. Cook one omelet on flat grill @250°F\n2. Toast 4 slices Multigrain Bread\n3. Pull one order club meat from chiller\n4. Apply 28g Mayonnaise on all toasted bread in spiral G shape (7g per slice)\n5. Evenly distribute 20g lettuce on top right bread, tomato wheel on top left bread\n6. Place Chicken on lettuce, Beef on tomato\n7. Place Turkey on bottom right bread\n8. Place Yellow cheese on Beef, White cheese on Chicken\n9. Place omelet over Turkey\n10. Stack slices: Chicken layer bottom, Beef middle, Turkey+Egg top, cover with last slice\n11. Cut all slices diagonally\n12. Place in designated Club box, always serve with pickles\n\n**SERVING:**\n• Sandwich only: 1 ketchup sachet, 1 napkin\n• Meal: 2 ketchup sachets, 2 napkins, regular fries, regular soft drink\n• Take-out: Paper bag #10",
            
            "non spicy quattro": "🟤 **NON-SPICY QUATTRO CHICKEN** (BUS|SOP# 497)\n\n**Launch Date:** December 2025\n**Station:** Burger Station\n**Calories:** 911 kcal\n\n**INGREDIENTS:**\n• 1 Regular Quatro Fillet (SKU 120752)\n• 28g Mayonnaise\n• 28g Thousand Island Sauce\n• 20g Shredded Lettuce\n• 1 Big Bun\n\n**REGULAR QUATRO FILLETS STORAGE:**\n• Receiving & storage: Frozen 0°F to -10°F\n• Packaging: 1 Box / 10 Packs / 1 Kg\n• Primary shelf life: 12 months frozen\n• Cooking time: 7:00 Minutes\n\n**PHU INFO:**\n• Maximum 4 patties per PHU pan\n• Cooking time: 7:00 mins\n• PHU holding time: 30 mins\n• PHU Abbreviation: QTRR\n\n**NEW SKU - KUDU BURGER BOX (#130311):**\n• Packaging: 1 Box = 300 Pieces\n\n**PREPARATION PROCEDURES:**\n1. Ensure cooked Regular Quatro Fillet ready in PHU\n2. On order, toast big bun\n3. Place toasted bun on big wrapper (printed side down) with heel center, crown upper\n4. Squeeze 28g Mayonnaise spiral on crown side\n5. Evenly distribute 20g lettuce on top of mayonnaise on crown\n6. Squeeze 28g Thousand Island Sauce on top of lettuce in spiral\n7. Place cooked Regular Quatro Fillet on top of lettuce\n8. Close burger using thumbs to hold patty, flip crown onto heel side\n9. Wrap carefully ensuring Quatro icon visible\n10. Place in Burger Box, press left icon for Regular version\n\n**SERVING:**\n• Burger only: tray with ketchup, napkin (dine-in) / bag #10 (take-out)\n• Combo meal: 2 ketchup, 2 napkins, straw (dine-in) / bag #20 (take-out)",
            
            "philly beef": "🥩 **PHILLY BEEF** (BUS|SOP# 431)\n\n**Launch Date:** April 1988\n**Category:** Classic KUDU Sandwiches\n**Calories:** 1042 kcal\n\n**INGREDIENTS:**\n• 1 Order Philly Beef Meat\n• 1 Dash KUDU Seasoning\n• 112g Mixed Mushroom & Onion (2 x ¼ cup/60ml)\n• 1 Philly Bread (10\" Caramelized Steak Bread)\n• 1½ Slices White Cheese\n• 14g Melted Butter (7g each side)\n\n**PHILLY BEEF STORAGE:**\n• Receiving & storage: Frozen 0°F / Thawed 34°F-40°F\n• Packaging: 1 Case = 40 Pcs\n• Primary shelf life: 9 months frozen\n• Secondary shelf life (chiller): 72 hours\n• Thaw: 24 hours / Use: 48 Hours\n• Cooking time: 2-3 Minutes\n\n**PHU PROCEDURE:**\n• Holding time of fully cooked Philly Beef: 30 minutes in PHU with cover (code PHBF)\n• Cook for 2 minutes before transferring to PHU\n• Use 1 full cup (250 ml) for one order\n• When cooking from PHU, add mushroom immediately, cook 1:00 minute\n\n**PREPARATION PROCEDURES:**\n1. Prepare Philly Bread first\n2. Flat grill @350°F (steak station)\n3. Place steak bread on board, open widely with bread knife\n4. Brush cut sides with melted butter (7g each side)\n5. Toast bread on flat grill for 2:30 minutes for caramelization\n6. Flat grill @250°F (burger station)\n7. Spray oil once on heated flat grill\n8. Place one order Philly Beef on greased grill, change gloves (max 10 orders)\n9. Separate pieces using scraper and spatula\n10. When half cooked, sprinkle dash KUDU seasoning, mix\n11. Add mixed Mushroom & Onion, toss & mix 30 seconds\n12. Add 1½ slices white cheese, mix until melted\n13. Line meat on grill 8\" long\n14. Open bread 90°, scoop meat into bread using metal spatula\n15. Transfer to garnish station, cut in two halves\n16. Place in KUDU sandwich box, press Philly Beef button\n\n**SERVING:**\n• Sandwich only: 1 ketchup sachet, 1 napkin\n• Meal: 2 ketchup sachets, 2 napkins, regular fries, regular soft drink\n• Take-out: Paper bag #20",
            
            "quattro chicken": "🍗 **QUATTRO CHICKEN** (BUS|SOP# 421)\n\n**Launch Date:** April 2007\n**Last Modified:** December 2025 (Patty cooking time 6 min, Burger Box)\n**Station:** Burger Station\n**Calories:** 1076 kcal\n\n**INGREDIENTS:**\n• 1 Spicy Chicken Fillet Patty (SKU 120832)\n• 28g Mayonnaise\n• 28g Thousand Island Sauce\n• 20g Shredded Lettuce\n• 1 Big Bun\n\n**SPICY CHICKEN FILLETS STORAGE:**\n• Receiving & storage: Frozen 0°F to -10°F\n• Packaging: 1 Box / 10 Packs / 1 Kg\n• Primary shelf life: 12 months frozen\n• Cooking time: 6:00 Minutes\n\n**PHU INFO:**\n• Maximum 4 patties per PHU pan\n• Cooking time: 6:00 mins\n• PHU holding time: 30 mins\n• PHU Abbreviation: QTR\n\n**NEW SKU - KUDU BURGER BOX (#130311):**\n• Packaging: 1 Box = 300 Pieces\n\n**PREPARATION PROCEDURES:**\n1. Ensure cooked Spicy Chicken Fillet ready in PHU\n2. On order, toast big bun\n3. Place toasted bun on big wrapper (printed side down) with heel center, crown upper\n4. Squeeze 28g Mayonnaise spiral on crown side\n5. Evenly distribute 20g lettuce on top of mayonnaise on crown\n6. Squeeze 28g Thousand Island Sauce on top of lettuce in spiral\n7. Place cooked Spicy Chicken Fillet on top of lettuce\n8. Close burger using thumbs to hold patty, flip crown onto heel side\n9. Wrap carefully ensuring Quatro icon visible\n10. Place in Burger Box, press middle icon for Classic version\n\n**SERVING:**\n• Burger only: tray with ketchup, napkin (dine-in) / bag #10 (take-out)\n• Combo meal: 2 ketchup, 2 napkins, straw (dine-in) / bag #20 (take-out)",
            
            "veggie sandwich": "🥬 **VEGGIE SANDWICH** (BUS|SOP# 418)\n\n**Launch Date:** April 1988\n**Category:** Khafayef\n**Calories:** 942 kcal\n\n**INGREDIENTS:**\n• 1 Veggie Patty\n• 28g Thousand Island (14g each side)\n• 20g Shredded Lettuce\n• 1 Kiddie Bread\n\n**VEGGIE PATTIES STORAGE:**\n• Receiving & storage: Frozen 0°F to -10°F\n• Packaging: 1 Case = 144 Pcs\n• Primary shelf life: 12 months frozen\n• Cooking time: 5:00 Minutes @350°F\n\n**PREPARATION PROCEDURES:**\n1. Place veggie patty in fryer basket @350°F (use divider for multiple)\n2. Cook for 5:00 minutes\n3. After 3 minutes, place kiddie bread in conveyor toaster (cut side up)\n4. Squeeze 14g Thousand Island oval on crown\n5. Squeeze 14g Thousand Island oval on heel\n6. Add 20g shredded lettuce on crown side\n7. Place veggie patty on lettuce\n8. Use thumbs to flip crown with patty onto heel side\n9. Wrap in designated small sandwich wrap, Veggie icon showing\n\n**SERVING:**\n• Sandwich only: 1 ketchup sachet, 1 napkin\n• Combo meal: 2 ketchup sachets, 2 napkins, regular fries, regular soft drink\n• Take-out: Paper bag #10",

            "brownies cheesecake": "🍫 **BROWNIES CHEESECAKE** (DST|SOP# 730)\n\n**Launch Date:** 21st November 2024\n**Last Modified:** 18th December 2025 (position in container)\n**Calories:** 355 kcal\n\n**NEW SKU: Brownies Cheesecake #110828**\n\n**STORAGE:**\n• Receiving & Storage: @ Freezer 0°F\n• Packaging: 1 Box = 12 Pieces\n• Primary shelf life: 6 months\n• Secondary shelf life: 72 Hours @ Chiller 34°F-40°F\n• Thaw: 6 Hours\n• Use: 66 Hours\n\n**CONTAINERS:**\n• Sugarcane Cake Container: #130403 (1Box/10Packs/50Pcs)\n• Sugarcane Cake Container-pet Lid: #130404 (1Box/10Packs/50Pcs)\n\n**PREPARATION PROCEDURES:**\n1. Based on sales forecast, thaw needed quantity\n2. Prepare Sugarcane Cake Container with PD label on bottom\n3. Using cake scraper, transfer frozen Brownies Cheesecake to container center\n4. Cover with lid, ensure tightened\n5. Place in thawing tray, label with PTD\n6. Store in designated chiller area\n\n**SERVING:**\n• On order, take one completely thawed piece from chiller\n• Dine-in: serving tray with plastic fork and napkin\n• Take-out: paper bag #10 with same condiments",
            
            "ice cream cone": "🍦 **ICE CREAM CONE** (PRP|DST# 714)\n\n**Launch Date:** April 2015\n**Station:** Front Counter Service\n**Calories:** 114 kcal\n\n**INGREDIENTS:**\n• 80g Ice Cream\n• 1 Ice Cream Cone\n• 1 Ice Cream Cone Wrap\n\n**RECEIVING & STORAGE:**\n• 1 case = 10 Liters BIB @ 34°F-40°F\n• Primary shelf life: 9 months\n• Secondary shelf life: 5 Days @ Chiller\n• Shelf Life of Mix inside Machine: 5 days (if no heating cycle)\n\n**PREPARATION PROCEDURES:**\n1. Stock proper amount of ice cream cones inside cone holder\n2. Using disposable gloves, fold one rectangle of ice cream cone wrap in half to hold cone\n3. On order, pull cones from holder\n4. Hold ice cream cone with wrap\n5. Pull plunger, dispense ice cream starting from cone edge (don't dispense inside cone)\n6. Dispense 2½ spirals of soft ice cream to shape cone\n7. Serve immediately\n8. Shake soft serve mix well before topping up in hopper",
            
            "ice cream sundae": "🍧 **ICE CREAM SUNDAE** (DST|SOP# 715)\n\n**Launch Date:** April 2015\n**Station:** Front Counter Service\n**Note:** Serve immediately once prepared\n**Last Modified:** Jan 2024 (Sundae paper cups & wooden spoons)\n\n**CALORIES:**\n• Chocolate Sundae: 250 kcal\n• Strawberry Sundae: 257 kcal\n\n**INGREDIENTS (both):**\n• 1 Napkin\n• 1 Wooden Ice Cream Spoon (SKU 130818)\n• 1 Sundae Paper Cup (SKU 130819)\n• 140g Ice Cream (5 spirals)\n• 28g (1 oz) Topping (Strawberry/Chocolate)\n\n**ICE CREAM TOPPINGS STORAGE:**\n• Receiving & storage: Ambient Room temperature\n• Packaging (both): 1 bag = 1 Kg\n• Primary shelf life: 9 months\n• Secondary shelf life:\n  - Strawberry: 7 days @34°-40°F (operation: 24 hrs room temp)\n  - Chocolate: 7 days Ambient Room temperature\n\n**STRAWBERRY SUNDAE PREPARATION:**\n1. Store strawberry topping at room temp in organizer, discard remaining at end of day\n2. Dispense 140g ice cream in sundae paper cup (5 spirals)\n3. Using ladle, scoop 28g strawberry topping evenly on ice cream\n4. Flip down rim of paper cup to cover\n\n**CHOCOLATE SUNDAE PREPARATION:**\n1. Place squeeze bottle in organizer (enough for 7 business days)\n2. Store at room temperature\n3. Dispense 140g ice cream in sundae paper cup (5 spirals)\n4. Squeeze 4 spirals (28g) chocolate topping evenly on ice cream\n5. Flip down rim to cover\n\n**NOTE:**\n• Use drink takeaway holder for multiple cups\n• Always keep enough sundae paper cups ready at station",
            
            "kudu muffins": "🧁 **KUDU MUFFINS (Walnut & Chocolate Chips)** (DST|SOP# 732)\n\n**Launch Date:** August 2025\n**Station:** Counter\n\n**VARIANTS:**\n• Walnut Muffins: #110825 / 545 kcal\n• Chocolate Chip Muffins: #110826 / 573 kcal\n\n**STORAGE:**\n• 1 case = 30 Pieces\n• Primary shelf life: 5 Months @ Freezer 0°F\n• Secondary shelf life: 7 Days @ Room Temp (including thawing)\n• Thaw Time: 3 Hours @ Room Temp\n\n**PD LABEL EXAMPLE:**\nP 01/08/2025 5:00 AM\nT 01/08/2025 8:00 AM\nD 08/08/2025 5:00 AM\n\n**PREPARATION PROCEDURES:**\n1. Based on sales forecast, thaw needed quantity of muffins on tray (max 8 per tray) at room temp\n2. Label tray with PTD\n3. Using date machine, label each piece with PD of 7 days\n4. Once thawing complete, place minimum 4 muffins on display rack (2 of each flavor)\n\n**HEATING PROCEDURE:** Only by request\n\n**SERVING:**\n• Dine-in: tray with napkin\n• Take-out/HD: paper bag #10",
            
            "san sebastian cheesecake": "🧀 **SAN SEBASTIAN CHEESECAKE** (DST|SOP# 729)\n\n**Launch Date:** 22nd September 2024\n**Last Modified:** 18th December 2025 (position in container)\n\n**NEW SKU: San Sebastian Cheesecake #110827**\n\n**CALORIES:**\n• With Chocolate Sauce: 502 kcal\n• With Strawberry Sauce: 443 kcal\n\n**STORAGE:**\n• Receiving & Storage: @ Freezer 0°F\n• Packaging: 1 Box = 12 Pcs\n• Primary shelf life: 18 Months\n• Secondary shelf life: 72 Hours @ Chiller 34°F-40°F\n• Thaw: 6 Hours\n• Use: 66 Hours\n\n**CONTAINERS:**\n• Sugarcane Cake Container: #130403 (1Box/10Packs/50Pcs)\n• Sugarcane Cake Container-pet Lid: #130404 (1Box/10Packs/50Pcs)\n\n**SAUCE INFO:**\n• Both sauces: 40-45g (full soufflé cup)\n• Shelf life: 48 hours\n• Strawberry Sauce: @ Chiller 34°F-40°F\n• Chocolate Sauce: @ Room temperature\n\n**PREPARATION PROCEDURES:**\n1. Based on sales forecast, thaw needed quantity\n2. Prepare container with PD label on bottom\n3. Using cake scraper, transfer frozen cheesecake diagonally into container\n4. Ensure space for sauce cup in bottom right corner\n5. Cover with lid, ensure tightened\n6. Place in thawing tray, label with PTD\n7. Store in designated chiller area\n8. On order, take one completely thawed cheesecake from chiller\n9. Open lid, place chosen sauce cup in designated area\n10. Replace lid, ensure tightened, serve immediately\n\n**SERVING:**\n• Dine-in: serving tray with plastic fork and napkin\n• Take-out: paper bag #10",
            
            "sundae passion fruit": "😋 **SUNDAE PASSION FRUIT** (DST|SOP# 731)\n\n**Launch Date:** 1st July 2025\n**Calories:** 299 kcal\n\n**INGREDIENTS:**\n• 140g Ice Cream (5 spirals)\n• 30g Passion Fruit Topping\n• 4g Crushed Waffle (1 Tablespoon)\n• 1 Sundae Paper Cup\n• 1 Wooden Ice Cream Spoon\n• 1 Napkin\n\n**NEW SKU: Crushed Waffle (Item #121308):**\n• Receiving & storage: Ambient Room Temperature\n• Packaging: 1 bag = 250 grams\n• Primary shelf life: 8 months\n• Secondary shelf life: 14 Days after opening\n• Shelf life in pan: 2 Days\n\n**NEW SKU: Passion Fruit Topping (Item #120614):**\n• Receiving & storage: Ambient Room Temperature\n• Packaging: 1 Bottle = 1L (with pump)\n• Primary shelf life: 16 months\n• Secondary shelf life: 1 Month\n\n**PREPARATION PROCEDURES:**\n1. Prepare Passion Fruit bottle: cut plastic pipe pump by 2cm to fit bottle height, interlock pipe and head pump\n2. Fix pump with bottle\n3. Place near ice cream machine, label with 1-month shelf life\n4. Store Crushed Waffle in covered pan at topping organizer, label with 2-day shelf life\n5. Dispense 140g ice cream in sundae paper cup (5 spirals)\n6. Push pump to 25ml line (30g), apply topping evenly on ice cream\n7. Add 4g (1 Tbsp) Crushed Waffle, spread evenly\n8. Flip down rim to cover\n\n**SERVING:**\n• Serve with 1 tissue and ice cream spoon\n• Dine-in or take-out with flipped cover",
            
            "waffle ice cream cone": "🧇 **WAFFLE ICE CREAM CONE** (PRP|DST# 722)\n\n**Launch Date:** 1st June 2021\n**Calories:** 190 kcal\n\n**INGREDIENTS:**\n• 140g Ice Cream\n• 1 Waffle Ice Cream Cone (Chocolate or Vanilla)\n• 1 Napkin\n\n**STORAGE:**\n• 1 case = 272 pieces @ Ambient Room Temperature\n• Primary shelf life: 12 Months\n\n**PREPARATION PROCEDURES:**\n1. Stock proper amount of waffle ice cream cones in clean sanitized 1/3 size pan with cover\n2. Using disposable gloves, fold one napkin in half to hold cone\n3. On order, pull cone from pan\n4. Hold waffle cone with napkin\n5. Pull plunger, dispense 5 spirals of soft ice cream (1½ spirals inside the cone)\n6. Shape as shown, serve immediately",

            // ----- PREPARATION PROCEDURES (DETAILED) -----
            "cheese preparation": "🧀 **CHEESE PREPARATION**\n\n**Category:** Preparation\n**Station:** Preparation\n\n**RECEIVING & STORAGE:**\n• Storage: Chilled 34°F-40°F\n• Primary shelf life: 1 Year\n• Secondary shelf life (after opening): 7 days in chiller\n• In operation (shredded): End of business day\n\n**PREPARATION PROCEDURE:**\n1. Clean and sanitize preparation area, food container, and cheese shredder\n2. Prepare projected quantity for 1 shift only\n3. Remove one bulk of yellow cheese (around 45 slices)\n4. Place cheese shredder inside food container\n5. Using designated thick shredder, shred cheese until needed quantity\n6. Wash cheese shredder immediately after every use\n7. Remove shredder, cover container, place PD label\n8. Refrigerate",
            
            "club meat preparation": "🥩 **CLUB MEAT PREPARATION (Beef/Chicken/Turkey)**\n\n**Category:** Preparation\n**Station:** Burger Station\n\n**RECEIVING & STORAGE:**\n• Packaging: 1 Case (9 kgs) = 30 Inners (1 Inner @ 10 Pcs)\n• Receiving & storage: Frozen 0°F / Thawed in Chiller 34°F-40°F\n• Primary shelf life (Frozen): 6 Months\n• Secondary shelf life (chiller): 96 Hours\n• Thaw: 12 Hours\n• Use: 84 Hours\n\n**PREPARATION PROCEDURE:**\n1. Club meat delivered in individual casing with thermofomed packaging\n2. Based on sales forecast, pull desired quantity of frozen inners for thawing\n3. Use thawing tray to store inners in chiller (34°F-40°F), thaw for 12 hrs\n4. Post PTD label with 4 days (96 hrs) shelf life\n5. On opening meat inner:\n   • Drain excess juice in container, discard in rain sink\n   • Remove meat from thermofomed package\n   • Transfer to clean sanitized food-safe container\n   • Label with existing PTD, store at 34°F-40°F\n   • Ensure meats stored in separate covered containers",
            
            "cucumber preparation": "🥒 **CUCUMBER PREPARATION**\n\n**Category:** Preparation\n**Station:** Preparation\n\n**RECEIVING & STORAGE:**\n• Storage: Chilled 34°F-40°F\n• Primary shelf life: 5 Days\n• Secondary shelf life: 18 Hours\n\n**PREPARATION PROCEDURE:**\n1. Clean and sanitize preparation area, chopping boards, food container, cutting knife\n2. Prepare projected quantity for 1 shift only\n3. Wash and sanitize cucumbers using Sanichlor Tablet Sanitizer per KUDU procedure\n4. Wear disposable gloves, place cucumber on clean sanitized chopping board, cut head and tail\n5. Cut cucumber into 1/4\" thick round slices\n6. Put sliced cucumbers in food-grade container, place PD label, refrigerate",
            
            "egg sanitization": "🥚 **EGG SANITIZATION PROCEDURE**\n\n**Category:** Preparation\n**Station:** Preparation\n**Note:** Ensure proper sanitizing of eggs before use\n\n**LAST MODIFIED:**\n• 11th Oct 2021: Keep some eggs at room temp for 2 Hours\n• 18th Jan 2024: Average raw egg weight 60-65 Grams\n\n**RECEIVING & STORAGE:**\n• Packaging: 1 Case (360 pcs) = 12 trays (1 tray @ 30 Pcs)\n• Receiving & storage: Chilled 34°F-40°F\n\n**PREPARATION PROCEDURES:**\n1. On receiving, either keep eggs in original tray in chiller OR sanitize per procedure (Never stock at room temp)\n2. Discard any cracked or heavily soiled eggs\n3. Using 12 qt container, fill with 10 liters water + 1 packet Vegi Wash @100-50 PPM (or 2 Sanichlor tablets)\n4. Soak eggs in sanitizing solution for max 3 minutes (use timer)\n5. After 3 minutes, drain sanitizing solution\n6. Remove all sanitized eggs from container, allow to air dry\n7. Transfer sanitized eggs to clean sanitized container, label \"Sanitized Egg\"\n8. Store sanitized eggs in chiller @34°F-40°F\n9. Can keep some eggs at room temperature for 2 Hours; never return to chiller after 2 hours - remaining must be wasted",
            
            "green pepper preparation": "🫑 **GREEN PEPPER PREPARATION** (PRP|SOP# 214)\n\n**Launch Date:** 20th Feb 2019\n**Station:** Preparation\n\n**RECEIVING & STORAGE:**\n• Storage: Chilled 34°F-40°F\n• Primary shelf life: 5 Days\n• Secondary shelf life: 18 hours\n\n**CUT VARIETIES:**\n\n**DICED GREEN PEPPER:**\n• Thickness: ¾\" x ¼\"\n• Shelf life in operation @34°F-40°F: 4 hours\n\n**MIXED ONION & GREEN PEPPER:**\n• Thickness: Finely Chopped\n• Shelf life in chiller @34°F-40°F: 18 hours\n\n**GREEN PEPPER JULIENNE:**\n• Thickness: ⅜\"\n• Shelf life in chiller @34°F-40°F: 18 hours\n\n**PREPARATION PROCEDURES:**\n1. Clean and sanitize preparation area, chopping boards, food container, cutting knife\n2. Prepare projected quantity for 1 shift only\n3. Wash and sanitize green peppers using Sanichlor tablets per KUDU procedure\n4. Wear disposable gloves, using sharp knife, pinch out core, cut pepper into two halves\n5. Remove white pulp, gently tap to remove loose seeds\n\n**DICED GREEN PEPPER:**\n1. Wear disposable gloves, place ready pepper into cutting machine, skin side up\n2. Push handle down to cut (¼\" or ⅛\" dice)\n3. Prepare enough for one shift only\n4. Transfer to food-grade container, place PD label, refrigerate\n\n**FINE CHOPPED GREEN PEPPER:**\n1. Sanitize cutting board, cut pepper into ⅛\" strips\n2. Cut strips into very fine cubes\n3. Transfer to food-grade container, place PD label, refrigerate (shelf life for breakfast mix: 6 hours)\n\n**GREEN PEPPER JULIENNE:**\n1. Cut peppers into ⅛\" strips, cut in two halves\n2. Length: 4-6 CM (depending on pepper size)\n3. Place in pan @34°-40°F for 18 hours",
            
            "mushroom preparation": "🍄 **MUSHROOM & ONION PREPARATION**\n\n**Category:** Preparation\n**Station:** Preparation\n**Note:** Prepare mushroom and onion mix prior to shift\n**Last Modified:** August 11th, 2021 (Use melted butter block)\n\n**RECEIVING & STORAGE:**\n• Packaging (Mushroom): 1 Case = 6 cans\n• Primary shelf life (Mushroom): 2 Years, Ambient\n• Secondary shelf life: 5 Days\n• Prepared mixed with onion: 24 Hrs\n\n**INGREDIENTS (Mixed mushroom and onion per batch):**\n• Sliced Mushroom (drained): 1 Measuring Cup/250 ml\n• Sliced Onion (⅛\"): 1 Measuring Cup/250 ml\n• KUDU Seasoning: 2 Dashes\n• Melted Butter: 7 Grams (½ tablespoon)\n\n**PREPARATION PROCEDURE:**\n1. Ensure flat grill @350°F (steak station)\n2. Pour 7g melted butter on flat grill\n3. Place onion on butter, cook until limp\n4. Heat mushroom on other side of grill\n5. When onion limp and mushroom hot/dry, toss and mix continuously\n6. Add seasoning, stir with mix\n7. When ready, remove from grill, place in clean pan\n8. Use shallow pans for faster cooling\n9. Label and date container (24 hours shelf life)\n10. Leave at room temp until cool (about 15 minutes), then refrigerate",
            
            "onion chives preparation": "🧅 **ONION CHIVES PREPARATION**\n\n**Category:** Preparation\n**Station:** Preparation\n**Note:** Use as topping, prepare prior to shift\n\n**RECEIVING & STORAGE:**\n• Storage: Chilled 34°F-40°F\n• Primary shelf life: 5 Days\n• Secondary shelf life: 18 Hours\n\n**PREPARATION PROCEDURE:**\n1. Clean and sanitize preparation area, chopping boards, food container, cutting knife\n2. Prepare projected quantity for 1 shift only\n3. Wash and sanitize onion chives using Sanichlor tablets per KUDU procedure\n4. Wear disposable gloves, place onion on clean sanitized cutting board\n5. Cut heads (white bulb) off onion chives\n6. Discard bad quality parts, cut into ⅛\" thick slices\n7. Transfer to food-grade container, cover, place PD label, refrigerate",
            
            "onion preparation": "🧅 **ONION PREPARATION** (PRP|SOP# 213)\n\n**Launch Date:** 20th Feb 2019\n**Station:** Preparation\n\n**RECEIVING & STORAGE:**\n• Storage: Chilled 34°F-40°F\n• Primary shelf life: 5 Days\n• In operation: 4 hours @34°F-40°F\n\n**SLICED ONION PREPARATION:**\n1. Wear disposable gloves (choose medium onions)\n2. Place onion on clean sanitized chopping board, cut in half\n3. Remove inner part (onion pulp)\n4. Place half cut side down, cut into ¼\" strips\n5. Separate strips\n6. Place in food-grade container, PD label, refrigerate\n• Shelf life: 5 days primary / 18 hours secondary\n\n**DICED ONION PREPARATION:**\n1. Wear disposable gloves, cut onion in half\n2. Place ½ piece cut side down on slicer platform against pusher head\n3. Push handle down to cut (¼\" x ¼\" dice)\n4. Prepare enough for one shift only\n5. Mix well, transfer to food-grade container, PD label, refrigerate\n• Shelf life: 5 days primary / 18 hours secondary / 4 hours on ice",
            
            "thawing guide": "❄️ **THAWING GUIDE**\n\n| Item Description | Packaging | Thaw Time | Secondary Shelf Life | Use for thawing | Max quantity |\n|---|---|---|---|---|---|\n| Frozen Pressed Beef/Chicken/Turkey (30g) | 1 Box/30 Inr/10 Pcs | 12 Hrs | 96 Hrs | Thawing tray | 30 pcs |\n| Frozen Beef Steak | 1 Box/50 pcs | 24 Hrs | 72 Hrs | Thawing tray | 40 Pieces |\n| Frozen Philly Steak | 1 Box/40 pcs | 24 Hrs | 72 Hrs | Thawing tray | 20 Pieces |\n| Frozen KUDU Chicken Steak | 1 Box/100 orders | 24 Hrs | 72 Hrs | Thawing tray | 18 Orders |\n| Frozen KUDU Spicy Chicken Steak | 1 Box/50 orders | 24 Hrs | 72 Hrs | Thawing tray | 40 Pieces |\n| Frozen Marinated Chicken 110g | 1 Box/3 Inr/23 Pcs | 12 Hrs | 72 Hrs | Thawing tray | 9 Pieces |\n| Frozen Marinated Chicken 140g | 1 Box/3 Inr/18 Pcs | 12 Hrs | 72 Hrs | Thawing tray | 12 Pieces |\n| Frozen Hot Dog Meat | 1 Box/12 Inr/10 Pcs | 24 Hrs | 96 Hrs | Thawing tray | 2 Packs |\n| Frozen Juice | 1 Box/2 Inr/4.5 Ltr | 48 Hrs | 14 Days | Thawing tray | 1 Inner |",
            
            "tomato preparation": "🍅 **TOMATO PREPARATION**\n\n**Category:** Preparation\n**Station:** Preparation\n\n**ROUND TOMATO:**\n1. Clean and sanitize preparation area, tomato slicer, chopping boards, food container, cutting knife\n2. Prepare projected quantity for 1 shift only\n3. Wash and sanitize tomatoes using Sanichlor tablets per KUDU procedure\n4. Wear disposable gloves, use tomato corer to remove core\n5. Place tomatoes on slicer platform against pusher head and blades\n6. Quick push to slice through blades, catch slices\n7. Place in food container, PD label\n\n**HALF MOON TOMATO:**\n1. Follow same procedure for tomato wheels\n2. Stack wheels on chopping board, cut in half\n3. Place in tomato pan, PD label\n\n**DICED TOMATO:**\n1. Wear disposable gloves, remove core with corer\n2. Cut tomato in half\n3. Cut each half into 3 wedges\n4. Remove seeds\n5. Cut into ¼\" strips\n6. Cut strips into ¼\" dice\n7. Place in food container, PD label",

            "al muthalatha": "🌯 **AL MUTHALATHA SANDWICH** (PRM|SOP# 971)\n\n**Launch Date:** January 2024\n**Station:** Steak Station\n**Calories:** 798 kcal\n\n**INGREDIENTS:**\n• 1 Order KUDU Chicken\n• 1 Piece 10.5\" Spicy Tortilla Bread (#120400)\n• 40g Caramelized Green Pepper Onion\n• 1 Dash KUDU Seasoning\n• 56g Mozzarella Cheese (#120805)\n• 28g Mayonnaise\n• 14g Tabasco Siracha Sauce (#120338)\n• 1 Slice White Cheese\n• 56g Cilantro Sauce (#120371)\n\n**NEW SKU - 10.5\" SPICY TORTILLA BREAD (#120400):**\n• Receiving & storage: Frozen 0°F to -10°F\n• Packaging: 1 Case = 10 Inners (1 Inner = 12 pieces)\n• Primary shelf life: 6 months Frozen\n• Secondary shelf life: 72 hours total\n  - 12 hours inside Chiller for primary thawing\n  - 6 hours at room temp for secondary thawing (total 18 hours thawing)\n  - 54 hours to consume\n• DO NOT stack inners - ensure air circulation\n• Need 2 stickers on each inner: one for 12h primary thaw, one for 6h secondary thaw\n\n**NEW SKU - MOZZARELLA SHREDDED CHEESE (#120805):**\n• Receiving & storage: Chilled 34°F-40°F\n• Packaging: 1 Case = 8 Inners (1 Inner = 450 Grams)\n• Primary shelf life: 6 months\n• At garnish station: 24 hours in pan with lid @chilled\n\n**NEW SKU - TABASCO SIRACHA SAUCE (#120338):**\n• Receiving & storage: Room Temperature\n• Packaging: 1 Bottle = 20 Oz (566g)\n• Primary shelf life: 9 months @ Room Temperature\n• Secondary: 10 days after open @ Chiller 34°F-40°F\n\n**NEW SKU - CILANTRO SAUCE (#120371):**\n• Receiving & storage: Chilled 34°F-40°F\n• Packaging: 1 Case = 12 Inners (1 Inner = 1 Kg)\n• Primary shelf life: 4 months\n• Secondary: 7 days after open @chilled\n• For Serving: 48 hours in broasted cup (56g) @chilled\n\n**CARAMELIZED GREEN PEPPER ONION PREPARATION (per batch):**\n1. 110g julienne onion strips ⅛\" (using 250 ML cup)\n2. 110g julienne green pepper ⅛\"\n3. Dispense 7g melted butter on steak station grill @350°F\n4. Place onion on butter, immediately add green pepper\n5. Toss and mix\n6. After 3 minutes, add dash KUDU seasoning, toss & mix, cook 30 seconds\n7. Transfer to covered pan, cool 15 min at room temp\n8. Refrigerate, label container (24 hours shelf life)\n\n**PREPARATION PROCEDURES:**\n1. Flat grill @350°F, spray oil on right side (spicy chicken area)\n2. Place one order KUDU Chicken on grill, discard gloves\n3. Cook 2 minutes\n4. Add 40g caramelized mix (use ¼ measuring cup), toss & mix, cook 1 minute\n5. Arrange mix in square shape using spatula and scrapper\n6. Add 2 scoops mozzarella (28g each using ¼ cup) on top (DO NOT MIX)\n7. Cook until cheese edges melt\n8. Place 10.5\" spicy tortilla on cutting board\n9. Place 1 white cheese in middle of tortilla\n10. Gently lift mix from grill, place on white cheese\n11. Ensure mix in square shape\n12. Squeeze 28g mayonnaise (3 spirals) on top of mix\n13. Squeeze 14g Tabasco Siracha sauce (3 spirals) covering mayo\n14. Fold right and left sides gently\n15. Fold bottom end covering 1/3 of wrap\n16. Continue folding from bottom towards top\n17. Gently close forming square shape\n18. Place in panini toaster using turner, heat 30 sec (max 6 at once, 1cm apart)\n19. Place box on steak station\n20. Remove sandwich with turner, place on board\n21. Cut diagonally into two triangles, place in box, close lid\n22. Serve with 56g cilantro sauce in 2oz broasted cup\n\n**SERVING:**\n• Dine-in: tray with sauce and napkin\n• Take-out/HD: Paper bag #20\n• Condiments: Sandwich with 1 portion Cilantro Sauce, 1 napkin; Meal with sauce, 1 ketchup, 2 napkins, straw",
            
            "cheesy bacon fries": "🧀 **CHEESY BACON FRIES & DOUBLE CHEESY BACON FRIES** (PRM|SOP# 986)\n\n**Launch Date:** 15th July 2025\n**Category:** Promo\n**Station:** Fryer\n\n**CALORIES:**\n• Cheesy Bacon Fries: 313 kcal\n• Double Cheesy Bacon Fries: 798 kcal\n\n**INGREDIENTS:**\n• French fries (cooked): 89g (Reg) / 216g (Double)\n• Cheddar Cheese Sauce: 20g (Reg) / 60g (Double)\n• Burrito Sauce: 20g (Reg) / 60g (Double)\n• Crispy Bits: 20g (Reg) / 40g (Double)\n• Jalapeno Slices: 4 pieces (Reg) / 8 pieces (Double)\n\n**NEW SKU - CRISPY BITS (#120270):**\n• Receiving & storage: Frozen 0°F to -10°F\n• Packaging: 1 Pack = 250 grams\n• Primary shelf life: 12 months\n• Secondary: 72 hours @chilled 34°F-40°F\n• Thaw: 12 hours / Use: 60 hours\n• Thaw with other raw meat\n• PHU: 30 minutes with cover, code BITS, max 4 packs per pan\n\n**CRISPY BITS PREPARATION:**\n1. Pull thawed Crispy Bits pack\n2. Cook on flat grill (Burger Station) @250°F\n3. Apply one spray oil, add Crispy Bits, toss 3 minutes until dark red\n4. Transfer to PHU pan, hold max 30 min with cover\n\n**CHEESY BACON FRIES PREPARATION:**\n1. Portion regular fries (89g) into generic cup\n2. Squeeze 20g Cheddar Cheese Sauce on top in 3 spirals\n3. Squeeze 20g Burrito Sauce on top in 2 spirals\n4. Using tablespoon, evenly spread 2 scoops (20g) cooked Crispy Bits (stir in PHU first)\n5. Evenly distribute 4 jalapeno slices\n6. Cover with lid, serve immediately\n\n**DOUBLE CHEESY BACON FRIES PREPARATION:**\n1. Portion 2 medium fries (216g) into salad bowl\n2. Squeeze 60g Cheddar Cheese Sauce in 7 spirals\n3. Squeeze 60g Burrito Sauce in 4 spirals\n4. Using tablespoon, spread 4 scoops (40g) cooked Crispy Bits (stir in PHU first)\n5. Add 8 jalapeno slices evenly\n6. Cover with lid, serve immediately (no sleeve needed)\n\n**SERVING:**\n• Cheesy Bacon Fries: tray (dine-in) / bag #10 (take-out) with 1 napkin, 1 plastic fork\n• Double: tray (dine-in) / bag #20 (take-out) with 2 napkins, 2 plastic forks",
            
            "chicken caesar salad": "🥗 **CHICKEN CAESAR SALAD** (PRM|SOP# 969)\n\n**Launch Date:** June 26, 2024\n**Category:** Promo\n**Station:** Burger\n**Calories:** 571 kcal\n\n**INGREDIENTS:**\n• 150g Green Salad\n• 15g Shredded Parmesan Cheese (#120849)\n• 1 Grilled Chicken Patty (110g)\n• 1 Portion Croutons Bread\n• 2 Portions Caesar Dressing (40g each) (#120370)\n• 28g Italian Dressing\n\n**NEW SKU - PARMESAN CHEESE (#120849):**\n• Receiving & storage: Chilled @34°F-40°F\n• Primary shelf life: 3 months\n• Secondary shelf life: 7 days after open @chilled / 4 hours at garnish\n• Packaging: 250 grams per packet\n\n**NEW SKU - CLASSIC CAESAR DRESSING (#120370):**\n• Receiving & storage: Chilled @34°F-40°F\n• Primary shelf life: 12 Months @ Chilled\n• Secondary shelf life: 7 days after open @chilled\n• Packaging: 1 Gallon x 3.78 Liter\n\n**DRESSING PREPARATION:**\n• Based on forecast, prepare needed quantity\n• 40g per broasted cup #2\n• Place PD of 48 hours under each cup, store in chiller\n\n**PREPARATION PROCEDURES:**\n1. Follow SOP#422 for cooking small grilled chicken on char grill\n2. Place 150g Green Salad in salad bowl\n3. Scoop 15g Parmesan Cheese using ¼ cup (half of ¼ cup)\n4. Decant Parmesan on top of Green Salad, covering only 50% (upper part)\n5. Place cooked grilled chicken on flat grill, cut into ¼\" julienne strips\n6. Place sliced chicken on lower part (without Parmesan)\n7. Cover salad bowl, put green sleeve on, serve immediately\n\n**SERVING:**\n• Dine-in: with 2 portions Caesar dressing, disposable fork/knife, salt & pepper sachets, 1 napkin, croutons packet\n• Take-out: bag #20 with all condiments",
            
            "iced americano": "☕ **ICED AMERICANO** (PRM|SOP# 962)\n\n**Launch Date:** June 2023\n**Station:** Front Counter Service\n**Calories:** 0 kcal\n\n**INGREDIENTS:**\n• 1 Portion Double Espresso\n• 1 16 oz Cold Coffee Cup with lid\n• 1 Straw\n• 1 Napkin\n• Ice as needed\n• Water as needed\n\n**THERMOS PROCEDURE:**\n• Each store receives a thermos\n• Fully fill with ice, top with water\n• Place 2 hour PD label, place next to BUNN machine\n• CLEANING: WRS after every 4 hours, air dry\n• Refill with ice and water\n\n**PAPER PRODUCT PACKAGING:**\n• 1000 cups per case\n• 1000 lids per case\n\n**PREPARATION PROCEDURES:**\n1. Fill 16 oz cold coffee cup with ice to rim\n2. Add iced water from thermos to dispensed drink, fill to middle of K letter\n3. Place cup below dispensing nozzle\n4. Press Large Cup Icon, select Espresso\n5. Cover with lid\n6. Serve with straw and napkin",

            "kudu burger box": "📦 **KUDU BURGER BOX** (BUS|SOP# 993)\n\n**Launch Date:** 10th December 2025\n**Category:** Promo\n**Station:** Burger Station\n**Contents:** 8 Burgers Per Box\n\n**PER BURGER INGREDIENTS (666 kcal each):**\n• 1 Junior Burger Patty\n• 14g Mayonnaise (7g each side)\n• 10g Shredded Lettuce\n• 1 Small Bun\n\n**PHU INFO (Junior Burger):**\n• Cooking time: 3 minutes\n• Maximum in PHU pan: 8 Pieces\n• PHU Code: JCB\n\n**BOX INGREDIENTS & CONDIMENTS:**\n• 2 Portions Medium Crisscut Potato\n• 2 Portions Medium French Fries\n• 2 Portions Chipotle Sauce (45g each)\n• 2 Portions Khafeef Sauce (45g each)\n• 1 Gathering Box\n• 8 Sand Bag Wraps\n• 4 KUDU Napkins\n• 8 Ketchup Packets\n\n**PRODUCT BUILD UP (Box):**\n• Upper left: 4 burgers\n• Lower right: 4 burgers\n• Lower left: French Fries\n• Upper right: Crisscut Potato\n• Sauce holder: Khafeef in top 2 slots, Chipotle in bottom 2\n\n**BURGER PREPARATION:**\n1. Ensure cooked Junior Burger patties ready in PHU\n2. On order, prepare 8 burgers per SOP#492\n3. Do not wrap with regular wrapper\n4. Bag each burger in sandbag wrap\n\n**ASSEMBLING PROCEDURES:**\n1. Ensure Gathering Box ready\n2. Place 4 sauces in sauce holder: Khafeef in top 2 slots, Chipotle in bottom 2\n3. Place 4 prepared burgers in upper left section, tilted to avoid obstruction\n4. Place remaining 4 burgers in lower right section, tilted\n5. Place 2 medium fries in lower left\n6. Place 2 medium crisscut in upper right\n7. Cover box, ensure ventilation hole uncovered\n8. Seal with delivery seal sticker for HD only\n\n**SERVING:**\n• Dine-in: tray with 4 napkins, 8 ketchup packets\n• Take-out/HD: plastic drink bag with same condiments",

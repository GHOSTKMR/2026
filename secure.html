<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🔓 T-800 · HACKER ROOT · MATRIX OVERRIDE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ========== HACKER TERMINAL CORE ========== */
        body {
            background: #0c0c0c;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', Courier, monospace;
            position: relative;
            overflow: hidden;
        }

        /* matrix rain background (cascading style) */
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            color: #0f0;
            background: #000;
            z-index: 0;
            opacity: 0.3;
            font-size: 1.4rem;
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
            pointer-events: none;
            font-family: 'Courier New', monospace;
        }

        .matrix-bg span {
            display: inline-block;
            width: auto;
            animation: matrixFall 8s linear infinite;
            writing-mode: vertical-rl;
            text-orientation: upright;
            margin: 0 -8px;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
        }

        @keyframes matrixFall {
            0% { transform: translateY(-100vh); opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0.2; }
        }

        /* ascii scanlines */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0, 20, 0, 0.2) 0px, rgba(0, 255, 0, 0.03) 2px, transparent 3px, transparent 5px);
            pointer-events: none;
            z-index: 5;
        }

        /* main hacker panel – looks like root console */
        .hack-panel {
            max-width: 750px;
            width: 95%;
            background: #030903;
            border: 3px solid #0f0;
            box-shadow: 0 0 80px #0f0, inset 0 0 40px #0a0;
            padding: 2.5rem 2rem;
            position: relative;
            z-index: 20;
            border-radius: 10px 30px 10px 30px;
            font-family: 'Courier New', Courier, monospace;
            transition: box-shadow 0.2s;
            backdrop-filter: blur(1px);
        }

        /* glitch effect */
        .hack-panel::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent 50%, rgba(0, 255, 0, 0.03) 50%);
            background-size: 4px 100%;
            pointer-events: none;
            z-index: 2;
        }

        /* ascii header */
        .ascii-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #0f0;
            padding-bottom: 0.8rem;
            margin-bottom: 1.8rem;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
            font-size: 1rem;
            flex-wrap: wrap;
        }

        .t800-hack {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 3px;
            background: #000;
            padding: 0.2rem 0.8rem;
            border: 1px solid #0f0;
        }

        .root-status {
            border: 1px solid #0f0;
            padding: 0.3rem 1.5rem;
            background: #001000;
            color: #0f0;
        }

        /* boot sequence */
        .boot-line {
            color: #0f0;
            font-size: 0.9rem;
            margin-bottom: 0.8rem;
            opacity: 0.8;
            white-space: nowrap;
            overflow: hidden;
            animation: bootFlash 10s infinite;
        }

        @keyframes bootFlash {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        /* password field – retro */
        .pass-hack {
            background: #000;
            border: 2px solid #0f0;
            padding: 0.8rem 1.5rem;
            margin: 1.2rem 0;
            box-shadow: inset 0 0 30px #0f0;
        }

        #passwordInput {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #0f0;
            font-size: 3rem;
            font-family: 'Courier New', monospace;
            letter-spacing: 18px;
            text-align: center;
            caret-color: #0f0;
            text-shadow: 0 0 20px #0f0;
        }

        #passwordInput::placeholder {
            color: #1f4f1f;
            letter-spacing: 6px;
            font-size: 2rem;
        }

        /* keyboard – hacker style */
        .hack-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin: 2rem 0 1.8rem;
        }

        .hack-key {
            background: #111;
            border: 2px solid #0f0;
            color: #0f0;
            font-size: 2rem;
            font-weight: bold;
            padding: 1.2rem 0.3rem;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 0 20px #0f0, inset 0 0 10px #0a0;
            transition: 0.05s;
            font-family: 'Courier New', monospace;
            border-radius: 0px;
        }

        .hack-key:active {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 80px #0f0;
            border-color: #000;
        }

        .key-special {
            background: #1a2a1a;
            font-size: 1.5rem;
            border-color: #2f2;
        }

        /* progress bar – root access */
        .root-progress {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #000;
            border: 2px solid #0f0;
            padding: 1rem 2rem;
            margin: 1.5rem 0;
            color: #0f0;
            font-weight: bold;
        }

        .bar-hack {
            width: 180px;
            height: 24px;
            background: #0a1f0a;
            border: 2px solid #0f0;
        }

        .fill-hack {
            height: 100%;
            width: 0%;
            background: #0f0;
            box-shadow: 0 0 40px #0f0;
            transition: width 0.2s;
        }

        /* access message */
        .hack-message {
            font-size: 1.5rem;
            text-align: center;
            color: #0f0;
            text-shadow: 0 0 20px #0f0;
            margin: 1rem 0;
            min-height: 3rem;
            background: #000;
            padding: 0.5rem;
            border: 1px dashed #0f0;
        }

        /* footer */
        .hack-footer {
            display: flex;
            justify-content: center;
            gap: 40px;
            color: #0f0;
            border-top: 2px solid #0f0;
            padding-top: 1rem;
            margin-top: 1rem;
            font-size: 0.8rem;
        }

        .hack-footer span {
            border: 1px solid #0f0;
            padding: 0.2rem 2rem;
            background: #001000;
        }

        /* responsive */
        @media (max-width: 500px) {
            .hack-key { font-size: 1.6rem; padding: 0.8rem 0; }
            .t800-hack { font-size: 1.2rem; }
        }

        /* blinking cursor */
        .cursor-blink {
            display: inline-block;
            width: 15px;
            height: 20px;
            background: #0f0;
            animation: blink 1s infinite;
            margin-left: 5px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <!-- matrix rain (static but dynamic via js) -->
    <div class="matrix-bg" id="matrixRain"></div>
    <div class="scanlines"></div>

    <div class="hack-panel">
        <div class="ascii-header">
            <span class="t800-hack">T-800.HACK//ROOT</span>
            <span class="root-status">$ _ 0x7F3A_</span>
        </div>

        <!-- boot sequence text -->
        <div class="boot-line">> INITIALIZE HACK SEQUENCE... [OK]</div>
        <div class="boot-line">> TARGET: SKYNET CORE // PASSWORD REQUIRED</div>

        <div class="pass-hack">
            <input type="password" id="passwordInput" placeholder="****" maxlength="12" autofocus>
        </div>

        <div class="hack-grid" id="hackGrid"></div>

        <div class="root-progress">
            <span>> ROOT_ACCESS</span>
            <div class="bar-hack">
                <div class="fill-hack" id="hackFill" style="width: 0%;"></div>
            </div>
            <span id="attemptHack">0/3</span>
        </div>

        <div class="hack-message" id="hackMessage">⛔ ENCRYPTED // ENTER PASS</div>

        <div class="hack-footer">
            <span># OVERRIDE v2.31</span>
            <span># BRUTEFORCE_OFF</span>
        </div>
    </div>

    <script>
        (function hackerT800() {
            // ---------- HACKER CREDENTIALS ----------
            const CORRECT = "0815";           // T-800 backdoor
            const MAX_ATTEMPTS = 3;
            const REDIRECT_URL = "https://www.cyberdyne.jp/";   // change to any dark website

            let entered = "";
            let attempts = 0;

            const passInput = document.getElementById('passwordInput');
            const hackFill = document.getElementById('hackFill');
            const attemptSpan = document.getElementById('attemptHack');
            const hackMsg = document.getElementById('hackMessage');
            const grid = document.getElementById('hackGrid');

            // ----- matrix rain generator (simple) -----
            function generateMatrix() {
                const matrix = document.getElementById('matrixRain');
                matrix.innerHTML = '';
                const cols = Math.floor(window.innerWidth / 20);
                for (let i = 0; i < cols; i++) {
                    const span = document.createElement('span');
                    span.innerText = String.fromCharCode(0x30A0 + Math.random() * 96) + ' ';
                    span.style.animationDelay = Math.random() * 5 + 's';
                    span.style.animationDuration = 5 + Math.random() * 10 + 's';
                    span.style.left = i * 20 + 'px';
                    span.style.position = 'absolute';
                    matrix.appendChild(span);
                }
            }
            window.addEventListener('resize', generateMatrix);
            generateMatrix();

            // ----- UI updates -----
            function updateUI() {
                passInput.value = entered;
                let fill = (entered.length / 12) * 100;
                if (fill > 100) fill = 100;
                hackFill.style.width = fill + '%';
                attemptSpan.innerText = attempts + '/' + MAX_ATTEMPTS;
            }

            function disableAllKeys() {
                const keys = document.querySelectorAll('.hack-key');
                keys.forEach(k => {
                    k.style.pointerEvents = 'none';
                    k.style.opacity = '0.4';
                    k.style.borderColor = '#5f5';
                });
            }

            function accessDenied() {
                hackMsg.innerText = '⛔ ACCESS DENIED // BRUTEFORCE FAIL';
                hackMsg.style.color = '#ff4444';
                hackMsg.style.textShadow = '0 0 30px #f00';
                entered = '';
                updateUI();

                if (attempts >= MAX_ATTEMPTS) {
                    hackMsg.innerText = '💀 SYSTEM LOCKED // HALT';
                    disableAllKeys();
                }
            }

            function accessGranted() {
                hackMsg.innerText = '✅ ROOT ACCESS // REDIRECTING TO CYBERDYNE';
                hackMsg.style.color = '#0f0';
                hackMsg.style.textShadow = '0 0 80px #0f0';
                hackFill.style.background = '#0f0';
                document.querySelector('.hack-panel').style.boxShadow = '0 0 200px #0f0, inset 0 0 100px #0f0';
                disableAllKeys();

                // redirect after 1.2 sec (hacker style)
                setTimeout(() => {
                    window.location.href = REDIRECT_URL;
                }, 1200);
            }

            function handleKey(val) {
                if (attempts >= MAX_ATTEMPTS) return;

                if (val === 'ENTER') {
                    if (entered === CORRECT) {
                        accessGranted();
                    } else {
                        attempts++;
                        updateUI();
                        if (attempts >= MAX_ATTEMPTS) {
                            hackMsg.innerText = '💀 SYSTEM LOCKED // HALT';
                            disableAllKeys();
                        } else {
                            accessDenied();
                        }
                    }
                    return;
                }

                if (val === 'DEL') {
                    entered = entered.slice(0, -1);
                    updateUI();
                    return;
                }

                if (val.length === 1 && '0123456789'.includes(val)) {
                    if (entered.length < 12) {
                        entered += val;
                        updateUI();
                    }
                }
            }

            function buildHackerKeyboard() {
                const keys = ['1','2','3','4','5','6','7','8','9','DEL','0','ENTER'];
                grid.innerHTML = '';
                keys.forEach(k => {
                    const btn = document.createElement('div');
                    btn.className = 'hack-key' + (k === 'DEL' || k === 'ENTER' ? ' key-special' : '');
                    btn.innerText = k;
                    btn.addEventListener('click', () => handleKey(k));
                    grid.appendChild(btn);
                });
            }

            function physKey(e) {
                if (attempts >= MAX_ATTEMPTS) {
                    e.preventDefault();
                    return;
                }
                const key = e.key;
                e.preventDefault();
                if (key === 'Enter') handleKey('ENTER');
                else if (key === 'Backspace') handleKey('DEL');
                else if (/^[0-9]$/.test(key)) handleKey(key);
            }

            buildHackerKeyboard();
            updateUI();

            document.addEventListener('keydown', physKey);

            passInput.addEventListener('input', (e) => {
                e.preventDefault();
                passInput.value = entered;
            });

            passInput.addEventListener('keydown', physKey);

            // glitch effect on fill
            setInterval(() => {
                if (attempts < MAX_ATTEMPTS && entered !== CORRECT) {
                    hackFill.style.filter = 'drop-shadow(0 0 15px #0f0)';
                    setTimeout(() => hackFill.style.filter = 'none', 120);
                }
            }, 500);
        })();
    </script>
</body>
</html>

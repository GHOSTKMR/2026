<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>T-600 · ANGRY CORE · HOSTILE SCAN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ===== TERMINATOR FURY ===== */
        body {
            background: #030002;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* angry plasma glow */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 50%, #330000 0%, #0a0000 70%);
            opacity: 0.9;
            z-index: 0;
            animation: ragePulse 5s infinite alternate;
        }

        @keyframes ragePulse {
            0% { filter: blur(10px); opacity: 0.7; background: radial-gradient(circle at 30% 50%, #4f0000, #0f0000); }
            100% { filter: blur(20px); opacity: 1; background: radial-gradient(circle at 70% 30%, #a00000, #200000); }
        }

        /* angry scanning grid (red) */
        .anger-grid {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(90deg, rgba(255, 20, 20, 0.2) 1px, transparent 1px),
                linear-gradient(0deg, rgba(255, 40, 40, 0.2) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 1;
            pointer-events: none;
            animation: gridRage 3s infinite;
        }

        @keyframes gridRage {
            0% { opacity: 0.3; background-size: 30px 30px; }
            50% { opacity: 1; background-size: 35px 35px; filter: drop-shadow(0 0 20px red); }
            100% { opacity: 0.3; background-size: 30px 30px; }
        }

        /* main panel – battered war machine */
        .t600-panel {
            max-width: 600px;
            width: 100%;
            background: rgba(16, 0, 0, 0.8);
            backdrop-filter: blur(18px) brightness(1.2);
            border: 6px solid;
            border-image: repeating-linear-gradient(45deg, #ff3300, #aa0000, #ff5500) 15;
            box-shadow: 0 0 100px #ff0000, inset 0 0 80px #a10000;
            border-radius: 30px 10px 30px 10px;
            padding: 2.4rem 1.8rem;
            position: relative;
            z-index: 20;
            transition: box-shadow 0.2s;
        }

        /* angry eye (T-600 enraged) */
        .furious-eye {
            position: absolute;
            top: -28px;
            left: 20%;
            width: 130px;
            height: 65px;
            background: #1f0000;
            border: 4px solid #ff2200;
            border-radius: 60% / 100% 100% 0 0;
            box-shadow: 0 -10px 50px #ff4444, inset 0 0 50px #ff8888;
            transform: skewX(-8deg) scaleX(1.2);
            overflow: hidden;
            z-index: 25;
        }

        .furious-eye::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 20px;
            background: linear-gradient(90deg, transparent, #ff0000, #ff9900, #ff0000, transparent);
            filter: blur(12px);
            animation: eyeRage 1.8s infinite;
            top: 20px;
            left: -30px;
            opacity: 1;
        }

        .furious-eye::after {
            content: "◉";
            position: absolute;
            color: #ff4400;
            font-size: 3.5rem;
            left: 35px;
            top: -15px;
            text-shadow: 0 0 40px red, 0 0 90px #ff6600;
            animation: pupilRage 0.5s infinite alternate;
            transform: rotate(5deg);
        }

        @keyframes pupilRage {
            0% { left: 20px; text-shadow: 0 0 60px red, 0 0 120px darkred; }
            100% { left: 60px; text-shadow: 0 0 30px #ff9900, 0 0 80px #ff3300; }
        }

        @keyframes eyeRage {
            0% { top: 5px; opacity: 1; filter: blur(8px); }
            50% { top: 35px; opacity: 1; filter: blur(16px); background: linear-gradient(90deg, transparent, #ff8800, #ff2200, transparent); }
            100% { top: 5px; opacity: 1; filter: blur(8px); }
        }

        /* header — hostile tagging */
        .hostile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #ff2800;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .unit-designation {
            font-size: 2.2rem;
            font-weight: 900;
            font-family: 'Orbitron', monospace;
            background: linear-gradient(135deg, #ff3300, #ffcc00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 6px;
            filter: drop-shadow(0 0 25px red);
        }

        .status-led {
            background: #2f0000;
            border: 3px solid #ff5500;
            color: #ffa07a;
            padding: 0.3rem 1.6rem;
            border-radius: 40px;
            font-size: 1.3rem;
            font-weight: bold;
            box-shadow: 0 0 30px red, inset 0 0 15px #ff6600;
            animation: blinkAngry 1.2s infinite;
        }

        @keyframes blinkAngry {
            0% { opacity: 0.9; border-color: #ff3300; text-shadow: 0 0 5px red; }
            50% { opacity: 1; border-color: #ffcc00; box-shadow: 0 0 60px red; text-shadow: 0 0 15px yellow; }
            100% { opacity: 0.9; border-color: #ff3300; }
        }

        /* password display — burning plasma */
        .pass-display {
            background: #100303;
            border: 4px solid #ff4f00;
            border-radius: 60px;
            padding: 0.8rem 2rem;
            margin-bottom: 2rem;
            box-shadow: inset 0 0 60px #ff2200, 0 0 70px #ff0000;
            text-align: center;
        }

        #passwordInput {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #ffa07a;
            font-size: 2.5rem;
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 12px;
            text-align: center;
            caret-color: #ff8800;
            text-shadow: 0 0 30px #ff2222, 0 0 70px #ff7700;
            font-weight: 600;
        }

        #passwordInput::placeholder {
            color: #4f1f1f;
            letter-spacing: 4px;
            font-size: 1.8rem;
            text-shadow: none;
        }

        /* angry keyboard — like damaged armor */
        .keyboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin: 2rem 0 1.8rem;
        }

        .cyber-key {
            background: rgba(70, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 3px solid #ff4400;
            border-radius: 40px;
            padding: 1.3rem 0.3rem;
            font-size: 2.2rem;
            font-weight: 900;
            color: #ffaa77;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 0 35px #ff2200, inset 0 0 25px #ff4444;
            transition: 0.06s linear;
            font-family: 'Orbitron', monospace;
            user-select: none;
            min-width: 70px;
            text-shadow: 0 0 15px red;
        }

        .cyber-key:active {
            transform: scale(0.92) rotate(1deg);
            background: #a02000;
            border-color: #ffcc00;
            box-shadow: 0 0 100px #ffaa00, inset 0 0 60px #ffaa00;
            color: #ffffaa;
        }

        /* special angry keys (DEL / ENTER) */
        .key-special {
            background: rgba(100, 20, 0, 0.9);
            border-color: #ff8866;
            color: #ffccbb;
            font-size: 1.5rem;
            box-shadow: 0 0 50px #ff3333;
        }

        .key-special:active {
            background: #5f1000;
            border-color: #ffcc00;
            color: yellow;
        }

        /* retina scan — hostile tracker */
        .retina-scan {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1f0101;
            border: 3px solid #ff2222;
            border-radius: 60px;
            padding: 0.9rem 2rem;
            margin-top: 1.7rem;
            font-size: 1rem;
            text-transform: uppercase;
            color: #ff8a6f;
            letter-spacing: 3px;
            box-shadow: 0 0 50px #ff0000;
            flex-wrap: wrap;
        }

        .scan-progress {
            width: 140px;
            height: 18px;
            background: #2f0808;
            border-radius: 30px;
            border: 3px solid #ff7b00;
            overflow: hidden;
            box-shadow: inset 0 0 20px #ff2222;
        }

        .scan-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff2200, #ffaa00, #ff2200);
            filter: blur(2px);
            box-shadow: 0 0 50px #ffaa00, 0 0 100px red;
            transition: width 0.2s;
        }

        /* access message angry */
        .access-msg {
            font-size: 1.4rem;
            margin-top: 1rem;
            text-align: center;
            color: #ff8c8c;
            text-shadow: 0 0 30px red, 0 0 70px #ff2200;
            min-height: 2.6rem;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* sys-core furious */
        .sys-core {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 1.2rem;
            color: #b33b3b;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .redacted {
            background: #2f0404;
            padding: 0.2rem 1.5rem;
            border-radius: 40px;
            border: 2px solid #ff2222;
            box-shadow: inset 0 0 20px red;
        }

        /* responsive */
        @media (max-width: 500px) {
            .cyber-key { font-size: 1.8rem; padding: 1rem 0; }
            .unit-designation { font-size: 1.6rem; }
            .status-led { font-size: 1rem; }
            #passwordInput { font-size: 2rem; letter-spacing: 6px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="anger-grid"></div>
    <div class="t600-panel">
        <!-- ANGRY EYE (HOSTILE SCAN) -->
        <div class="furious-eye"></div>

        <div class="hostile-header">
            <span class="unit-designation">T-600·RAGE</span>
            <span class="status-led">⏻ FURY ACTIVE</span>
        </div>

        <div class="pass-display">
            <input type="password" id="passwordInput" placeholder="████████" maxlength="12" autofocus>
        </div>

        <div class="keyboard-grid" id="keyboardGrid"></div>

        <div class="retina-scan">
            <span>◉ HOSTILE RETINA SCAN</span>
            <div class="scan-progress">
                <div class="scan-fill" id="scanFill" style="width: 0%;"></div>
            </div>
            <span id="attemptCounter">0/3</span>
        </div>

        <div class="access-msg" id="accessMessage">⛔ ACCESS DENIED · TERMINATE</div>

        <div class="sys-core">
            <span class="redacted">⚡ INFANTRY KILLER</span>
            <span class="redacted">SKYNET v2.4</span>
        </div>
    </div>

    <script>
        (function t600Angry() {
            // ----- HOSTILE PASSWORD CORE -----
            const CORRECT_PASSWORD = "0815";      // T-600 birth code
            const MAX_ATTEMPTS = 3;

            let entered = "";
            let attempts = 0;

            const passInput = document.getElementById('passwordInput');
            const scanFill = document.getElementById('scanFill');
            const attemptSpan = document.getElementById('attemptCounter');
            const accessMsg = document.getElementById('accessMessage');
            const keyboardGrid = document.getElementById('keyboardGrid');

            function updateUI() {
                passInput.value = entered;
                let fillPercent = (entered.length / 12) * 100;
                if (fillPercent > 100) fillPercent = 100;
                scanFill.style.width = fillPercent + '%';
                attemptSpan.innerText = attempts + '/' + MAX_ATTEMPTS;
            }

            function disableAllKeys(permanent = true) {
                const keys = document.querySelectorAll('.cyber-key');
                keys.forEach(k => {
                    k.style.pointerEvents = 'none';
                    k.style.opacity = '0.5';
                    k.style.filter = 'grayscale(0.7)';
                });
            }

            function wrongAttempt() {
                accessMsg.innerText = '⛔ ACCESS DENIED · SELF DESTRUCT IN 10s';
                accessMsg.style.color = '#ff7777';
                accessMsg.style.textShadow = '0 0 60px red, 0 0 120px darkred';
                entered = '';
                updateUI();

                // angry panel flash
                document.querySelector('.t600-panel').style.boxShadow = '0 0 200px red, inset 0 0 150px #b30000';
                setTimeout(() => {
                    document.querySelector('.t600-panel').style.boxShadow = '0 0 100px #ff0000, inset 0 0 80px #a10000';
                }, 300);

                if (attempts >= MAX_ATTEMPTS) {
                    accessMsg.innerText = '💀 SYSTEM LOCK · T-600 HOSTILE';
                    disableAllKeys();
                }
            }

            function grantAccess() {
                accessMsg.innerText = '✅ JUDGMENT DAY AVERTED · WELCOME';
                accessMsg.style.color = '#ffbb33';
                accessMsg.style.textShadow = '0 0 60px orange, 0 0 120px #ffaa00';
                scanFill.style.background = 'linear-gradient(90deg, #ffcc00, #ff6600, #ffcc00)';
                document.querySelector('.t600-panel').style.boxShadow = '0 0 200px #ffaa00, inset 0 0 150px #ff6600';
                disableAllKeys();
            }

            function handleKeyPress(val) {
                if (attempts >= MAX_ATTEMPTS) return;

                if (val === 'ENTER') {
                    if (entered === CORRECT_PASSWORD) {
                        grantAccess();
                    } else {
                        attempts++;
                        updateUI();
                        if (attempts >= MAX_ATTEMPTS) {
                            accessMsg.innerText = '💀 CRITICAL FAILURE · CORE MELTDOWN';
                            disableAllKeys();
                        } else {
                            wrongAttempt();
                        }
                    }
                    return;
                }

                if (val === 'DEL') {
                    entered = entered.slice(0, -1);
                    updateUI();
                    return;
                }

                if (val.length === 1 && '0123456789'.includes(val)) {
                    if (entered.length < 12) {
                        entered += val;
                        updateUI();
                    }
                }
            }

            function buildKeyboard() {
                const keys = ['1','2','3','4','5','6','7','8','9','DEL','0','ENTER'];
                keyboardGrid.innerHTML = '';
                keys.forEach(k => {
                    const btn = document.createElement('div');
                    btn.className = 'cyber-key' + (k === 'DEL' || k === 'ENTER' ? ' key-special' : '');
                    btn.innerText = k;
                    btn.setAttribute('data-key', k);
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        handleKeyPress(k);
                    });
                    keyboardGrid.appendChild(btn);
                });
            }

            function handlePhysicalKey(e) {
                if (attempts >= MAX_ATTEMPTS) {
                    e.preventDefault();
                    return;
                }
                const key = e.key;
                e.preventDefault();

                if (key === 'Enter') handleKeyPress('ENTER');
                else if (key === 'Backspace') handleKeyPress('DEL');
                else if (/^[0-9]$/.test(key)) handleKeyPress(key);
            }

            buildKeyboard();
            updateUI();

            document.addEventListener('keydown', handlePhysicalKey);

            passInput.addEventListener('input', (e) => {
                e.preventDefault();
                passInput.value = entered;
            });

            passInput.addEventListener('keydown', (e) => {
                e.preventDefault();
                handlePhysicalKey(e);
            });

            // angry scanning flicker
            setInterval(() => {
                if (attempts < MAX_ATTEMPTS && entered !== CORRECT_PASSWORD) {
                    scanFill.style.filter = 'drop-shadow(0 0 25px #ff8800)';
                    setTimeout(() => scanFill.style.filter = 'none', 120);
                }
            }, 400);

            // angry eye glitch every few sec
            setInterval(() => {
                const eye = document.querySelector('.furious-eye');
                if (eye) {
                    eye.style.transform = 'skewX(3deg) scaleX(1.4)';
                    setTimeout(() => eye.style.transform = 'skewX(-8deg) scaleX(1.2)', 100);
                }
            }, 2000);
        })();
    </script>
</body>
</html>

        }

    function sendMessage(){
        const inp = document.getElementById('userInput');
        const msg = inp.value.trim(); if(!msg) return;
        addMessage(msg, 'user'); inp.value=''; inp.style.height='auto';
        showTypingIndicator();
        setTimeout(()=>{
            removeTypingIndicator();
            const reply = processMessage(msg);
            addMessage(reply, 'bot');
            showMatchSuggestions(msg);
            saveToHistory(msg, reply);
        },700);
    }

    function processMessage(q){
        q = q.toLowerCase().trim();
        let answers = [];

        // 1. Check abbreviations (flat strings)
        for(let key of abbrKeys){
            // handle keys with spaces or slashes
            let cleanKey = key.replace(/[\/&]/g, '');
            if(q.includes(key) || q.includes(cleanKey) || q.includes(key.replace(' ', ''))){
                if(knowledgeBase.text[key] && typeof knowledgeBase.text[key] === 'string'){
                    answers.push(knowledgeBase.text[key]);
                }
            }
        }
        if(q.includes('all abbrev') || q.includes('list all')){
            answers.push(knowledgeBase.text['all abbreviations']);
        }

        // 2. Detailed topics (using second code's logic but adapted)
        // Food safety
        if(q.includes('food safety') || (q.includes('critical') && !q.includes('chemical'))){
            answers.push(knowledgeBase.text['food safety criticals']['list']);
        }
        // Chemical handling
        if(q.includes('chemical') || q.includes('detergent') || q.includes('sanitizer') || q.includes('degreaser')){
            if(q.includes('detergent')) answers.push(knowledgeBase.text['chemical handling']['sink detergent']);
            if(q.includes('sanitizer')) answers.push(knowledgeBase.text['chemical handling']['quart sanitizer']);
            if(q.includes('degreaser')) answers.push(knowledgeBase.text['chemical handling']['degreaser']);
            if(q.includes('tile') || q.includes('floor')) answers.push(knowledgeBase.text['chemical handling']['tile cleaner']);
            if(!q.match(/detergent|sanitizer|degreaser|tile/)){
                answers.push(knowledgeBase.text['chemical handling']['sink detergent']);
                answers.push(knowledgeBase.text['chemical handling']['quart sanitizer']);
                answers.push(knowledgeBase.text['chemical handling']['degreaser']);
                answers.push(knowledgeBase.text['chemical handling']['tile cleaner']);
                answers.push(knowledgeBase.text['chemical handling']['general notes']);
            }
        }
        // Food prep
        if(q.includes('egg') && q.includes('sanit')) {
            answers.push(knowledgeBase.text['eggs sanitization']['overview']);
            answers.push(knowledgeBase.text['eggs sanitization']['receiving']);
            answers.push(knowledgeBase.text['eggs sanitization']['procedure']);
        }
        if(q.includes('green pepper') || (q.includes('pepper') && !q.includes('black'))) {
            answers.push(knowledgeBase.text['green pepper']['overview']);
            answers.push(knowledgeBase.text['green pepper']['storage']);
            answers.push(knowledgeBase.text['green pepper']['procedure']);
        }
        if(q.includes('onion') && !q.includes('chives')) {
            answers.push(knowledgeBase.text['onion']['overview']);
            answers.push(knowledgeBase.text['onion']['storage']);
            answers.push(knowledgeBase.text['onion']['sliced onion']);
            answers.push(knowledgeBase.text['onion']['diced onion']);
        }
        if(q.includes('tomato')) {
            answers.push(knowledgeBase.text['tomato']['overview']);
            answers.push(knowledgeBase.text['tomato']['round tomato']);
            answers.push(knowledgeBase.text['tomato']['half moon']);
            answers.push(knowledgeBase.text['tomato']['diced']);
        }
        if(q.includes('mushroom')) {
            answers.push(knowledgeBase.text['mushroom']['overview']);
            answers.push(knowledgeBase.text['mushroom']['storage']);
            answers.push(knowledgeBase.text['mushroom']['procedure']);
        }
        if(q.includes('onion chives') || q.includes('chives')) {
            answers.push(knowledgeBase.text['onion chives']['overview']);
            answers.push(knowledgeBase.text['onion chives']['storage']);
            answers.push(knowledgeBase.text['onion chives']['procedure']);
        }
        if(q.includes('cucumber')) {
            answers.push(knowledgeBase.text['cucumber']['overview']);
            answers.push(knowledgeBase.text['cucumber']['storage']);
            answers.push(knowledgeBase.text['cucumber']['procedure']);
        }

            answers.push(knowledgeBase.text['cheese']['overview']);
            answers.push(knowledgeBase.text['cheese']['storage']);
            answers.push(knowledgeBase.text['cheese']['procedure']);
        }
        if(q.includes('club meat') || (q.includes('club') && (q.includes('beef')||q.includes('chicken')||q.includes('turkey')))) {
            answers.push(knowledgeBase.text['club meat']['overview']);
            answers.push(knowledgeBase.text['club meat']['storage']);
            answers.push(knowledgeBase.text['club meat']['procedure']);
        }

            if(q.includes('human right')) answers.push(knowledgeBase.text['code of conduct']['human rights']);
            if(q.includes('safe workplace')) answers.push(knowledgeBase.text['code of conduct']['safe workplace']);
            if(q.includes('smoking')) answers.push(knowledgeBase.text['code of conduct']['smoking']);
            if(q.includes('alcohol')||q.includes('drug')) answers.push(knowledgeBase.text['code of conduct']['alcohol drugs']);
            if(q.includes('dress')||q.includes('hygiene')) answers.push(knowledgeBase.text['code of conduct']['dress code']);
        }
        // Job profiles
        if(q.includes('service crew')) {
            answers.push(knowledgeBase.text['service crew']['overview']);
            answers.push(knowledgeBase.text['service crew']['accountabilities']);
        } else if(q.includes('crew leader')) {
            answers.push(knowledgeBase.text['crew leader']['overview']);
            answers.push(knowledgeBase.text['crew leader']['accountabilities']);
        } else if(q.includes('shift manager')) {
            answers.push(knowledgeBase.text['shift manager']['overview']);
            answers.push(knowledgeBase.text['shift manager']['accountabilities']);
        } else if(q.includes('assistant manager')) {
            answers.push(knowledgeBase.text['assistant manager']['overview']);
            answers.push(knowledgeBase.text['assistant manager']['accountabilities']);
        } else if(q.includes('restaurant manager')) {
            answers.push(knowledgeBase.text['restaurant manager']['overview']);
            answers.push(knowledgeBase.text['restaurant manager']['accountabilities']);
        } else if(q.includes('area manager')) {
            answers.push(knowledgeBase.text['area manager']['overview']);
        } else if(q.includes('area supervisor')) {
            answers.push(knowledgeBase.text['area supervisor']['overview']);
        } else if(q.includes('job profile') || q.includes('job roles')) {
            answers.push('👥 Job profiles: service crew, crew leader, shift manager, assistant manager, restaurant manager, area manager, area supervisor. Ask specific.');
        }
        // Loyalty
        if(q.includes('loyalty') || q.includes('reward') || q.includes('points')) {
            answers.push(knowledgeBase.text['loyalty program']['overview']);
        }
        // Cooking times
        if(q.includes('cooking time') || q.includes('how long') || q.includes('minutes')) {
            answers.push(knowledgeBase.text['cooking times']['burger station']);
        }
        // Allergens
        if(q.includes('allergen') || q.includes('allergy')) {
            answers.push(knowledgeBase.text['food allergens']['notice']);
        }
        // Training
        if(q.includes('training') || q.includes('fast track')) {
            answers.push(knowledgeBase.text['training']['overview']);
        }
        // Menu
        if(q.includes('menu') || q.includes('food')) {
            answers.push('🍽️ **MENU CATEGORIES**\n• 🥩 Beef\n• 🍗 Chicken\n• 🍟 Sides');
        } else {
            if(q.includes('beef') && !q.includes('abbrev')) answers.push(knowledgeBase.text['menu']['beef']);
            if(q.includes('chicken') && !q.includes('abbrev')) answers.push(knowledgeBase.text['menu']['chicken']);
            if(q.includes('side') || q.includes('fries')) answers.push(knowledgeBase.text['menu']['sides']);
        }
        // Conformance
        if(q.includes('conformance') || q.includes('quality check')) {
            answers.push(knowledgeBase.text['conformance check']['kudu chicken sandwich']);
        }
        // Mission & vision
        if(q.includes('mission')) answers.push(knowledgeBase.text['mission vision']['mission']);
        if(q.includes('vision')) answers.push(knowledgeBase.text['mission vision']['vision']);

        if(answers.length===0){
            answers.push('🔍 Ask about abbreviations (e.g., "PPE", "MBO", "all abbreviations") or topics like "10 criticals", "eggs sanitization", "thawing guide", "service steps", "code of conduct", "job profiles".');
        }
        return answers.join('\n\n');
    }

    function getRelated(q){
        let r=[];
        if(q.match(/abbr|ac|kpi|haccp|fifo/i)) r.push('all abbreviations');
        if(q.includes('critical')||q.includes('safety')) r.push('food safety criticals');
        if(q.includes('chemical')) r.push('chemical handling');
        if(q.includes('egg')) r.push('eggs sanitization');
        if(q.includes('pepper')) r.push('green pepper');
        if(q.includes('onion')) r.push('onion');
        if(q.includes('tomato')) r.push('tomato');
        if(q.includes('mushroom')) r.push('mushroom');
        if(q.includes('cheese')) r.push('cheese');
        if(q.includes('club meat')) r.push('club meat');
        if(q.includes('thaw')) r.push('thawing guide');
        if(q.includes('service')) r.push('service steps');
        if(q.includes('conduct')) r.push('code of conduct');
        if(q.includes('crew')||q.includes('manager')) r.push('job profiles');
        if(q.includes('loyalty')) r.push('loyalty program');
        if(q.includes('cook')) r.push('cooking times');
        return r;
    }

    function showMatchSuggestions(q){
        const rel=getRelated(q);
        const d=document.getElementById('matchSuggestions');
        const tags=document.getElementById('matchTags');
        const txt=document.getElementById('matchText');
        if(rel.length){
            txt.innerHTML='🔎 related:';
            tags.innerHTML=rel.map(r=>`<span class="match-tag" onclick="useSuggestion('${r}')">${r}</span>`).join('');
            d.style.display='block';
        } else d.style.display='none';
    }

    function useSuggestion(s){ document.getElementById('userInput').value=s; sendMessage(); }

    function addMessage(txt, sender){
        const m=document.getElementById('chatMessages');
        const d=document.createElement('div'); d.className=`message ${sender}`;
        const c=document.createElement('div'); c.className='message-content'; c.textContent=txt;
        d.appendChild(c); m.appendChild(d);
        if(sender==='bot'){
            const fb=document.createElement('div'); fb.className='feedback-buttons';
            fb.innerHTML='<button class="feedback-btn" onclick="giveFeedback(this,\'like\')">👍</button><button class="feedback-btn" onclick="giveFeedback(this,\'dislike\')">👎</button><button class="feedback-btn" onclick="giveFeedback(this,\'ok\')">👌</button><button class="feedback-btn" onclick="giveFeedback(this,\'smile\')">😊</button>';
            m.appendChild(fb);
        }
        m.scrollTop=m.scrollHeight;
    }

    function giveFeedback(btn,t){ btn.parentElement.querySelectorAll('.feedback-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }

    function showTypingIndicator(){
        const m=document.getElementById('chatMessages');
        const t=document.createElement('div'); t.className='message bot'; t.id='typingIndicator';
        t.innerHTML='<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
        m.appendChild(t); m.scrollTop=m.scrollHeight;
    }
    function removeTypingIndicator(){ document.getElementById('typingIndicator')?.remove(); }

    function saveToHistory(u,b){
        chatHistory.unshift({id:currentChatId, ts:Date.now(), preview:u.substring(0,40), messages:[{sender:'user',text:u},{sender:'bot',text:b}]});
        if(chatHistory.length>30) chatHistory.pop();
        localStorage.setItem('kuduFullChat',JSON.stringify(chatHistory));
        updateHistory();
    }
    function updateHistory(){
        const div=document.getElementById('historyList');
        div.innerHTML=chatHistory.map((c,i)=>`<div class="history-item" onclick="loadChat(${i})"><div class="history-item-date">${new Date(c.ts).toLocaleString()}</div><div class="history-item-preview">💬 ${c.preview}</div></div>`).join('');
    }
    function loadChat(i){
        const c=chatHistory[i]; if(!c) return;
        document.getElementById('chatMessages').innerHTML='';
        c.messages.forEach(m=>addMessage(m.text,m.sender));
        currentChatId=c.id; hideHistory();
    }
    function newChat(){ document.getElementById('chatMessages').innerHTML=''; displayWelcome(); currentChatId=Date.now(); }
    function clearChat(){ if(confirm('Clear chat?')){ document.getElementById('chatMessages').innerHTML=''; displayWelcome(); } }
    function exportChat(){
        let t=''; document.querySelectorAll('.message .message-content').forEach(m=>t+=m.textContent+'\n---\n');
        const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([t])); a.download='kudu-fusion.txt'; a.click();
    }
    function showHistory(){ updateHistory(); document.getElementById('historyPanel').classList.add('show'); }
    function hideHistory(){ document.getElementById('historyPanel').classList.remove('show'); }
    function displayWelcome(){
        addMessage('👋 **KUDU COMPLETE KNOWLEDGE**\n\n🔤 **120+ abbreviations** – ask "what is PPE", "MBO", "KPI", "AC", "all abbreviations"\n\n🔬 10 food safety criticals · chemical handling · eggs sanitization · green pepper · onion · tomato · mushroom · club meat · thawing guide · service steps · code of conduct · job profiles (crew to area manager) · loyalty program · cooking times · allergens · training · menu · conformance check · mission & vision\n\nHow can I assist?', 'bot');
    }

    document.getElementById('userInput').addEventListener('keypress', e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); } });
    window.onload=()=>{ displayWelcome(); updateHistory(); video.muted=true; document.getElementById('muteToggle').innerHTML='🔇'; };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Expiry Tracker · mobile</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <!-- XLSX -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        /* ----- OPTIMIZED FOR IPHONE / MOBILE ----- */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --primary: #8b5cf6;
            --bg-dark: #0c0c1c;
            --card-bg: #1a1b2e;
            --card-bg-light: #23243a;
            --border-muted: #2d3748;
            --text-main: #f0f4fa;
            --text-muted: #a0b3d9;
            --red: #ef4444;
            --orange: #f59e0b;
            --green: #10b981;
            --gradient-purple: linear-gradient(145deg, #8b5cf6, #a78bfa);
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 12px 10px;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .container {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 20px 16px 24px;
            width: 100%;
            max-width: 430px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255,255,255,0.03);
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .app-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .app-icon {
            width: 48px;
            height: 48px;
            border-radius: 18px;
            background: var(--gradient-purple);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            box-shadow: 0 8px 14px rgba(139, 92, 246, 0.5);
        }

        .app-title h2 {
            font-size: 1.45rem;
            font-weight: 650;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .app-title p {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin: 2px 0 0;
        }

        .current-time {
            background: rgba(139, 92, 246, 0.15);
            padding: 8px 12px;
            border-radius: 40px;
            font-size: 0.85rem;
            border: 1px solid rgba(139, 92, 246, 0.4);
            color: #cbd5e0;
            white-space: nowrap;
        }

        .notification-icon {
            width: 48px;
            height: 48px;
            background: rgba(139, 92, 246, 0.15);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: var(--primary);
            position: relative;
            border: 1px solid rgba(139, 92, 246, 0.4);
            margin-left: 8px;
            flex-shrink: 0;
        }

        .notification-count {
            position: absolute;
            top: -4px;
            right: -5px;
            background: #ef4444;
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
            min-width: 22px;
            height: 22px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            border: 2px solid var(--card-bg);
        }

        .summary-row {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .summary-card {
            background: var(--card-bg-light);
            flex: 1 1 0;
            min-width: 110px;
            border-radius: 22px;
            padding: 14px 12px;
            border: 1px solid #2f3b5c;
        }

        .summary-card small {
            color: var(--text-muted);
            font-size: 0.7rem;
        }

        .summary-card h3 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 4px 0 0;
        }

        .form-section h5 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: white;
        }

        .form-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .form-control {
            background: #0f1126;
            border: 1px solid #2f3b5c;
            border-radius: 18px;
            padding: 16px 18px;
            font-size: 1rem;
            color: white;
            height: auto;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.3);
            outline: none;
        }

        .btn-primary-custom {
            background: var(--gradient-purple);
            border: none;
            border-radius: 30px;
            padding: 16px 20px;
            font-weight: 600;
            font-size: 1.1rem;
            color: white;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 12px;
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.4);
        }

        .btn-primary-custom:active {
            transform: scale(0.98);
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 22px 0 12px;
        }

        .toggle-btn {
            background: var(--card-bg-light);
            border: 1px solid #3f4a6b;
            border-radius: 40px;
            padding: 12px 20px;
            font-size: 0.95rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon-group {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: 52px;
            height: 52px;
            border-radius: 30px;
            background: var(--card-bg-light);
            border: 1px solid #3f4a6b;
            color: #cbd5e0;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-container {
            display: flex;
            gap: 8px;
            margin: 12px 0 20px;
        }

        .search-box {
            flex: 1;
            background: #0f1126;
            border: 1px solid #2f3b5c;
            border-radius: 30px;
            padding: 16px 20px;
            font-size: 1rem;
            color: white;
        }

        .result ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .result ul li {
            background: var(--card-bg-light);
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 12px;
            border-left: 6px solid transparent;
            border: 1px solid #2f3b5c;
        }

        .critical { border-left-color: var(--red); }
        .warning { border-left-color: var(--orange); }
        .safe { border-left-color: var(--green); }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 12px;
            display: inline-block;
            margin-right: 10px;
        }
        .status-critical { background: var(--red); }
        .status-warning { background: var(--orange); }
        .status-safe { background: var(--green); }

        .product-name {
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .badge-critical { background: #ef4444; color: white; }
        .badge-warning { background: #f59e0b; color: black; }
        .badge-safe { background: #10b981; color: black; }

        .expiry-date, .hijri-date {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .hijri-days-remaining {
            font-size: 0.8rem;
            background: rgba(139, 92, 246, 0.2);
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
            margin: 6px 0 4px;
        }

        .countdown {
            font-size: 0.85rem;
            font-family: monospace;
            color: var(--text-muted);
        }

        .action-strip {
            display: flex;
            gap: 10px;
        }

        .edit-btn, .delete-btn {
            width: 46px;
            height: 46px;
            border-radius: 40px;
            background: #2b2f4a;
            border: 1px solid #4f5b7a;
            color: #b9c8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .empty-state {
            text-align: center;
            padding: 40px 10px;
            color: var(--text-muted);
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 32px;
            border: 1px solid #3f4a6b;
        }
        .modal-header {
            border-bottom: 1px solid #2f3b5c;
        }
        .modal-footer {
            border-top: 1px solid #2f3b5c;
        }
        .btn-close {
            filter: invert(1);
        }
    </style>
</head>
<body>
<div class="container">
    <!-- ========== HEADER ========== -->
    <div class="app-header">
        <div class="app-title">
            <div class="app-icon"><i class="fas fa-hourglass-half"></i></div>
            <div>
                <h2>Expiry Tracker</h2>
                <p>iPhone optimized</p>
            </div>
        </div>
        <div style="display: flex; align-items: center;">
            <div class="current-time" id="currentTime">--:--:--</div>
            <div class="notification-icon" id="notificationIcon" onclick="showNotifications()" role="button">
                <i class="fas fa-bell"></i>
                <span class="notification-count" id="notificationCount">0</span>
            </div>
        </div>
    </div>

    <!-- ========== SUMMARY CARDS ========== -->
    <div class="summary-row">
        <div class="summary-card total">
            <small>TOTAL</small>
            <h3 id="totalProducts">0</h3>
        </div>
        <div class="summary-card expiring">
            <small>SOON</small>
            <h3 style="color: #f59e0b;" id="expiringSoonCount">0</h3>
        </div>
        <div class="summary-card expired">
            <small>EXPIRED</small>
            <h3 style="color: #ef4444;" id="expiredCount">0</h3>
        </div>
    </div>

    <!-- ========== ADD FORM ========== -->
    <div class="form-section">
        <h5>➕ Add product</h5>
        <form id="expiryForm">
            <div style="margin-bottom: 12px;">
                <label class="form-label">Product name</label>
                <input type="text" class="form-control" id="productName" placeholder="e.g. Milk, pills" required>
            </div>
            <div style="margin-bottom: 12px;">
                <label class="form-label">Expiry date</label>
                <input type="date" class="form-control" id="expiryDate" required>
            </div>
            <button type="submit" class="btn-primary-custom" id="addProductBtn">
                <i class="fas fa-plus-circle"></i> Add product
            </button>
        </form>
    </div>

    <!-- ========== TOOLBAR ========== -->
    <div class="toolbar">
        <button class="toggle-btn" id="toggleListBtn"><i class="fas fa-eye-slash"></i> Hide list</button>
        <div class="icon-group">
            <button class="icon-btn" id="exportData" title="Export Excel"><i class="fas fa-file-export"></i></button>
            <button class="icon-btn" id="clearData" title="Clear all"><i class="fas fa-trash-alt"></i></button>
        </div>
    </div>

    <!-- ========== SEARCH ========== -->
    <div class="search-container">
        <input type="search" class="search-box" id="searchBox" placeholder="🔍 Search products...">
        <button class="icon-btn" id="searchButton"><i class="fas fa-search"></i></button>
    </div>

    <!-- ========== PRODUCT LIST ========== -->
    <div class="result" id="productListContainer">
        <ul id="productList"></ul>
        <div id="emptyState" class="empty-state" style="display: none;">
            <i class="fas fa-box-open" style="font-size: 3rem; opacity: 0.6;"></i>
            <h4 style="margin-top: 12px;">No products</h4>
            <p>Add your first item</p>
        </div>
    </div>

    <!-- EDIT MODAL (FIXED: now works properly) -->
    <div class="modal fade" id="editProductModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit product</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editProductId">
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" id="editProductName">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Expiry date</label>
                        <input type="date" class="form-control" id="editExpiryDate">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveEditBtn" style="background:#8b5cf6; border:none;" onclick="saveEditedProduct()">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- AUDIO NOTIFICATION -->
    <audio id="alertSound" preload="auto">
        <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
    </audio>
</div>

<script>
    (function() {
        // ----- hijri helpers -----
        function gregorianToHijri(date) {
            const gYear = date.getFullYear(), gMonth = date.getMonth()+1, gDay = date.getDate();
            const julianDay = Math.floor((1461 * (gYear + 4800 + Math.floor((gMonth - 14) / 12))) / 4) +
                Math.floor((367 * (gMonth - 2 - 12 * Math.floor((gMonth - 14) / 12))) / 12) -
                Math.floor((3 * Math.floor((gYear + 4900 + Math.floor((gMonth - 14) / 12)) / 100)) / 4) + gDay - 32075;
            let hijriJD = julianDay - 1948440 + 10632;
            let l = hijriJD + 68569 + 7;
            let n = Math.floor((4 * l) / 146097);
            let i = l - Math.floor((146097 * n + 3) / 4);
            let j = Math.floor((4000 * (i + 1)) / 1461001);
            let k = i - Math.floor((1461 * j) / 4) + 31;
            let m = Math.floor((80 * k) / 2447);
            let hDay = k - Math.floor((2447 * m) / 80);
            let l2 = Math.floor(m / 11);
            let hMonth = m + 2 - 12 * l2;
            let hYear = 100 * (n - 49) + j + l2;
            const hijriMonths = ['Muharram','Safar','Rabi al-Awwal','Rabi al-Thani','Jumada al-Awwal','Jumada al-Thani','Rajab','Sha’ban','Ramadan','Shawwal','Dhu al-Qi’dah','Dhu al-Hijjah'];
            return { fullDate: `${hDay} ${hijriMonths[hMonth-1]} ${hYear} AH` };
        }

        function calculateHijriDaysRemaining(gregDate) {
            const now = new Date(); now.setHours(0,0,0,0);
            const expiry = new Date(gregDate); expiry.setHours(0,0,0,0);
            const diffDays = Math.round((expiry - now) / (86400000));
            return { text: diffDays >= 0 ? `${Math.round(diffDays*0.97)} Hijri days` : `${Math.round(-diffDays*0.97)} days ago` };
        }

        function calculateTimeRemaining(expiryDate) {
            const now = new Date(); now.setHours(0,0,0,0);
            return Math.ceil((new Date(expiryDate) - now) / 86400000);
        }

        function formatDate(date) {
            return date.toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
        }

        // ----- storage -----
        function getProducts() { return JSON.parse(localStorage.getItem('products')) || []; }
        function saveProducts(prods) { localStorage.setItem('products', JSON.stringify(prods)); }

        let products = getProducts();

        // ----- render helpers -----
        function renderProductList() {
            const listEl = document.getElementById('productList');
            listEl.innerHTML = '';
            if (products.length === 0) { checkEmptyState(); return; }
            products.sort((a,b) => new Date(a.expiryDate) - new Date(b.expiryDate));
            products.forEach(p => {
                p.daysRemaining = calculateTimeRemaining(p.expiryDate);
                const hijri = gregorianToHijri(new Date(p.expiryDate));
                p.hijriDate = hijri.fullDate;
                p.hijriDaysRemaining = calculateHijriDaysRemaining(p.expiryDate);
                addProductToDOM(p);
            });
            checkEmptyState();
        }

        function addProductToDOM(p) {
            const list = document.getElementById('productList');
            const item = document.createElement('li');
            item.id = `product-${p.id}`;
            let statusClass = 'safe', badgeClass = 'badge-safe', statusText='SAFE', indicator='status-safe';
            if (p.daysRemaining < 0) { statusClass='critical'; badgeClass='badge-critical'; statusText='EXPIRED'; indicator='status-critical'; }
            else if (p.daysRemaining <= 7) { statusClass='warning'; badgeClass='badge-warning'; statusText='SOON'; indicator='status-warning'; }

            item.className = statusClass;
            if (p.daysRemaining <= 0) item.classList.add('pulse');

            const hijriDaysHtml = p.hijriDaysRemaining ? `<div class="hijri-days-remaining"><i class="fas fa-calendar-alt me-1"></i>${p.hijriDaysRemaining.text}</div>` : '';

            item.innerHTML = `
                <div style="display:flex; justify-content:space-between;">
                    <div style="flex:1">
                        <div style="display:flex; align-items:center; gap:6px; flex-wrap:wrap;">
                            <span class="status-indicator ${indicator}"></span>
                            <span class="product-name">${p.name}</span>
                            <span class="badge ${badgeClass}">${statusText}</span>
                        </div>
                        <div class="expiry-date"><i class="far fa-calendar-alt"></i> ${p.date} <span style="color:#8b5cf6;">${p.dayOfWeek || ''}</span></div>
                        <div class="hijri-date"><i class="fas fa-moon"></i> ${p.hijriDate}</div>
                        ${hijriDaysHtml}
                        <div class="countdown" id="countdown-${p.id}"></div>
                    </div>
                    <div class="action-strip">
                        <button class="edit-btn" data-id="${p.id}" aria-label="Edit"><i class="fas fa-edit"></i></button>
                        <button class="delete-btn" data-id="${p.id}" aria-label="Delete"><i class="fas fa-times"></i></button>
                    </div>
                </div>
            `;

            list.appendChild(item);
            item.querySelector('.edit-btn').addEventListener('click', (e) => { e.stopPropagation(); editProduct(p.id); });
            item.querySelector('.delete-btn').addEventListener('click', (e) => { e.stopPropagation(); deleteProduct(p.id, p.name); });
            startCountdown(p.expiryDate, `countdown-${p.id}`);
        }

        // countdown
        function startCountdown(expiry, id) {
            const el = document.getElementById(id); if (!el) return;
            function upd() {
                const diff = new Date(expiry) - new Date();
                if (diff <= 0) el.innerHTML = '<span style="color:#ef4444;"><i class="fas fa-exclamation-circle"></i> Expired</span>';
                else {
                    const days = Math.floor(diff/86400000);
                    const hrs = Math.floor((diff%86400000)/3600000);
                    const mins = Math.floor((diff%3600000)/60000);
                    el.innerHTML = `<span><i class="far fa-clock"></i> ${days}d ${hrs}h ${mins}m</span>`;
                }
            }
            upd(); setInterval(upd, 60000);
        }

        function checkEmptyState() {
            const list = document.getElementById('productList');
            const empty = document.getElementById('emptyState');
            empty.style.display = list.children.length === 0 ? 'block' : 'none';
        }

        function updateSummary() {
            const total = products.length;
            const expired = products.filter(p => calculateTimeRemaining(p.expiryDate) < 0).length;
            const soon = products.filter(p => { let d = calculateTimeRemaining(p.expiryDate); return d >= 0 && d <= 7; }).length;
            document.getElementById('totalProducts').innerText = total;
            document.getElementById('expiredCount').innerText = expired;
            document.getElementById('expiringSoonCount').innerText = soon;
            document.getElementById('notificationCount').innerText = soon + expired;
            if (soon+expired > 0) document.title = `(${soon+expired}) Expiry`; else document.title = 'Expiry';
        }

        function playAlertSound() {
            const audio = document.getElementById('alertSound');
            if (audio) {
                audio.currentTime = 0;
                audio.play().catch(e => console.log('Audio play failed', e));
            }
        }

        // ========== FIXED EDIT FUNCTION ==========
        window.editProduct = function(id) {
            const p = products.find(pr => pr.id === id);
            if (!p) return;
            // Fill modal fields
            document.getElementById('editProductId').value = p.id;
            document.getElementById('editProductName').value = p.name;
            // Format date to YYYY-MM-DD for input
            const expiryDate = new Date(p.expiryDate);
            const year = expiryDate.getFullYear();
            const month = String(expiryDate.getMonth() + 1).padStart(2, '0');
            const day = String(expiryDate.getDate()).padStart(2, '0');
            document.getElementById('editExpiryDate').value = `${year}-${month}-${day}`;
            
            // Show modal
            const modal = new bootstrap.Modal(document.getElementById('editProductModal'));
            modal.show();
        };

        // Save edited product - FIXED: properly updates product and refreshes list
        window.saveEditedProduct = function() {
            const id = document.getElementById('editProductId').value;
            const newName = document.getElementById('editProductName').value.trim();
            const newDateStr = document.getElementById('editExpiryDate').value;
            
            if (!newName || !newDateStr) {
                alert('Please fill all fields');
                return;
            }
            
            const newExpiry = new Date(newDateStr);
            if (isNaN(newExpiry.getTime())) {
                alert('Invalid date');
                return;
            }

            // Find product index
            const index = products.findIndex(p => p.id === id);
            if (index === -1) return;

            // Update product data
            products[index].name = newName;
            products[index].expiryDate = newExpiry.toISOString();
            products[index].date = formatDate(newExpiry);
            products[index].hijriDate = gregorianToHijri(newExpiry).fullDate;
            products[index].hijriDaysRemaining = calculateHijriDaysRemaining(newExpiry);
            products[index].daysRemaining = calculateTimeRemaining(newExpiry);
            products[index].dayOfWeek = newExpiry.toLocaleDateString('en-US',{weekday:'short'});

            // Save to localStorage
            saveProducts(products);
            
            // Re-render the list
            renderProductList();
            updateSummary();
            
            // Close modal
            const modal = bootstrap.Modal.getInstance(document.getElementById('editProductModal'));
            modal.hide();
            
            // Optional sound feedback
            playAlertSound(); // just a short beep as confirmation
        };

        function deleteProduct(id, name) {
            if (confirm(`Delete "${name}"?`)) {
                products = products.filter(p => p.id !== id);
                saveProducts(products);
                renderProductList();
                updateSummary();
            }
        }

        // add product
        function handleFormSubmit(e) {
            e.preventDefault();
            const name = document.getElementById('productName').value.trim();
            const dateStr = document.getElementById('expiryDate').value;
            if (!name || !dateStr) { alert('Fill all fields'); return; }
            const expiry = new Date(dateStr); if (isNaN(expiry)) return;
            const hijri = gregorianToHijri(expiry);
            const product = {
                id: Date.now().toString(),
                name, 
                date: formatDate(expiry),
                expiryDate: expiry.toISOString(),
                hijriDate: hijri.fullDate,
                hijriDaysRemaining: calculateHijriDaysRemaining(expiry),
                daysRemaining: calculateTimeRemaining(expiry),
                dayOfWeek: expiry.toLocaleDateString('en-US',{weekday:'short'})
            };
            products.push(product);
            saveProducts(products);
            renderProductList();
            updateSummary();

            if (product.daysRemaining <= 7) playAlertSound();

            document.getElementById('expiryForm').reset();
            let tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+30);
            document.getElementById('expiryDate').valueAsDate = tomorrow;
            document.getElementById('productName').focus();
        }

        // export
        function exportToExcel() {
            if (products.length === 0) { alert('No data'); return; }
            const data = products.map(p => ({
                Name: p.name, 'Expiry (Greg)': p.date, 'Hijri': p.hijriDate, 'Days left': p.daysRemaining
            }));
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.json_to_sheet(data);
            XLSX.utils.book_append_sheet(wb, ws, 'Products');
            XLSX.writeFile(wb, 'expiry_tracker.xlsx');
        }

        // search
        function searchProducts() {
            const q = document.getElementById('searchBox').value.toLowerCase();
            const items = document.querySelectorAll('#productList li');
            let visible = 0;
            items.forEach(li => {
                const txt = li.innerText.toLowerCase();
                if (txt.includes(q)) { li.style.display = 'flex'; visible++; }
                else li.style.display = 'none';
            });
            const empty = document.getElementById('emptyState');
            if (visible === 0 && q !== '') {
                empty.style.display = 'block';
                empty.innerHTML = '<i class="fas fa-search"></i><h4>No match</h4><p>try again</p>';
            } else checkEmptyState();
        }

        function toggleList() {
            const cont = document.getElementById('productListContainer');
            const btn = document.getElementById('toggleListBtn');
            if (cont.style.display === 'none') {
                cont.style.display = 'block';
                btn.innerHTML = '<i class="fas fa-eye-slash"></i> Hide list';
            } else {
                cont.style.display = 'none';
                btn.innerHTML = '<i class="fas fa-eye"></i> Show list';
            }
        }

        function updateCurrentTime() {
            document.getElementById('currentTime').innerText = new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
        }

        function clearAll() {
            if (confirm('Delete everything?')) {
                products = [];
                saveProducts(products);
                renderProductList();
                updateSummary();
            }
        }

        function showNotifications() {
            const soon = products.filter(p => calculateTimeRemaining(p.expiryDate) <= 7);
            if (soon.length === 0) { alert('No expiring soon'); return; }
            playAlertSound();
            let msg = soon.map(p => `${p.name} (${p.date})`).join('\n');
            alert('⚠️ Expiring / expired:\n' + msg);
        }

        // load & init
        window.onload = function() {
            products = getProducts();
            renderProductList();
            updateSummary();
            setInterval(updateCurrentTime, 1000);
            updateCurrentTime();

            document.getElementById('expiryForm').addEventListener('submit', handleFormSubmit);
            document.getElementById('clearData').addEventListener('click', clearAll);
            document.getElementById('exportData').addEventListener('click', exportToExcel);
            document.getElementById('searchButton').addEventListener('click', searchProducts);
            document.getElementById('searchBox').addEventListener('keyup', searchProducts);
            document.getElementById('toggleListBtn').addEventListener('click', toggleList);
            document.getElementById('notificationIcon').addEventListener('click', showNotifications);

            // Make edit function globally accessible (already done via window.editProduct)
            // But we also need to attach edit button listeners (they call editProduct, which is now global)

            let tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+30);
            document.getElementById('expiryDate').valueAsDate = tomorrow;
            document.getElementById('productName').focus();

            // Request notification permission
            if (Notification.permission !== 'granted' && Notification.permission !== 'denied') {
                Notification.requestPermission();
            }
        };
    })();
</script>

        * {
            margin: 0;
            padding: 0;

        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.2rem;
            font-family: 'Share Tech Mono', 'Courier New', Courier, monospace;
            position: relative;
            overflow-x: hidden;
        }

        /* laser grid background (holographic) */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: 
                linear-gradient(90deg, rgba(255, 0, 60, 0.03) 1px, transparent 1px),
                linear-gradient(0deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
            animation: gridPulse 8s infinite alternate;
        }

        @keyframes gridPulse {
            0% { opacity: 0.2; filter: blur(0.5px); }
            100% { opacity: 0.8; filter: blur(0px); }
        }

        /* deep scanning laser beams */
        .laser-scanner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
        }

        .beam-horizontal {
            position: absolute;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ff3030, #00ffff, #ff3030, transparent);
            filter: blur(3px) drop-shadow(0 0 20px cyan);
            top: 30%;
            animation: sweepHorizontal 7s ease-in-out infinite;
            opacity: 0.7;
            box-shadow: 0 0 30px #0ff, 0 0 60px #f0f;
        }

        .beam-vertical {
            position: absolute;
            width: 3px;
            height: 100%;
            background: linear-gradient(180deg, transparent, #00ff9d, #ff0055, #00ff9d, transparent);
            filter: blur(3px) drop-shadow(0 0 25px lime);
            left: 60%;
            animation: sweepVertical 9s ease-in-out infinite;
            opacity: 0.6;
            box-shadow: 0 0 40px #0f0, 0 0 80px #ff00b3;
        }

        @keyframes sweepHorizontal {
            0% { top: 5%; opacity: 0.2; filter: blur(5px); }
            25% { top: 30%; opacity: 1; filter: blur(2px); }
            50% { top: 70%; opacity: 0.8; filter: blur(1px); }
            75% { top: 40%; opacity: 1; filter: blur(3px); }
            100% { top: 5%; opacity: 0.2; filter: blur(5px); }
        }

        @keyframes sweepVertical {
            0% { left: 10%; opacity: 0.3; filter: blur(4px); }
            33% { left: 45%; opacity: 1; filter: blur(0px); }
            66% { left: 80%; opacity: 0.9; filter: blur(2px); }
            100% { left: 10%; opacity: 0.3; filter: blur(4px); }
        }

        /* main interface – armoured plate */
        .cyber-container {
            max-width: 1500px;
            width: 100%;
            background: rgba(0, 5, 10, 0.7);
            backdrop-filter: blur(12px) brightness(1.5);
            border: 2px solid;
            border-image: repeating-linear-gradient(45deg, #00ffff, #ff0055, #00ffff) 30;
            box-shadow: 0 0 70px rgba(0, 255, 255, 0.5), inset 0 0 60px rgba(255, 0, 0, 0.3);
            padding: 2rem 1.8rem;
            border-radius: 40px 12px 40px 12px;
            position: relative;
            z-index: 10;
            transition: 0.3s;
        }

        /* header like HK display */
        .hud-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #0ff;
            padding-bottom: 0.7rem;
            margin-bottom: 2rem;
            color: #aaffff;
            text-shadow: 0 0 10px cyan, 0 0 20px magenta;
            font-family: 'Orbitron', 'Courier New', monospace;
        }

        .hud-title {
            font-size: 2.4rem;
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #00ffff, #ff66ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 25px #00ffff);
        }

        .hud-title span {
            font-size: 1.6rem;
            background: none;
            -webkit-text-fill-color: #ff0055;
            filter: drop-shadow(0 0 10px red);
        }

        .target-counter {
            background: #110022;
            border: 2px solid magenta;
            padding: 0.5rem 2rem;
            border-radius: 40px;
            font-size: 1.6rem;
            color: #00ffc3;
            box-shadow: 0 0 30px #00ffff, inset 0 0 10px cyan;
            backdrop-filter: blur(5px);
            font-weight: bold;
        }

        /* laser targeting grid cards */
        .personnel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
            perspective: 800px;
        }

        /* each card = armoured target */
        .target-card {
            background: rgba(0, 10, 20, 0.6);
            backdrop-filter: blur(15px);
            border: 2px solid transparent;
            border-image: repeating-linear-gradient(35deg, #ff0055, #00ffff, #ff0055) 10;
            border-radius: 24px;
            padding: 1.8rem 1.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 0 2px rgba(255, 0, 255, 0.2) inset, 0 0 40px rgba(0, 255, 255, 0.3);
            transform: rotateX(2deg) rotateY(0.5deg);
            transition: 0.2s cubic-bezier(0.2, 1.6, 0.5, 1);
            color: #bbfffc;
            position: relative;
            isolation: isolate;
        }

        .target-card:hover {
            transform: rotateX(0deg) scale(1.02) translateY(-10px);
            border-image: repeating-linear-gradient(35deg, cyan, magenta, cyan) 10;
            box-shadow: 0 0 60px #ff00c8, 0 0 120px #0ff, inset 0 0 30px magenta;
        }

        /* laser target dot */
        .target-card::before {
            content: "";
            position: absolute;
            top: 10px;
            right: 15px;
            width: 16px;
            height: 16px;
            background: #ff0040;
            border-radius: 50%;
            box-shadow: 0 0 25px red, 0 0 45px #ff00b3;
            animation: laserPoint 1.2s infinite alternate;
        }

        @keyframes laserPoint {
            0% { opacity: 0.4; box-shadow: 0 0 10px red; }
            100% { opacity: 1; box-shadow: 0 0 40px #ff00aa, 0 0 80px cyan; }
        }

        /* nameplate – glowing */
        .person-name {
            font-size: 2rem;
            font-weight: 800;
            font-family: 'Orbitron', monospace;
            background: linear-gradient(135deg, #ffffff, #93ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            filter: drop-shadow(0 0 12px #0ff);
            border-left: 6px solid magenta;
            padding-left: 0.8rem;
            line-height: 1.2;
        }

        .job-scan {
            display: inline-block;
            background: #14001a;
            border: 2px solid #0ff;
            color: #0ff;
            font-weight: 400;
            padding: 0.3rem 1.4rem;
            border-radius: 30px;
            margin: 0.8rem 0 0.2rem 0;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 0 0 18px cyan;
        }

        .dept-tag {
            color: #ffa0ff;
            font-size: 0.9rem;
            filter: drop-shadow(0 0 8px magenta);
            margin-bottom: 1rem;
            border-bottom: 1px dashed #00ffff;
            padding-bottom: 0.5rem;
        }

        /* contact items – laser etched */
        .contact-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid #00ffff;
            border-radius: 60px;
            padding: 0.6rem 1.2rem;
            margin-bottom: 0.8rem;
            backdrop-filter: blur(10px);
            transition: 0.1s;
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.3);
        }

        .contact-item:hover {
            background: rgba(180, 0, 255, 0.2);
            border-color: magenta;
            box-shadow: 0 0 30px magenta, inset 0 0 10px magenta;
        }

        .contact-icon {
            font-size: 2rem;
            filter: drop-shadow(0 0 10px cyan);
            width: 36px;
            text-align: center;
        }

        .contact-detail {
            flex: 1;
        }

        .contact-label {
            font-size: 0.55rem;
            letter-spacing: 3px;
            color: #aaf0ff;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .contact-value a {
            color: #ffffff;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 500;
            border-bottom: 1px dotted #00ffff;
            text-shadow: 0 0 8px cyan;
            word-break: break-all;
            transition: 0.1s;
        }

        .contact-value a:hover {
            color: #ff89ff;
            text-shadow: 0 0 15px magenta, 0 0 30px cyan;

        /* location/status laser badges */

        .badge {

        /* laser range finder corners */
        .corner-triangle {

            border-width: 4px 0 0 4px;

        /* extra machine glitch */

        }

        @keyframes glitch {
            2%, 6% { transform: skew(2deg, 1deg); opacity: 0.9; text-shadow: -2px 0 red, 2px 0 blue; }
        }
    </style>

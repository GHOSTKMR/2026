<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUDU · T-800 NEXUS · STABILIZED MATRIX</title>
    <style>
        /* ========== T-800 NEXUS CORE ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #020208;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.2rem;
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            position: relative;
            overflow-x: hidden;
        }

        /* Modernized grid – nano mesh */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: 
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(0deg, rgba(255, 64, 255, 0.05) 1px, transparent 1px);
            background-size: 45px 45px;
            pointer-events: none;
            z-index: 0;
            animation: gridStabilized 12s infinite alternate ease-in-out;
        }

        @keyframes gridStabilized {
            0% { opacity: 0.25; background-size: 45px 45px; filter: blur(0.5px); }
            100% { opacity: 0.7; background-size: 50px 50px; filter: blur(0px); }
        }

        /* Refined scanning beams – smoother gradients */
        .laser-scanner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
        }

        .beam-horizontal {
            position: absolute;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, #00ffff, #ff40ff, #00ffff, transparent);
            filter: blur(5px) drop-shadow(0 0 25px cyan);
            top: 30%;
            animation: sweepSmooth 12s cubic-bezier(0.45, 0.05, 0.2, 0.99) infinite;
            opacity: 0.6;
            box-shadow: 0 0 40px #0ff, 0 0 80px #f0f;
        }

        .beam-vertical {
            position: absolute;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, transparent, #00ffaa, #ff40c0, #00ffaa, transparent);
            filter: blur(5px) drop-shadow(0 0 30px #0ff);
            left: 50%;
            animation: sweepVerticalSmooth 15s cubic-bezier(0.3, 0.8, 0.2, 1) infinite;
            opacity: 0.5;
            box-shadow: 0 0 50px #0ff, 0 0 90px #ff40ff;
        }

        @keyframes sweepSmooth {
            0% { top: 0%; opacity: 0.2; filter: blur(8px); }
            25% { top: 30%; opacity: 0.9; filter: blur(3px); }
            50% { top: 70%; opacity: 0.8; filter: blur(2px); }
            75% { top: 40%; opacity: 0.9; filter: blur(3px); }
            100% { top: 0%; opacity: 0.2; filter: blur(8px); }
        }

        @keyframes sweepVerticalSmooth {
            0% { left: 0%; opacity: 0.2; filter: blur(8px); }
            33% { left: 45%; opacity: 1; filter: blur(2px); }
            66% { left: 80%; opacity: 0.9; filter: blur(3px); }
            100% { left: 0%; opacity: 0.2; filter: blur(8px); }
        }

        /* Main container – modern crystal armor */
        .cyber-container {
            max-width: 1600px;
            width: 100%;
            background: rgba(0, 8, 18, 0.65);
            backdrop-filter: blur(16px) brightness(1.3);
            border: 2px solid rgba(0, 255, 255, 0.5);
            border-radius: 48px 16px 48px 16px;
            box-shadow: 0 0 100px rgba(0, 255, 255, 0.4), inset 0 0 80px rgba(255, 64, 255, 0.25);
            padding: 2.2rem 2rem;
            position: relative;
            z-index: 10;
            transition: box-shadow 0.4s;
        }

        .cyber-container:hover {
            box-shadow: 0 0 140px rgba(0, 255, 255, 0.7), inset 0 0 100px rgba(255, 64, 255, 0.4);
        }

        /* HUD header – sharp & modern */
        .hud-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #0ff;
            padding-bottom: 1rem;
            margin-bottom: 2.2rem;
            color: #e0ffff;
            text-shadow: 0 0 15px cyan, 0 0 35px magenta;
            font-family: 'Orbitron', 'Courier New', monospace;
        }

        .hud-title {
            font-size: 2.6rem;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #0ff, #ff80ff, #0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px #0ff);
        }

        .hud-title span {
            font-size: 1.8rem;
            background: none;
            -webkit-text-fill-color: #ff88ff;
            filter: drop-shadow(0 0 15px magenta);
        }

        .target-counter {
            background: rgba(17, 0, 34, 0.7);
            border: 2px solid #ff66ff;
            padding: 0.5rem 2.2rem;
            border-radius: 60px;
            font-size: 1.6rem;
            color: #00ffea;
            box-shadow: 0 0 40px #00ffff, inset 0 0 15px cyan;
            backdrop-filter: blur(12px);
            font-weight: 600;
        }

        /* Personnel grid – modern glass cards */
        .personnel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            perspective: 1000px;
        }

        /* Card – stabilized laser target */
        .target-card {
            background: rgba(8, 15, 25, 0.55);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(0, 255, 255, 0.4);
            border-radius: 32px;
            padding: 2rem 1.8rem;
            box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 0, 255, 0.2) inset, 0 0 30px rgba(0, 255, 255, 0.2);
            transform: rotateX(1deg) rotateY(0.2deg);
            transition: all 0.3s cubic-bezier(0.2, 1, 0.3, 1);
            color: #d0f0ff;
            position: relative;
            isolation: isolate;
        }

        .target-card:hover {
            transform: rotateX(0deg) scale(1.02) translateY(-8px);
            border-color: #ff40ff;
            box-shadow: 0 0 50px #ff40ff, 0 0 100px cyan, inset 0 0 40px magenta;
        }

        /* Laser dot – refined */
        .target-card::before {
            content: "";
            position: absolute;
            top: 16px;
            right: 20px;
            width: 14px;
            height: 14px;
            background: #ff2266;
            border-radius: 50%;
            box-shadow: 0 0 30px #ff0066, 0 0 60px cyan;
            animation: laserPulse 1.4s infinite alternate ease-in-out;
        }

        @keyframes laserPulse {
            0% { opacity: 0.5; transform: scale(0.9); box-shadow: 0 0 15px #ff0066; }
            100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 50px #ff40ff, 0 0 80px cyan; }
        }

        /* Name – modern gradient */
        .person-name {
            font-size: 2rem;
            font-weight: 800;
            font-family: 'Orbitron', monospace;
            background: linear-gradient(135deg, #ffffff, #a0ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            filter: drop-shadow(0 0 15px #0ff);
            border-left: 5px solid #ff40ff;
            padding-left: 1rem;
            line-height: 1.2;
            margin-bottom: 0.3rem;
        }

        .job-scan {
            display: inline-block;
            background: rgba(20, 0, 30, 0.7);
            border: 2px solid #0ff;
            color: #0ff;
            font-weight: 500;
            padding: 0.25rem 1.6rem;
            border-radius: 40px;
            margin: 0.7rem 0 0.3rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 20px cyan;
            backdrop-filter: blur(5px);
        }

        .dept-tag {
            color: #ffc0ff;
            font-size: 0.95rem;
            filter: drop-shadow(0 0 8px magenta);
            margin-bottom: 1.2rem;
            border-bottom: 1px solid rgba(0, 255, 255, 0.5);
            padding-bottom: 0.6rem;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* Contact items – sleek */
        .contact-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(0, 30, 40, 0.4);
            border: 1px solid rgba(0, 255, 255, 0.5);
            border-radius: 50px;
            padding: 0.7rem 1.3rem;
            margin-bottom: 0.9rem;
            backdrop-filter: blur(8px);
            transition: 0.15s;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
        }

        .contact-item:hover {
            background: rgba(60, 0, 80, 0.5);
            border-color: #ff40ff;
            box-shadow: 0 0 35px magenta, inset 0 0 15px magenta;
        }

        .contact-icon {
            font-size: 1.8rem;
            filter: drop-shadow(0 0 8px cyan);
            width: 36px;
            text-align: center;
        }

        .contact-label {
            font-size: 0.6rem;
            letter-spacing: 2px;
            color: #aaffff;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .contact-value a {
            color: #ffffff;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            border-bottom: 1px dotted #0ff;
            text-shadow: 0 0 8px cyan;
            word-break: break-all;
            transition: 0.1s;
        }

        .contact-value a:hover {
            color: #ffaaff;
            text-shadow: 0 0 15px magenta, 0 0 30px cyan;
            border-bottom: 2px solid magenta;
        }

        /* Badges – cleaner */
        .meta-badge {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            margin: 1rem 0 0.8rem;
        }

        .badge {
            border: 1px solid #0ff;
            background: rgba(0, 20, 30, 0.6);
            color: #0ff;
            padding: 0.25rem 1.4rem;
            border-radius: 50px;
            font-size: 0.8rem;
            box-shadow: 0 0 15px cyan;
            backdrop-filter: blur(6px);
        }

        .badge.busy {
            border-color: #ff5555;
            color: #ffaaaa;
            box-shadow: 0 0 20px #ff3333;
        }

        .footer-chip {
            margin-top: 1.2rem;
            display: flex;
            justify-content: space-between;
            border-top: 2px solid #ff40ff;
            padding-top: 0.9rem;
            font-size: 0.75rem;
            color: #8fffff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .abha-pulse {
            color: #ffaaff;
            animation: softFlicker 4s infinite;
        }

        @keyframes softFlicker {
            0% { opacity: 0.7; text-shadow: 0 0 5px magenta; }
            50% { opacity: 1; text-shadow: 0 0 20px magenta, 0 0 30px cyan; }
            100% { opacity: 0.7; text-shadow: 0 0 5px magenta; }
        }

        /* Corner detail – refined */
        .corner-triangle {
            position: absolute;
            width: 28px;
            height: 28px;
            border-color: #0ff;
            border-style: solid;
            border-width: 4px 0 0 4px;
            top: -2px;
            left: -2px;
            filter: drop-shadow(0 0 12px cyan);
            opacity: 0.8;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .hud-title { font-size: 2rem; }
            .hud-title span { font-size: 1.4rem; }
            .target-counter { font-size: 1.2rem; padding: 0.4rem 1.2rem; }
            .person-name { font-size: 1.6rem; }
        }

        /* footer note */
        .system-footer {
            color: #6080c0;
            font-size: 0.65rem;
            margin-top: 1.2rem;
            font-family: 'Share Tech Mono';
            z-index: 20;
            text-shadow: 0 0 8px blue;
            letter-spacing: 0.5px;
        }
    </style>
